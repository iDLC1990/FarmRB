<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Legend Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary-gold: #ffd700; --bg-panel: rgba(10, 10, 10, 0.9); }
        body { margin: 0; padding: 0; background: #000; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }

        /* Эпик-панель: МАКСИМАЛЬНО КОМПАКТНО */
        #epic-grid {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 2000;
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 2px; padding: 2px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--primary-gold);
            box-sizing: border-box;
        }
        .epic-card {
            background: #151515; border: 1px solid #222; border-radius: 3px;
            padding: 2px 4px; text-align: center; cursor: pointer; height: 38px;
        }
        .epic-card.in-window { border-color: #ff4400; box-shadow: inset 0 0 5px #820; animation: pulse 1s infinite; }
        .e-name { font-size: 9px; font-weight: bold; color: var(--primary-gold); display: block; text-transform: uppercase; overflow: hidden; white-space: nowrap; }
        .e-time { font-size: 11px; color: #00ffcc; font-family: monospace; font-weight: bold; display: block; }
        .e-status { font-size: 7px; color: #777; display: block; text-transform: uppercase; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* Карта */
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #map-wrapper { 
            position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; 
            background-image: url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true');
        }

        /* Сайдбар с режимом сворачивания */
        #sidebar {
            position: fixed; top: 50px; left: 10px; width: 240px;
            background: var(--bg-panel); padding: 12px; border-radius: 8px;
            border: 1px solid #333; z-index: 1000; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #sidebar.collapsed { width: 50px; padding: 8px 4px; overflow: hidden; height: auto; }
        #sidebar.collapsed #game-time { font-size: 14px; margin-bottom: 10px; }
        #sidebar.collapsed .hide-on-collapse { display: none; }

        #game-time { font-size: 32px; color: var(--primary-gold); text-align: center; font-family: monospace; margin-bottom: 8px; }

        /* Метки */
        .rb-marker {
            position: absolute; width: 16px; height: 16px;
            background: rgba(255,255,255,0.25); border: 1px solid #111; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
        }
        .rb-marker.is-alive { background: radial-gradient(circle, #ff4400, #800); border-color: #fff; box-shadow: 0 0 10px #f40; width: 18px; height: 18px; z-index: 20; }
        .rb-marker.priority::before { content: '★'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: var(--primary-gold); font-size: 20px; text-shadow: 0 0 3px #000; }
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 1px 5px; border-radius: 3px; font-size: 9px; white-space: nowrap; pointer-events: none;
        }
        .rb-timer-map {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; border: 1px solid #00ffcc; padding: 1px 4px;
            font-size: 12px; font-family: monospace; border-radius: 3px; font-weight: bold;
        }

        /* Кнопки */
        .btn { width: 100%; padding: 8px; margin-bottom: 6px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-toggle { background: #444; color: #fff; margin-bottom: 10px; }
        .btn-clear { background: #700; color: #fff; }
        .btn-faq { background: #222; color: #bbb; border: 1px solid #444; }
        .btn-editor { background: #000; color: #0f0; border: 1px solid #050; }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid var(--primary-gold); padding: 20px;
            z-index: 5000; display: none; border-radius: 10px; width: 280px; box-shadow: 0 0 50px #000;
        }
        input { width: 100%; padding: 8px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #444; box-sizing: border-box; }
        
        .mode-timers .rb-marker:not(.has-timer) { display: none !important; }
        .mode-ready .rb-marker.has-timer { display: none !important; }
    </style>
</head>
<body>

<div id="epic-grid"></div>

<div id="sidebar">
    <button class="btn btn-toggle" onclick="toggleSidebar()">⚙️</button>
    <div id="game-time">00:00</div>
    
    <div class="hide-on-collapse">
        <select id="view-mode" onchange="updateViewMode()" style="width:100%; padding:8px; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; border-radius:5px;">
            <option value="default">Все Боссы</option>
            <option value="timers">Таймеры</option>
            <option value="ready">Живые</option>
        </select>

        <button class="btn btn-clear" onclick="clearAllTimers()">ОЧИСТИТЬ СПИСОК</button>
        <button class="btn btn-faq" onclick="showModal('faq-modal')">ИНСТРУКЦИЯ</button>
        <button class="btn btn-editor" id="editor-btn" onclick="toggleEditor()">РЕДАКТОР: ВЫКЛ</button>
        
        <div id="monitor-list" style="margin-top:10px; max-height: 40vh; overflow-y: auto;"></div>
    </div>
</div>

<div id="epic-modal" class="modal">
    <h3 id="m-title" style="margin:0 0 10px 0; color:var(--primary-gold); text-align:center; font-size:16px;"></h3>
    <label style="font-size:11px; color:#aaa;">Даты (через запятую, напр: 16,17,18,29):</label>
    <input type="text" id="s-dates" placeholder="1, 5, 15, 20">
    <label style="font-size:11px; color:#aaa;">Время (МСК):</label>
    <input type="time" id="s-time">
    
    <button onclick="saveEpic()" style="width:100%; background:var(--primary-gold); padding:10px; border:none; font-weight:bold; cursor:pointer; margin-top:10px;">СОХРАНИТЬ</button>
    <button onclick="hideModal('epic-modal')" style="width:100%; background:transparent; color:#888; border:none; margin-top:8px; cursor:pointer;">ОТМЕНА</button>
</div>

<div id="faq-modal" class="modal">
    <h3 style="color:var(--primary-gold); text-align:center;">Инструкция</h3>
    <div style="font-size:12px; line-height:1.5; color:#ccc;">
        • <b>Настройка:</b> Кликни по Эпику сверху.<br>
        • <b>Даты:</b> Можно вводить несколько чисел месяца через запятую.<br>
        • <b>Убийство РБ:</b> Двойной клик по метке.<br>
        • <b>Приоритет:</b> Включи Редактор и кликни по РБ (появится звезда).
    </div>
    <button onclick="hideModal('faq-modal')" style="width:100%; background:var(--primary-gold); padding:8px; border:none; font-weight:bold; margin-top:15px;">OK</button>
</div>

<div id="viewport"><div id="map-wrapper"></div></div>

        { id: "Gordon", name: "gordon", pos: "top:1577px;left:4400px;" },
        { id: "Typhoon", name: "Typhoon", pos: "top:4008px;left:2830px;" }
    ];

    let epics = ["Queen Ant", "Core", "Orfen", "Zaken", "Baium", "Frintezza", "Antharas", "Valakas", "Beleth"];
    let epicData = {};
    let isEditor = false, selEpic = null;

    function init() {
        const grid = document.getElementById('epic-grid');
        epics.forEach(name => {
            const id = name.replace(/\s/g, '');
            grid.innerHTML += `
                <div class="epic-card" id="ec-${id}" onclick="openEpic('${name}')">
                    <span class="e-name">${name}</span>
                    <span class="e-time">--:--</span>
                    <span class="e-status">ЖДЁТ</span>
                </div>`;
        });
        sync();
        setInterval(tick, 1000);
        setInterval(updateServerTime, 1000);
        setInterval(updateEpics, 1000);
    }

    function sync() {
        rbRef.on('value', snap => {
            const fb = snap.val() || {};
            bossData.forEach(b => {
                if(fb[b.id]) { b.isAlive = fb[b.id].isAlive; b.deathTime = fb[b.id].deathTime; b.priority = fb[b.id].priority; }
            });
            render();
        });
        epicRef.on('value', snap => epicData = snap.val() || {});
    }

    function render() {
        const wrap = document.getElementById('map-wrapper');
        bossData.forEach(b => {
            let m = document.getElementById('m-' + b.id);
            if(!m) {
                m = document.createElement('div');
                m.id = 'm-' + b.id; m.className = 'rb-marker';
                m.onclick = (e) => isEditor ? toggleStar(b.id) : handleRB(b);
                wrap.appendChild(m);
            }
            const p = b.pos.split(';');
            m.style.top = p[0].split(':')[1]; m.style.left = p[1].split(':')[1];
            m.setAttribute('data-name', b.name);
            m.classList.toggle('is-alive', !!b.isAlive);
            m.classList.toggle('priority', !!b.priority);
            m.classList.toggle('has-timer', (b.deathTime && !b.isAlive));
        });
        updateList();
    }

    function updateEpics() {
        const now = new Date();
        const sTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (3 * 3600000));

        epics.forEach(name => {
            const id = name.replace(/\s/g, '');
            const cfg = epicData[id];
            const card = document.getElementById(`ec-${id}`);
            if(!cfg || !card) return;

            const dates = cfg.dates.split(/[, ]+/).map(d => parseInt(d)).sort((a,b) => a-b);
            let nextDate = dates.find(d => {
                const dObj = new Date(sTime); dObj.setDate(d);
                const [h, m] = cfg.startTime.split(':'); dObj.setHours(h, m, 0, 0);
                return (dObj - sTime) > -1800000; // Окно 30 мин
            });

            if(!nextDate) nextDate = dates[0]; // Если все прошли, берем первую (будущий месяц)

            const target = new Date(sTime); target.setDate(nextDate);
            const [h, m] = cfg.startTime.split(':'); target.setHours(h, m, 0, 0);
            
            const diff = target - sTime;
            const tText = card.querySelector('.e-time');
            const sText = card.querySelector('.e-status');

            if(diff <= 0) {
                const winEnd = new Date(target.getTime() + 30 * 60000);
                if(sTime < winEnd) {
                    card.classList.add('in-window'); sText.innerText = "ОКНО";
                    tText.innerText = fmt(Math.floor((winEnd - sTime)/1000));
                } else {
                    card.classList.remove('in-window'); sText.innerText = "ПРОШЕЛ"; tText.innerText = "CLOSED";
                }
            } else {
                card.classList.remove('in-window'); sText.innerText = "РЕСП: " + nextDate;
                tText.innerText = fmt(Math.floor(diff/1000));
            }
        });
    }

    function handleRB(b) {
        const now = Date.now();
        if(b.lc && (now - b.lc < 400)) rbRef.child(b.id).update({ isAlive: false, deathTime: now });
        b.lc = now;
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(b => {
            if(b.deathTime && !b.isAlive) {
                const rem = 900 - Math.floor((now - b.deathTime)/1000);
                const m = document.getElementById('m-' + b.id);
                if(rem <= 0) rbRef.child(b.id).update({ isAlive: true, deathTime: null });
                else {
                    let t = m.querySelector('.rb-timer-map') || document.createElement('div');
                    t.className = 'rb-timer-map'; m.appendChild(t);
                    t.innerText = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
                }
            }
        });
    }

    function clearAllTimers() {
        if(!confirm("Сбросить таймеры?")) return;
        let obj = {}; bossData.forEach(b => obj[b.id] = { isAlive: true, deathTime: null, priority: !!b.priority });
        rbRef.update(obj);
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function openEpic(name) { selEpic = name; document.getElementById('m-title').innerText = name; showModal('epic-modal'); }
    function saveEpic() {
        const ds = document.getElementById('s-dates').value; const t = document.getElementById('s-time').value;
        if(!ds || !t) return alert("Заполни!");
        epicRef.child(selEpic.replace(/\s/g, '')).set({ dates: ds, startTime: t });
        hideModal('epic-modal');
    }

    function toggleEditor() {
        if(!isEditor) { if(prompt("Pass:") === "D36rk43mgm") isEditor = true; else return; } else isEditor = false;
        document.getElementById('editor-btn').innerText = isEditor ? "РЕДАКТОР: ВКЛ" : "РЕДАКТОР: ВЫКЛ";
    }
    function toggleStar(id) { const b = bossData.find(x => x.id === id); rbRef.child(id).update({ priority: !b.priority }); }
    function updateViewMode() { const mode = document.getElementById('view-mode').value; document.getElementById('map-wrapper').className = mode === 'default' ? '' : 'mode-' + mode; }
    function updateServerTime() {
        const now = new Date();
        const nowSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        const syncReal = (19 * 3600) + (56 * 60) + 6; const syncGame = (17 * 60) + 36;
        let gameMin = Math.floor(syncGame + (nowSec - syncReal) / 10);
        gameMin = ((gameMin % 1440) + 1440) % 1440;
        document.getElementById('game-time').innerText = `${Math.floor(gameMin/60).toString().padStart(2,'0')}:${(gameMin%60).toString().padStart(2,'0')}`;
    }
    function fmt(s) { 
        const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60); const sec = s%60;
        return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}` : `${m}:${sec.toString().padStart(2,'0')}`;
    }
    function updateList() {
        const list = document.getElementById('monitor-list');
        const items = bossData.filter(b => b.isAlive || b.deathTime).sort((a,b) => (b.priority - a.priority));
        list.innerHTML = items.map(b => `<div style="font-size:10px; padding:4px; border-bottom:1px solid #222; color:${b.priority?'var(--primary-gold)':'#fff'}">${b.priority?'★ ':''}${b.name}</div>`).join('');
    }

    // Drag & Zoom
    let scale = 0.2, posX = 0, posY = 0, isDrag = false, lx, ly;
    window.onpointerdown = e => { if(e.target.id === 'viewport' || e.target.id === 'map-wrapper') { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onpointermove = e => { if(!isDrag) return; posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; upd(); };
    window.onpointerup = () => isDrag = false;
    window.onwheel = e => { scale = Math.min(Math.max(0.05, scale * (e.deltaY > 0 ? 0.9 : 1.1)), 2); upd(); };
    function upd() { document.getElementById('map-wrapper').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    init();
</script>
</body>
</html>
