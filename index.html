<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Fixed Timers</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { 
            margin: 0; padding: 0; background: #050505; color: #eee; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        .rb-marker {
            position: absolute; width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.3); border: 2px solid #444;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.8); touch-action: none;
        }
        
        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff4400 0%, #880000 100%) !important; 
            border-color: #fff !important; box-shadow: 0 0 20px rgba(255, 50, 0, 1) !important; 
            width: 24px; height: 24px; z-index: 15;
        }

        .rb-marker.dragging { opacity: 0.7; scale: 2.5; z-index: 1000; border-color: #0f0 !important; }

        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 4px; 
            font-size: 11px; white-space: nowrap; border: 1px solid #444; pointer-events: none;
        }

        .rb-timer-map {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 4px 10px; border-radius: 6px;
            font-weight: bold; font-family: monospace; font-size: 18px; border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.7); z-index: 100; pointer-events: none;
        }

        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 280px;
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 12px; backdrop-filter: blur(10px);
        }
        #monitor-list { margin-top: 15px; max-height: 60vh; overflow-y: auto; }
        .monitor-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; padding: 10px; border-bottom: 1px solid #222; cursor: pointer;
        }
        .monitor-item:hover { background: rgba(255,255,255,0.05); }
        .ready-text { color: #ff3300; font-weight: bold; text-shadow: 0 0 5px #ff3300; }
        #game-time { font-size:32px; color:#ffd700; font-family:monospace; text-align:center; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;}
        
        .btn { width:100%; padding:10px; border-radius:6px; font-weight:bold; margin-bottom:5px; cursor:pointer; border: none; }
        .btn-editor { background:#222; color:#0f0; }
        .btn-editor.active { background:#050; color:#fff; }
        .btn-reset { background: #422; color: #f66; margin-top: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="game-time">00:00</div>
    <button onclick="toggleEditor()" id="editor-btn" class="btn btn-editor">РЕДАКТОР: ВЫКЛ</button>
    <button onclick="resetTimers()" class="btn btn-reset">СБРОСИТЬ ВСЕ ТАЙМЕРЫ</button>
    <div id="monitor-list"></div>
</div>

<div id="viewport"><div id="map-wrapper"></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB0b73t1ztVYKqZ_Vl8LH8EF2SpaQsBMHc",
        projectId: "l2-rb-map",
        databaseURL: "https://l2-rb-map-default-rtdb.europe-west1.firebasedatabase.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const rbRef = db.ref('bosses');

    const SPAWN_WINDOW = 15 * 60; 
    let isEditorMode = false;
    let draggedBossId = null;
    let bossData = [];

    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    let scale = window.innerWidth / 5062;
    let posX = 0, posY = 0;

    function init() {
        wrapper.style.backgroundImage = `url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true')`;
        listenFirebase(); 
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);
        update();
    }

    function createMarker(boss) {
        if (!boss || !boss.id || document.getElementById('rb-' + boss.id)) return;

        const m = document.createElement('div');
        m.id = 'rb-' + boss.id;
        m.className = 'rb-marker';
        m.setAttribute('data-name', boss.name);
        
        let lastClick = 0;

        m.addEventListener('pointerdown', (e) => {
            if (isEditorMode) {
                e.stopPropagation();
                draggedBossId = boss.id;
                m.classList.add('dragging');
                m.setPointerCapture(e.pointerId);
            }
        });

        m.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isEditorMode) return;

            const now = Date.now();
            if (now - lastClick < 400) { // ДАБЛКЛИК
                lastClick = 0;
                toggleBossStatus(boss.id);
            } else { // ОДИНОЧНЫЙ КЛИК
                lastClick = now;
                setTimeout(() => { if (lastClick !== 0) { focus(boss); lastClick = 0; } }, 400);
            }
        });

        wrapper.appendChild(m);
        updateMarkerPos(boss);
    }

    function updateMarkerPos(boss) {
        const m = document.getElementById('rb-' + boss.id);
        if (m && boss.pos) {
            const p = boss.pos.split(';');
            m.style.top = p[0].split(':')[1];
            m.style.left = p[1].split(':')[1];
            if (boss.isAlive) m.classList.add('is-alive');
            else m.classList.remove('is-alive');
        }
    }

    function toggleBossStatus(id) {
        const b = bossData.find(x => x.id === id);
        if (!b) return;

        let newStatus = {};
        if (b.isAlive || b.deathTime) {
            newStatus = { isAlive: false, deathTime: null };
        } else {
            newStatus = { isAlive: false, deathTime: Date.now() };
        }

        // Принудительно обновляем локально для мгновенной реакции
        b.isAlive = newStatus.isAlive;
        b.deathTime = newStatus.deathTime;
        
        rbRef.child(id).update(newStatus);
        renderMonitor();
    }

    function listenFirebase() {
        rbRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            Object.keys(data).forEach(id => {
                const item = data[id];
                let boss = bossData.find(b => b.id === id);
                if (!boss) {
                    boss = { id, ...item };
                    bossData.push(boss);
                    createMarker(boss);
                } else {
                    Object.assign(boss, item);
                    updateMarkerPos(boss);
                }
            });
            renderMonitor();
        });
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(boss => {
            const m = document.getElementById('rb-' + boss.id);
            if (!m) return;

            if (boss.deathTime && !boss.isAlive) {
                const rem = SPAWN_WINDOW - Math.floor((now - boss.deathTime) / 1000);
                if (rem <= 0) {
                    boss.isAlive = true; boss.deathTime = null;
                    rbRef.child(boss.id).update({ isAlive: true, deathTime: null });
                } else {
                    let t = m.querySelector('.rb-timer-map');
                    if (!t) { t = document.createElement('div'); t.className = 'rb-timer-map'; m.appendChild(t); }
                    const min = Math.floor(rem / 60); const sec = rem % 60;
                    t.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                }
            } else {
                const t = m.querySelector('.rb-timer-map'); if (t) t.remove();
            }
        });
        renderMonitor();
    }

    function renderMonitor() {
        const list = document.getElementById('monitor-list');
        const now = Date.now();

        // ФИЛЬТР: Живые ИЛИ те, у кого тикает таймер
        const active = bossData.filter(b => {
            if (b.isAlive) return true;
            if (b.deathTime) {
                return (SPAWN_WINDOW - Math.floor((now - b.deathTime) / 1000)) > 0;
            }
            return false;
        });

        active.sort((a, b) => (a.isAlive === b.isAlive) ? (a.deathTime - b.deathTime) : (a.isAlive ? -1 : 1));

        if (active.length === 0) {
            list.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">Список пуст</div>';
            return;
        }

        list.innerHTML = active.map(b => {
            let timeStr = b.isAlive ? "READY" : "";
            if (b.deathTime && !b.isAlive) {
                const rem = Math.max(0, SPAWN_WINDOW - Math.floor((now - b.deathTime) / 1000));
                timeStr = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
            }
            return `<div class="monitor-item" onclick="focusById('${b.id}')">
                <div><b>${b.name}</b><br><small style="color:#777">${b.note || ''}</small></div>
                <span class="${b.isAlive ? 'ready-text' : ''}" style="font-family:monospace; border:1px solid #444; padding:2px 6px; border-radius:4px">${timeStr}</span>
            </div>`;
        }).join('');
    }

    function focusById(id) { const b = bossData.find(x => x.id === id); if (b) focus(b); }
    function focus(boss) {
        const m = document.getElementById('rb-' + boss.id);
        if(!m) return;
        const t = parseInt(m.style.top); const l = parseInt(m.style.left);
        scale = 0.8; posX = (window.innerWidth / 2) - (l * scale); posY = (window.innerHeight / 2) - (t * scale);
        update();
    }

    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function toggleEditor() {
        if (!isEditorMode) {
            if (prompt("Пароль:") === "D36rk43mgm") isEditorMode = true;
            else return;
        } else isEditorMode = false;
        document.getElementById('editor-btn').classList.toggle('active', isEditorMode);
        document.getElementById('editor-btn').innerText = isEditorMode ? "РЕДАКТОР: ВКЛ" : "РЕДАКТОР: ВЫКЛ";
    }

    function resetTimers() {
        if(confirm("Сбросить все активные таймеры?")) {
            bossData.forEach(b => {
                if (b.isAlive || b.deathTime) rbRef.child(b.id).update({ isAlive: false, deathTime: null });
            });
        }
    }

    function updateGameTime() {
        const now = new Date();
        const nowSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        const syncReal = (19 * 3600) + (56 * 60) + 6; 
        const syncGame = (17 * 60) + 36;
        let gameMin = Math.floor(syncGame + (nowSec - syncReal) / 10);
        gameMin = ((gameMin % 1440) + 1440) % 1440;
        const h = Math.floor(gameMin / 60); const m = gameMin % 60;
        document.getElementById('game-time').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    }

    // Управление картой
    let isDrag = false, lx, ly;
    window.onpointerdown = e => { if(e.button === 0 && !draggedBossId) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onpointermove = e => {
        if (draggedBossId) {
            const rect = wrapper.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / scale);
            const y = Math.round((e.clientY - rect.top) / scale);
            const m = document.getElementById('rb-' + draggedBossId);
            if (m) { m.style.top = y + 'px'; m.style.left = x + 'px'; }
        } else if (isDrag) {
            posX += e.clientX - lx; posY += e.clientY - ly;
            lx = e.clientX; ly = e.clientY; update();
        }
    };
    window.onpointerup = () => {
        if (draggedBossId) {
            const m = document.getElementById('rb-' + draggedBossId);
            if (m) rbRef.child(draggedBossId).update({ pos: `top:${m.style.top};left:${m.style.left};` });
            draggedBossId = null;
        }
        isDrag = false;
    };
    viewport.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.8 : 1.2;
        const ns = Math.min(Math.max(0.05, scale * delta), 4);
        posX = e.clientX - (e.clientX - posX) * (ns / scale);
        posY = e.clientY - (e.clientY - posY) * (ns / scale);
        scale = ns; update();
    }, { passive: false });

    init();
</script>
</body>
</html>
