<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Legend</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary-gold: #ffd700; --bg-panel: rgba(15, 15, 15, 0.95); }
        body { margin: 0; padding: 0; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; touch-action: none; }

        /* Эпик-панель: Сетка по 5 штук */
        #epic-grid {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 2000;
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 4px; padding: 5px; background: #000; border-bottom: 2px solid var(--primary-gold);
            box-sizing: border-box;
        }
        .epic-card {
            background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
            padding: 5px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .epic-card:hover { border-color: var(--primary-gold); }
        .epic-card.in-window { border-color: #ff4400; box-shadow: inset 0 0 10px #820; animation: pulse 1s infinite; }
        .e-name { font-size: 10px; font-weight: bold; color: var(--primary-gold); display: block; text-transform: uppercase; }
        .e-time { font-size: 14px; color: #00ffcc; font-family: monospace; font-weight: bold; }
        .e-status { font-size: 9px; color: #888; display: block; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Карта */
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #1a1a1a; }
        #map-wrapper { 
            position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; 
            background-image: url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true');
            will-change: transform;
        }

        /* Сайдбар */
        #sidebar {
            position: fixed; top: 100px; left: 15px; width: 260px;
            background: var(--bg-panel); padding: 15px; border-radius: 12px;
            border: 1px solid #444; z-index: 1000; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #game-time { font-size: 42px; color: var(--primary-gold); text-align: center; font-family: monospace; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,215,0,0.3); }

        /* Метки */
        .rb-marker {
            position: absolute; width: 18px; height: 18px;
            background: rgba(255,255,255,0.3); border: 2px solid #222; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
        }
        .rb-marker.is-alive { background: radial-gradient(circle, #ff4400, #880000); border-color: #fff; box-shadow: 0 0 15px #f40; width: 22px; height: 22px; z-index: 20; }
        .rb-marker.priority::before { content: '★'; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: var(--primary-gold); font-size: 24px; text-shadow: 0 0 5px #000; }
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none;
        }
        .rb-timer-map {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; border: 1px solid #00ffcc; padding: 2px 6px;
            font-size: 15px; font-family: monospace; border-radius: 4px; font-weight: bold;
        }

        /* Кнопки */
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-clear { background: #800; color: #fff; }
        .btn-clear:hover { background: #b00; }
        .btn-faq { background: #333; color: #fff; border: 1px solid #555; }
        .btn-editor { background: #000; color: #0f0; border: 1px solid #0f0; margin-top: 10px; }

        /* Модальные окна */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid var(--primary-gold); padding: 25px;
            z-index: 5000; display: none; border-radius: 12px; width: 320px; box-shadow: 0 0 100px #000;
        }
        .day-chip { display: inline-block; padding: 6px 10px; background: #222; margin: 3px; font-size: 11px; cursor: pointer; border-radius: 4px; border: 1px solid #444; }
        .day-chip.selected { background: var(--primary-gold); color: #000; border-color: #fff; }

        /* Фильтры */
        .mode-timers .rb-marker:not(.has-timer) { display: none !important; }
        .mode-ready .rb-marker.has-timer { display: none !important; }
    </style>
</head>
<body>

<div id="epic-grid"></div>

<div id="sidebar">
    <div id="game-time">00:00</div>
    
    <label style="font-size: 10px; color:#888; margin-left: 5px;">РЕЖИМ ОТОБРАЖЕНИЯ:</label>
    <select id="view-mode" onchange="updateViewMode()" style="width:100%; padding:10px; margin-bottom:15px; background:#222; color:#fff; border:1px solid #444; border-radius:8px;">
        <option value="default">Все Боссы</option>
        <option value="timers">Только Таймеры</option>
        <option value="ready">Только Живые</option>
    </select>

    <button class="btn btn-clear" onclick="clearAllTimers()">ОЧИСТИТЬ СПИСОК</button>
    <button class="btn btn-faq" onclick="showModal('faq-modal')">FAQ / ПОМОЩЬ</button>
    <button class="btn btn-editor" id="editor-btn" onclick="toggleEditor()">РЕДАКТОР: ВЫКЛ</button>
    
    <div id="monitor-list" style="margin-top:15px;"></div>
</div>

<div id="epic-modal" class="modal">
    <h3 id="m-title" style="margin:0 0 15px 0; color:var(--primary-gold); text-align:center;"></h3>
    <label style="font-size:12px; color:#aaa;">Число месяца:</label>
    <input type="number" id="s-date" style="width:100%; padding:8px; margin-bottom:12px; background:#000; color:#fff; border:1px solid #444;">
    <label style="font-size:12px; color:#aaa;">Время начала (МСК):</label>
    <input type="time" id="s-time" style="width:100%; padding:8px; margin-bottom:12px; background:#000; color:#fff; border:1px solid #444;">
    
    <div id="day-picker" style="margin-bottom:15px; text-align:center;">
        <div class="day-chip" data-day="1">ПН</div><div class="day-chip" data-day="2">ВТ</div>
        <div class="day-chip" data-day="3">СР</div><div class="day-chip" data-day="4">ЧТ</div>
        <div class="day-chip" data-day="5">ПТ</div><div class="day-chip" data-day="6">СБ</div>
        <div class="day-chip" data-day="0">ВС</div>
    </div>
    
    <button onclick="saveEpic()" style="width:100%; background:var(--primary-gold); padding:12px; border:none; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
    <button onclick="hideModal('epic-modal')" style="width:100%; background:transparent; color:#888; border:none; margin-top:10px; cursor:pointer;">ОТМЕНА</button>
</div>

<div id="faq-modal" class="modal">
    <h3 style="color:var(--primary-gold); text-align:center;">Инструкция</h3>
    <div style="font-size:13px; line-height:1.6; color:#ccc;">
        • <b>Клик по Эпику:</b> Настройка даты/времени.<br>
        • <b>Двойной клик по РБ:</b> Метка убита (таймер 15м).<br>
        • <b>Звезда:</b> В режиме редактора клик по РБ ставит ★ (Приоритет).<br>
        • <b>Очистка:</b> Кнопка сбрасывает все таймеры сразу.
    </div>
    <button onclick="hideModal('faq-modal')" style="width:100%; background:var(--primary-gold); padding:10px; border:none; font-weight:bold; margin-top:20px;">ПОНЯТНО</button>
</div>

<div id="viewport"><div id="map-wrapper"></div></div>

    ];

    let epics = ["Queen Ant", "Core", "Orfen", "Zaken", "Baium", "Frintezza", "Antharas", "Valakas", "Beleth"];
    let epicStates = {};
    let isEditor = false;
    let selectedEpic = null;

    function init() {
        const grid = document.getElementById('epic-grid');
        epics.forEach(name => {
            const id = name.replace(/\s/g, '');
            grid.innerHTML += `
                <div class="epic-card" id="e-${id}" onclick="openEpic('${name}')">
                    <span class="e-name">${name}</span>
                    <span class="e-time">--:--:--</span>
                    <span class="e-status">ЖДЁТ</span>
                </div>`;
        });

        document.querySelectorAll('.day-chip').forEach(c => {
            c.onclick = () => c.classList.toggle('selected');
        });

        sync();
        setInterval(tick, 1000);
        setInterval(updateServerTime, 1000);
        setInterval(updateEpicTimers, 1000);
    }

    function sync() {
        rbRef.on('value', snap => {
            const fb = snap.val() || {};
            bossData.forEach(b => {
                if(fb[b.id]) {
                    b.isAlive = fb[b.id].isAlive;
                    b.deathTime = fb[b.id].deathTime;
                    b.priority = fb[b.id].priority;
                }
            });
            render();
        });
        epicRef.on('value', snap => epicStates = snap.val() || {});
    }

    function render() {
        const wrap = document.getElementById('map-wrapper');
        bossData.forEach(b => {
            let m = document.getElementById('marker-' + b.id);
            if(!m) {
                m = document.createElement('div');
                m.id = 'marker-' + b.id; m.className = 'rb-marker';
                m.onclick = (e) => {
                    if(isEditor) { toggleStar(b.id); return; }
                    handleRB(b);
                };
                wrap.appendChild(m);
            }
            const p = b.pos.split(';');
            m.style.top = p[0].split(':')[1];
            m.style.left = p[1].split(':')[1];
            m.setAttribute('data-name', b.name);
            m.classList.toggle('is-alive', !!b.isAlive);
            m.classList.toggle('priority', !!b.priority);
            m.classList.toggle('has-timer', (b.deathTime && !b.isAlive));
        });
        updateList();
    }

    function clearAllTimers() {
        if(!confirm("Сбросить все таймеры боссов?")) return;
        let resetObj = {};
        bossData.forEach(b => {
            resetObj[b.id] = { isAlive: true, deathTime: null, priority: !!b.priority };
        });
        rbRef.update(resetObj).then(() => alert("Список очищен!"));
    }

    function updateEpicTimers() {
        const now = new Date();
        const server = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (3 * 3600000));

        epics.forEach(name => {
            const id = name.replace(/\s/g, '');
            const cfg = epicStates[id];
            const card = document.getElementById(`e-${id}`);
            if(!cfg || !card) return;

            const target = new Date(server);
            target.setDate(cfg.startDate);
            const [h, m] = cfg.startTime.split(':');
            target.setHours(h, m, 0, 0);

            const diff = target - server;
            const tText = card.querySelector('.e-time');
            const sText = card.querySelector('.e-status');

            if(diff < 0) {
                const windowEnd = new Date(target.getTime() + 30 * 60000);
                if(server < windowEnd) {
                    card.classList.add('in-window');
                    sText.innerText = "ОКНО ПОЯВЛЕНИЯ";
                    tText.innerText = fmt(Math.floor((windowEnd - server)/1000));
                } else {
                    card.classList.remove('in-window');
                    sText.innerText = "ОЖИДАНИЕ СЛЕД.";
                    tText.innerText = "CLOSED";
                }
            } else {
                card.classList.remove('in-window');
                sText.innerText = "ДО СТАРТА";
                tText.innerText = fmt(Math.floor(diff/1000));
            }
        });
    }

    function handleRB(b) {
        const now = Date.now();
        if(b.lc && (now - b.lc < 400)) {
            rbRef.child(b.id).update({ isAlive: false, deathTime: now });
        }
        b.lc = now;
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(b => {
            if(b.deathTime && !b.isAlive) {
                const rem = 900 - Math.floor((now - b.deathTime)/1000);
                const m = document.getElementById('marker-' + b.id);
                if(rem <= 0) rbRef.child(b.id).update({ isAlive: true, deathTime: null });
                else {
                    let t = m.querySelector('.rb-timer-map') || document.createElement('div');
                    t.className = 'rb-timer-map'; m.appendChild(t);
                    t.innerText = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
                }
            }
        });
    }

    function updateList() {
        const list = document.getElementById('monitor-list');
        const items = bossData.filter(b => b.isAlive || b.deathTime).sort((a,b) => (b.priority - a.priority));
        list.innerHTML = items.map(b => `
            <div style="font-size:12px; padding:6px; border-bottom:1px solid #333; color:${b.priority?'var(--primary-gold)':'#fff'}">
                ${b.priority?'★ ':''}${b.name} - <span style="color:${b.isAlive?'#0f0':'#0ff'}">${b.isAlive?'READY':'TIMER'}</span>
            </div>
        `).join('');
    }

    function updateServerTime() {
        const now = new Date();
        const nowSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        const syncReal = (19 * 3600) + (56 * 60) + 6; const syncGame = (17 * 60) + 36;
        let gameMin = Math.floor(syncGame + (nowSec - syncReal) / 10);
        gameMin = ((gameMin % 1440) + 1440) % 1440;
        document.getElementById('game-time').innerText = `${Math.floor(gameMin/60).toString().padStart(2,'0')}:${(gameMin%60).toString().padStart(2,'0')}`;
    }

    function fmt(s) {
        const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60); const sec = s%60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function openEpic(name) {
        selectedEpic = name;
        document.getElementById('m-title').innerText = name;
        showModal('epic-modal');
    }
    
    function saveEpic() {
        const d = document.getElementById('s-date').value;
        const t = document.getElementById('s-time').value;
        const days = Array.from(document.querySelectorAll('.day-chip.selected')).map(c => parseInt(c.dataset.day));
        if(!d || !t) return alert("Заполни поля!");
        epicRef.child(selectedEpic.replace(/\s/g, '')).set({ startDate: parseInt(d), startTime: t, days: days });
        hideModal('epic-modal');
    }

    function toggleEditor() {
        if(!isEditor) { if(prompt("Pass:") === "D36rk43mgm") isEditor = true; else return; } else isEditor = false;
        document.getElementById('editor-btn').innerText = isEditor ? "РЕДАКТОР: ВКЛ" : "РЕДАКТОР: ВЫКЛ";
    }
    
    function toggleStar(id) {
        const b = bossData.find(x => x.id === id);
        rbRef.child(id).update({ priority: !b.priority });
    }

    function updateViewMode() {
        const mode = document.getElementById('view-mode').value;
        document.getElementById('map-wrapper').className = mode === 'default' ? '' : 'mode-' + mode;
    }

    // Drag & Zoom
    let scale = 0.2, posX = 0, posY = 0, isDrag = false, lx, ly;
    window.onpointerdown = e => { if(e.target.id === 'viewport' || e.target.id === 'map-wrapper') { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onpointermove = e => { if(!isDrag) return; posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; upd(); };
    window.onpointerup = () => isDrag = false;
    window.onwheel = e => { scale = Math.min(Math.max(0.1, scale * (e.deltaY > 0 ? 0.9 : 1.1)), 2); upd(); };
    function upd() { document.getElementById('map-wrapper').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    init();
</script>
</body>
</html>
