<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 FarmRB - Pro Monitor</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; }

        /* МЕТКИ */
        .rb-marker {
            position: absolute; width: 26px; height: 26px;
            background: #000; border: 2px solid #555; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
            transition: background 0.4s, box-shadow 0.4s;
        }

        /* КРАСНАЯ МЕТКА (Босс жив) */
        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff3300 0%, #880000 100%) !important; 
            border-color: #fff !important; 
            box-shadow: 0 0 20px rgba(255, 50, 0, 1) !important; 
        }
        
        /* НАЗВАНИЕ НА КАРТЕ (Оригинальное) */
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #00ff88; padding: 3px 10px;
            border-radius: 4px; font-size: 12px; white-space: nowrap; border: 1px solid #444; pointer-events: none;
        }

        .rb-timer-map {
            position: absolute; bottom: 58px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 2px 8px; border-radius: 4px;
            font-weight: bold; font-family: monospace; font-size: 16px;
            border: 1px solid #00ffcc; z-index: 100; pointer-events: none;
        }

        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 320px;
            background: rgba(10, 10, 10, 0.95); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 12px; backdrop-filter: blur(8px);
        }

        #timer-monitor {
            background: rgba(0, 255, 204, 0.03); border: 1px solid #00ffcc22;
            border-radius: 8px; padding: 10px; margin-top: 15px;
            max-height: 500px; overflow-y: auto;
        }
        
        .monitor-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 6px;
        }

        /* ТЕХНИЧЕСКАЯ ПРИПИСКА В СПИСКЕ */
        .monitor-note { color: #00ffcc; font-weight: bold; font-family: monospace; }
        .ready-text { color: #ff3300; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        #search-input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; outline: none; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #00ffcc44; }
    </style>
</head>
<body>

<div id="sidebar">
    <input type="text" id="search-input" placeholder="Поиск (имя или код)..." oninput="handleSearch()">
    
    <div style="font-size: 11px; color: #888; margin-top: 15px; text-align: center; font-weight: bold; text-transform: uppercase;">
        Активные респауны
    </div>

    <div id="timer-monitor">
        <div id="monitor-list">
            <div style="color: #444; font-size: 11px; text-align: center;">Таймеры не запущены</div>
        </div>
    </div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    const MAP_IMAGE = "https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true";
    
    // Данные: Name для карты, Note для мониторинга
    let bossData = [
        { name: "Abyss Brukunt", note: "ll_woatab 2tab", pos: "top:2721px;left:4385px;" },
        { name: "Demon Kurikups", note: "dd_sumtoi kirikups", pos: "top:3725px;left:3430px;" },
        { name: "Ghost of the Lidia", note: "ll_woatab center", pos: "top:1906px;left:4528px;" },
        { name: "Fierce Tiger King Angel", note: "ll_woatab 1tab", pos: "top:2713px;left:4517px;" },
        { name: "Shilen's Priest Hisilrome", note: "ll_woatab 3tab", pos: "top:2279px;left:4503px;" },
        { name: "Rahha", note: "pp_woawarka KETP", pos: "top:1981px;left:4047px;" },
        { name: "Enmity Ghost Ramdal", note: "dd_sumtoi 1pl", pos: "top:2128px;left:3955px;" },
        { name: "Gargoyle Lord Tiphon", note: "ww_ulanworktk tripon", pos: "top:1853px;left:4509px;" },
        { name: "Demons Agent Falston", note: "ll_woatab 5tab", pos: "top:1460px;left:3819px;" },
        { name: "Kernon's Faithful Servant Kelone", note: "th_ostrov bswerx", pos: "top:1838px;left:4284px;" },
        { name: "Spirit of Andras the Betrayer", note: "ww_ulanworktk androna", pos: "top:1851px;left:4661px;" },
        { name: "Anakim's Nemesis Zakaron", note: "kk_port1 ssakaron", pos: "top:2750px;left:4256px;" },
        { name: "Flame of Splendor Barakiel", note: "ll_woatab finisrb", pos: "top:1376px;left:3793px;" },
        { name: "Korim", note: "ww_ulanworktk ibobo", pos: "top:2259px;left:3958px;" },
        { name: "Palibati Queen Themis", note: "ww_ulanworktk paibatis", pos: "top:2226px;left:4712px;" },
        { name: "Shilen's Messenger Cabrio", note: "kk_port1 sabrio", pos: "top:2145px;left:4614px;" },
        { name: "Immortal Savior Mardil", note: "dd_sumtoi 4pl", pos: "top:2216px;left:3954px;" },
        { name: "Doom Blade Tanatos", note: "pp_woawarka KBOX", pos: "top:1953px;left:4150px;" },
        { name: "Water Dragon Seer Sheshark", note: "th_ostrov ostrov2", pos: "top:3295px;left:3959px;" },
        { name: "Death Lord Hallate", note: "dd_sumtoi 2pl", pos: "top:2175px;left:3959px;" },
        { name: "Beast Lord Behemoth", note: "LL_ULANX500 PIhIMOT", pos: "top:1870px;left:4098px;" },
        { name: "Meanas Anor", note: "pp_woawarka fffff", pos: "top:1992px;left:4402px;" },
        { name: "Roaring Skylancer", note: "pp_woawarka lancer", pos: "top:2527px;left:4165px;" },
        { name: "Eilhalder von Hellmann", note: "th_ostrov fodvil", pos: "top:1729px;left:3504px;" },
        { name: "Vanor Chief Kandra", note: "kk_port1 kandraa", pos: "top:1565px;left:4027px;" },
        { name: "Fafurion's Herald Lokness", note: "th_ostrov ostrov1", pos: "top:3295px;left:3910px;" },
        { name: "Krokian Padisha Sobekk", note: "th_ostrov ostrov3", pos: "top:3291px;left:4064px;" },
        { name: "Bloody Empress Decarbia", note: "LL_ULANX500 kobria", pos: "top:2161px;left:4690px;" },
        { name: "Death Lord Ipos", note: "LL_ULANX500 IBOS", pos: "top:1949px;left:4379px;" },
        { name: "Death Lord Shax", note: "kk_port1 sky4len", pos: "top:1997px;left:4512px;" },
        { name: "Kernon", note: "dd_sumtoi 8pl", pos: "top:2129px;left:4074px;" },
        { name: "Lesser Giant Olkuth", note: "LL_ULANX500 PLOVER", pos: "top:2405px;left:4679px;" },
        { name: "Storm Winged Naga", note: "th_ostrov bsnaga", pos: "top:1894px;left:4227px;" },
        { name: "Palatanos of Horrific Power", note: "pp_woawarka PALATAN5", pos: "top:1906px;left:4305px;" },
        { name: "Flamestone Giant", note: "pp_woawarka WATP", pos: "top:2014px;left:4287px;" },
        { name: "Ocean Flame Ashakiel", note: "th_ostrov ostrov4", pos: "top:3264px;left:4100px;" },
        { name: "Hestia, Guardian Deity of the Hot Springs", note: "kk_port1 hestia", pos: "top:1152px;left:4191px;" },
        { name: "Fire of Wrath Shuriel", note: "dd_sumtoi 10pl", pos: "top:2174px;left:4076px;" },
        { name: "Longhorn Golkonda", note: "ww_ulanworktk halgonda", pos: "top:2216px;left:4078px;" },
        { name: "Cherub Galaxia", note: "dd_sumtoi 13pl", pos: "top:2261px;left:4084px;" },
        { name: "Varka's Hero Shadith", note: "pp_woawarka iiiadit", pos: "top:1750px;left:4017px;" },
        { name: "Varka's Commander Mos", note: "LL_ULANX500 5ALI", pos: "top:1770px;left:3960px;" },
        { name: "Ember", note: "ww_ulanworktk urkahan", pos: "top:1173px;left:4720px;" },
        { name: "Uruka", note: "ww_ulanworktk bember", pos: "top:1990px;left:3002px;" },
        { name: "Soul of Water Ashutar", note: "kk_port1 wwarka", pos: "top:1765px;left:3911px;" },
        { name: "Soul of Fire Nastron", note: "kk_port1 kketra", pos: "top:1411px;left:4266px;" },
        { name: "Varka's Chief Horus", note: "LL_ULANX500 4ALI", pos: "top:1721px;left:3923px;" },
        { name: "Andreas van Halter", note: "LL_ULANX500 PAGANKA", pos: "top:1640px;left:3222px;" },
        { name: "Plague Golem", note: "ll_woatab 4tab", pos: "top:1584px;left:4509px;" },
        { name: "MILENU", note: "GM_RUSMAG FSO", pos: "top:3972px;left:3737px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const monitorList = document.getElementById('monitor-list');
    const viewport = document.getElementById('viewport');
    let scale = 0.2, posX = 0, posY = 0;

    function init() {
        wrapper.style.backgroundImage = `url('${MAP_IMAGE}')`;
        drawMarkers();
        update();
    }

    function drawMarkers() {
        wrapper.innerHTML = '';
        bossData.forEach((boss) => {
            const m = document.createElement('div');
            m.className = 'rb-marker';
            m.style.cssText = boss.pos;
            m.setAttribute('data-name', boss.name); // На карте ИМЯ
            
            m.onclick = (e) => {
                e.stopPropagation();
                if (m.classList.contains('is-alive')) {
                    m.classList.remove('is-alive');
                    boss.currentTime = null;
                    updateMonitor();
                } else if (!boss.timerInterval) {
                    startTimer(boss);
                } else {
                    focus(boss);
                }
            };
            wrapper.appendChild(m);
            boss.markerEl = m;
        });
    }

    function startTimer(boss) {
        if (boss.timerInterval) return;
        let timeLeft = 15 * 60;
        const timerDisplay = document.createElement('div');
        timerDisplay.className = 'rb-timer-map';
        boss.markerEl.appendChild(timerDisplay);
        boss.timerDisplay = timerDisplay;

        boss.timerInterval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;
            timerDisplay.innerText = timeStr;
            boss.currentTime = timeStr;

            if (timeLeft <= 0) {
                clearInterval(boss.timerInterval);
                boss.timerInterval = null;
                timerDisplay.remove();
                boss.markerEl.classList.add('is-alive');
                boss.currentTime = "READY!";
            }
            updateMonitor();
        }, 1000);
        updateMonitor();
    }

    function updateMonitor() {
        const active = bossData.filter(b => b.timerInterval || b.currentTime === "READY!");
        if (active.length === 0) {
            monitorList.innerHTML = '<div style="color: #444; font-size: 11px; text-align: center;">Таймеры не запущены</div>';
            return;
        }
        monitorList.innerHTML = active.map(b => {
            const isReady = b.currentTime === "READY!";
            return `
                <div class="monitor-item">
                    <span class="monitor-note">${b.note}</span>
                    <span class="${isReady ? 'ready-text' : ''}" style="font-family:monospace; background:${isReady ? '#ff330022' : '#00ffcc22'}; padding:2px 6px; border-radius:4px;">
                        ${b.currentTime}
                    </span>
                </div>
            `;
        }).join('');
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        if (val.length < 2) return;
        // Поиск работает и по имени, и по приписке
        const boss = bossData.find(b => b.name.toLowerCase().includes(val) || b.note.toLowerCase().includes(val));
        if (boss) focus(boss);
    }

    function focus(boss) {
        const t = parseInt(boss.pos.match(/top:(\d+)px/)[1]);
        const l = parseInt(boss.pos.match(/left:(\d+)px/)[1]);
        scale = 0.8;
        posX = (window.innerWidth/2) - (l * scale);
        posY = (window.innerHeight/2) - (t * scale);
        update();
    }

    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    viewport.onwheel = e => { e.preventDefault(); const d = e.deltaY > 0 ? 0.8 : 1.2; const ns = Math.min(Math.max(0.05, scale * d), 4); posX = e.clientX - (e.clientX - posX) * (ns / scale); posY = e.clientY - (e.clientY - posY) * (ns / scale); scale = ns; update(); };
    let isDrag = false, lx, ly;
    viewport.onmousedown = e => { if(e.button === 0) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onmousemove = e => { if (isDrag) { posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); } };
    window.onmouseup = () => { isDrag = false; };
    viewport.oncontextmenu = e => e.preventDefault();
    init();
</script>
</body>
</html>
