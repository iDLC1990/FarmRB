<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 Aden World - Atlas & Editor</title>
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: #eee; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        
        #viewport {
            width: 100vw; height: 100vh;
            cursor: grab; overflow: hidden; position: relative;
            background: #000;
        }

        #map-wrapper {
            position: absolute;
            transform-origin: 0 0;
            background-image: url('https://lineage.pmfun.com/data/maps/world/Aden%20World%20Map%20CT2%20%28relief_KPAK_Edit%29.gif');
            background-repeat: no-repeat;
            width: 5062px; height: 4210px; 
            background-size: contain;
        }

        /* Метки */
        .rb-marker {
            position: absolute; width: 16px; height: 16px;
            background: radial-gradient(circle, #ff0000 0%, #660000 100%);
            border: 2px solid #fff; border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255,0,0,0.7);
            z-index: 10; cursor: pointer;
            transition: transform 0.2s;
        }
        .rb-marker:hover { transform: translate(-50%, -50%) scale(1.5); z-index: 100; }
        .rb-marker::after {
            content: attr(data-name);
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #00ff88; padding: 4px 8px;
            border-radius: 4px; font-size: 12px; white-space: nowrap;
            opacity: 0; transition: opacity 0.2s; pointer-events: none; border: 1px solid #00ff88;
        }
        .rb-marker:hover::after { opacity: 1; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(2.5); box-shadow: 0 0 30px red; }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .highlight { animation: pulse 1s ease-in-out 3; z-index: 1000 !important; }

        /* Боковая панель */
        #sidebar {
            position: fixed; top: 20px; left: 20px; width: 300px; bottom: 20px;
            background: rgba(15, 15, 15, 0.95); border: 1px solid #333;
            padding: 20px; z-index: 1000; border-radius: 12px;
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }

        .mode-toggle {
            background: #222; border: 1px solid #444; border-radius: 8px;
            display: flex; margin-bottom: 20px; padding: 4px;
        }
        .mode-toggle button {
            flex: 1; border: none; padding: 8px; background: none; color: #888;
            cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s;
        }
        .mode-toggle button.active { background: #008855; color: white; }

        #search {
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444;
            background: #050505; color: #fff; margin-bottom: 15px; box-sizing: border-box;
        }

        #rb-list { flex: 1; overflow-y: auto; }
        .rb-item {
            padding: 8px 10px; margin-bottom: 4px; border-radius: 4px;
            background: #1a1a1a; cursor: pointer; font-size: 13px; border-left: 3px solid transparent;
        }
        .rb-item:hover { background: #222; color: #00ff88; border-left-color: #00ff88; }

        /* Панель редактора (скрыта по умолчанию) */
        #editor-tools { display: none; margin-top: 15px; border-top: 1px solid #333; pt: 15px; }
        textarea {
            width: 100%; height: 150px; background: #000; color: #00ff88;
            border: 1px solid #333; font-family: monospace; font-size: 10px;
            margin: 10px 0; padding: 5px; box-sizing: border-box;
        }
        .edit-hint { font-size: 11px; color: #ffaa00; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="mode-toggle">
        <button id="viewModeBtn" class="active" onclick="setMode('view')">ПРОСМОТР</button>
        <button id="editModeBtn" onclick="setMode('edit')">РЕДАКТОР</button>
    </div>

    <div id="view-tools">
        <input type="text" id="search" placeholder="Поиск босса...">
        <div id="rb-list"></div>
    </div>

    <div id="editor-tools">
        <div class="edit-hint">● ЛКМ: Поставить метку<br>● ПКМ: Двигать карту<br>● Клик на метку: Удалить</div>
        <textarea id="output" readonly></textarea>
        <button style="width:100%; padding:8px; cursor:pointer;" onclick="copyOutput()">Копировать JSON</button>
    </div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    // Твои данные
    let bossData = [

        { name: "Sealed Evil Power Sailren", pos: "top:1904px;left:2638px;" },
        { name: "Soul of Fire Nastron", pos: "top:1345px;left:3529px;" },
        { name: "Soul of Water Ashutar", pos: "top:1688px;left:3244px;" },
        { name: "Daimon the White-Eyed", pos: "top:1636px;left:3857px;" },

        { name: "Ocean Flame Ashakiel", pos: "top:3118px;left:3390px;" },
        { name: "Flamestone Giant", pos: "top:1923px;left:3548px;" },
        { name: "Palatanos of Horrific Power", pos: "top:1810px;left:3567px;" },

        { name: "Meanas Anor", pos: "top:1908px;left:3637px;" },
        { name: "Beast Lord Behemoth", pos: "top:1784px;left:3391px;" },
        { name: "Icicle Emperor Bumbalump", pos: "top:1056px;left:3642px;" },
        { name: "Water Dragon Seer Sheshark", pos: "top:3145px;left:3270px;" },
        { name: "Doom Blade Tanatos", pos: "top:1866px;left:3419px;" },
        { name: "Shilen's Messenger Cabrio", pos: "top:2052px;left:3821px;" },
        { name: "Palibati Queen Themis", pos: "top:2130px;left:3909px;" },
        { name: "Flame of Splendor Barakiel", pos: "top:1307px;left:3137px;" },
        { name: "Anakim's Nemesis Zakaron", pos: "top:2628px;left:3525px;" },
        { name: "Spirit of Andras the Betrayer", pos: "top:1771px;left:3857px;" },
        { name: "Kernon's Faithful Servant Kelone", pos: "top:1758px;left:3554px;" },
        { name: "Last Titan Utenus", pos: "top:2384px;left:3858px;" },
        { name: "Demons Agent Falston", pos: "top:1400px;left:3160px;" },
        { name: "Gargoyle Lord Tiphon", pos: "top:1765px;left:3734px;" },
        { name: "Rahha", pos: "top:1892px;left:3344px;" },
        { name: "Hekaton Prime", pos: "top:2420px;left:3887px;" },
        { name: "Shilen's Priest Hisilrome", pos: "top:2171px;left:3728px;" },
        { name: "Fierce Tiger King Angel", pos: "top:2595px;left:3741px;" },
        { name: "Gorgolos", pos: "top:2419px;left:3832px;" },
        { name: "Roaring Lord Kastor", pos: "top:1947px;left:3244px;" },
        { name: "Abyss Brukunt", pos: "top:2600px;left:3634px;" },
        { name: "Demon Kurikups", pos: "top:3576px;left:2826px;" },
        { name: "Ghost of the Lidia", pos: "top:1826px;left:3740px;" },
        { name: "Enmity Ghost Ramdal", pos: "top:2048px;left:3251px;" },
        { name: "Immortal Savior Mardil", pos: "top:2126px;left:3253px;" },
        { name: "Death Lord Hallate", pos: "top:2089px;left:3251px;" },
        { name: "Korim", pos: "top:2167px;left:3258px;" },
        { name: "Kernon", pos: "top:2049px;left:3378px;" },
        { name: "Fire of Wrath Shuriel", pos: "top:2100px;left:3379px;" },
        { name: "Longhorn Golkonda", pos: "top:2140px;left:3381px;" },
        { name: "Cherub Galaxia", pos: "top:2180px;left:3375px;" },
        { name: "MILENU", pos: "top:3796px;left:3097px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    const rbList = document.getElementById('rb-list');
    const output = document.getElementById('output');
    const searchInput = document.getElementById('search');

    let scale = 0.25;
    let posX = 100, posY = 100;
    let currentMode = 'view'; // 'view' или 'edit'

    function init() {
        renderMarkers();
        render();
    }

    // Переключение режимов
    function setMode(mode) {
        currentMode = mode;
        document.getElementById('viewModeBtn').classList.toggle('active', mode === 'view');
        document.getElementById('editModeBtn').classList.toggle('active', mode === 'edit');
        document.getElementById('editor-tools').style.display = mode === 'edit' ? 'block' : 'none';
        document.getElementById('view-tools').style.display = mode === 'view' ? 'block' : 'none';
        viewport.style.cursor = mode === 'view' ? 'grab' : 'crosshair';
        updateOutput();
    }

    // Отрисовка всех меток и списка
    function renderMarkers() {
        wrapper.innerHTML = '';
        rbList.innerHTML = '';
        bossData.forEach((boss, index) => {
            // Маркер на карту
            const marker = document.createElement('div');
            marker.className = 'rb-marker';
            marker.setAttribute('style', boss.pos);
            marker.setAttribute('data-name', boss.name);
            marker.id = `marker-${index}`;
            
            marker.onclick = (e) => {
                e.stopPropagation();
                if (currentMode === 'edit') {
                    if (confirm(`Удалить ${boss.name}?`)) {
                        bossData.splice(index, 1);
                        renderMarkers();
                        updateOutput();
                    }
                } else {
                    focusOnBoss(boss, marker);
                }
            };
            wrapper.appendChild(marker);

            // Элемент в список
            const item = document.createElement('div');
            item.className = 'rb-item';
            item.innerText = boss.name;
            item.onclick = () => focusOnBoss(boss, marker);
            rbList.appendChild(item);
            boss.element = item;
        });
    }

    function focusOnBoss(boss, marker) {
        const top = parseInt(boss.pos.match(/top:(\d+)px/)[1]);
        const left = parseInt(boss.pos.match(/left:(\d+)px/)[1]);
        scale = 0.7;
        posX = (window.innerWidth / 2) - (left * scale);
        posY = (window.innerHeight / 2) - (top * scale);
        render();
        marker.classList.remove('highlight');
        void marker.offsetWidth;
        marker.classList.add('highlight');
    }

    // Клик по карте (только в режиме редактора)
    viewport.addEventListener('click', (e) => {
        if (currentMode !== 'edit' || isDragging) return;
        if (e.target.classList.contains('rb-marker')) return;

        const rect = wrapper.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) / scale);
        const y = Math.round((e.clientY - rect.top) / scale);

        const name = prompt("Имя нового босса:", "New Boss");
        if (name) {
            bossData.push({ name, pos: `top:${y}px;left:${x}px;` });
            renderMarkers();
            updateOutput();
        }
    });

    function updateOutput() {
        const cleanData = bossData.map(b => ({ name: b.name, pos: b.pos }));
        output.value = JSON.stringify(cleanData, null, 2);
    }

    function render() {
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    // Зум
    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.85 : 1.15;
        const newScale = Math.min(Math.max(0.1, scale * delta), 3);
        posX = e.clientX - (e.clientX - posX) * (newScale / scale);
        posY = e.clientY - (e.clientY - posY) * (newScale / scale);
        scale = newScale;
        render();
    };

    // Движение
    let isDragging = false, lastX, lastY;
    viewport.oncontextmenu = (e) => e.preventDefault();
    viewport.onmousedown = (e) => {
        // В режиме просмотра тянем ЛКМ (0), в режиме редактора - ПКМ (2)
        const dragButton = currentMode === 'view' ? 0 : 2;
        if (e.button === dragButton) { 
            isDragging = true; lastX = e.clientX; lastY = e.clientY; 
            if(currentMode === 'view') viewport.style.cursor = 'grabbing';
        }
    };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX += (e.clientX - lastX);
        posY += (e.clientY - lastY);
        lastX = e.clientX; lastY = e.clientY;
        render();
    };
    window.onmouseup = () => {
        isDragging = false;
        viewport.style.cursor = currentMode === 'view' ? 'grab' : 'crosshair';
    };

    // Поиск
    searchInput.oninput = (e) => {
        const q = e.target.value.toLowerCase();
        bossData.forEach(b => {
            if(b.element) b.element.style.display = b.name.toLowerCase().includes(q) ? 'block' : 'none';
        });
    };

    function copyOutput() {
        output.select();
        document.execCommand('copy');
        alert("Код скопирован в буфер!");
    }

    init();
</script>

</body>
</html>
