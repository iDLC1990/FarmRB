<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Mobile Optimized</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        .rb-marker {
            position: absolute; width: 26px; height: 26px;
            background: #000; border: 2px solid #555; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
            transition: background 0.4s, box-shadow 0.4s, border-color 0.4s;
        }

        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff3300 0%, #880000 100%) !important; 
            border-color: #fff !important; 
            box-shadow: 0 0 20px rgba(255, 50, 0, 1) !important; 
        }
        
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #00ff88; padding: 3px 10px;
            border-radius: 4px; font-size: 11px; white-space: nowrap; border: 1px solid #444; pointer-events: none;
        }

        .rb-timer-map {
            position: absolute; bottom: 58px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 2px 8px; border-radius: 4px;
            font-weight: bold; font-family: monospace; font-size: 14px;
            border: 1px solid #00ffcc; z-index: 100; pointer-events: none;
        }

        /* АДАПТИВНАЯ БОКОВАЯ ПАНЕЛЬ */
        #sidebar {
            position: fixed; top: 10px; left: 10px; 
            width: calc(100% - 40px); max-width: 300px;
            background: rgba(10, 10, 10, 0.92); border: 1px solid #333;
            padding: 12px; z-index: 1000; border-radius: 12px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #timer-monitor {
            background: rgba(0, 255, 204, 0.03); border: 1px solid #00ffcc22;
            border-radius: 8px; padding: 8px; margin-top: 10px;
            max-height: 35vh; overflow-y: auto;
        }
        
        .monitor-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px;
        }

        .monitor-note { color: #00ffcc; font-weight: bold; font-family: 'Courier New', monospace; font-size: 13px; }
        .ready-text { color: #ff3300; font-weight: bold; animation: blink 1s infinite; text-shadow: 0 0 5px #ff3300; }
        
        @keyframes blink { 50% { opacity: 0.4; } }

        #search-input { 
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; 
            background: #111; color: #fff; box-sizing: border-box; outline: none; font-size: 14px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #00ffcc44; }
    </style>
</head>
<body>

<div id="sidebar">
    <input type="text" id="search-input" placeholder="Поиск босса или кода..." oninput="handleSearch()">
    
    <div style="font-size: 10px; color: #888; margin-top: 12px; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">
        Активные таймеры / Респаун
    </div>

    <div id="timer-monitor">
        <div id="monitor-list">
            <div style="color: #444; font-size: 11px; text-align: center; padding: 10px;">Список пуст</div>
        </div>
    </div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

        { name: "Soul of Fire Nastron", note: "kk_port1 kketra", pos: "top:1411px;left:4266px;" },
        { name: "Varka's Chief Horus", note: "LL_ULANX500 4ALI", pos: "top:1721px;left:3923px;" },
        { name: "Andreas van Halter", note: "LL_ULANX500 PAGANKA", pos: "top:1640px;left:3222px;" },
        { name: "Plague Golem", note: "ll_woatab 4tab", pos: "top:1584px;left:4509px;" },
        { name: "MILENU", note: "GM_RUSMAG FSO", pos: "top:3972px;left:3737px;" },
        { name: "Ketra's Chief Brakki", note: "kk_port1 kketra", pos: "top:1385px;left:4289px;" },
        { name: "Ketra's Commander Tayr", note: "kk_port1 kketra", pos: "top:1421px;left:4298px;" },
        { name: "Ketra's Hero Hekaton", note: "Ketra Hekaton", pos: "top:1477px;left:4316px;" },
        { name: "Queen Shyeed", note: "Queen Shyeed", pos: "top:1714px;left:3813px;" },
        { name: "Lord of Splendor Anays", note: "Anays", pos: "top:1402px;left:4036px;" },
        { name: "Sealed Evil Power Sailren", note: "Sailren", pos: "top:1956px;left:3236px;" },
        { name: "Daimon the White-Eyed", note: "Daimon", pos: "top:1717px;left:4660px;" },
        { name: "Last Lesser Giant Glaki", note: "Glaki", pos: "top:2492px;left:4526px;" },
        { name: "Icicle Emperor Bumbalump", note: "Bumbalump", pos: "top:1103px;left:4403px;" },
        { name: "Gorgolos", note: "GM_RUSMAG BATAT", pos: "top:2542px;left:4659px;" },
        { name: "Roaring Lord Kastor", note: "Kastor", pos: "top:2035px;left:3921px;" },
        { name: "Hekaton Prime", note: "GM_RUSMAG BATAT", pos: "top:2606px;left:4688px;" },
        { name: "Last Titan Utenus", note: "GM_RUSMAG BATAT", pos: "top:2579px;left:4672px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const monitorList = document.getElementById('monitor-list');
    const viewport = document.getElementById('viewport');
    
    // Начальные настройки масштаба под мобилку
    let scale = window.innerWidth / 5062; 
    let posX = 0, posY = 0;

    function init() {
        wrapper.style.backgroundImage = `url('${MAP_IMAGE}')`;
        // Центрируем карту по вертикали примерно
        posY = (window.innerHeight - (4210 * scale)) / 2;
        drawMarkers();
        update();
    }

    function drawMarkers() {
        wrapper.innerHTML = '';
        bossData.forEach((boss) => {
            const m = document.createElement('div');
            m.className = 'rb-marker';
            m.style.cssText = boss.pos;
            m.setAttribute('data-name', boss.name);
            
            m.onclick = (e) => {
                e.stopPropagation();
                if (m.classList.contains('is-alive')) {
                    m.classList.remove('is-alive');
                    boss.currentTime = null;
                    updateMonitor();
                } else if (!boss.timerInterval) {
                    startTimer(boss);
                } else {
                    focus(boss);
                }
            };
            wrapper.appendChild(m);
            boss.markerEl = m;
        });
    }

    function startTimer(boss) {
        if (boss.timerInterval) return;
        let timeLeft = 15 * 60; 
        
        const timerDisplay = document.createElement('div');
        timerDisplay.className = 'rb-timer-map';
        boss.markerEl.appendChild(timerDisplay);
        boss.timerDisplay = timerDisplay;

        boss.timerInterval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;
            
            timerDisplay.innerText = timeStr;
            boss.currentTime = timeStr;

            if (timeLeft <= 0) {
                clearInterval(boss.timerInterval);
                boss.timerInterval = null;
                if (timerDisplay) timerDisplay.remove();
                boss.markerEl.classList.add('is-alive');
                boss.currentTime = "READY!";
            }
            updateMonitor();
        }, 1000);
        updateMonitor();
    }

    function updateMonitor() {
        const active = bossData.filter(b => b.timerInterval || b.currentTime === "READY!");
        if (active.length === 0) {
            monitorList.innerHTML = '<div style="color: #444; font-size: 11px; text-align: center; padding: 10px;">Список пуст</div>';
            return;
        }
        monitorList.innerHTML = active.map(b => {
            const isReady = b.currentTime === "READY!";
            return `
                <div class="monitor-item">
                    <span class="monitor-note">${b.note}</span>
                    <span class="${isReady ? 'ready-text' : ''}" style="font-family:monospace; background:${isReady ? '#ff330022' : '#00ffcc22'}; padding:2px 8px; border-radius:4px; border: 1px solid ${isReady ? '#ff3300' : '#00ffcc44'}">
                        ${b.currentTime}
                    </span>
                </div>
            `;
        }).join('');
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        if (val.length < 2) return;
        const boss = bossData.find(b => b.name.toLowerCase().includes(val) || b.note.toLowerCase().includes(val));
        if (boss) focus(boss);
    }

    function focus(boss) {
        const t = parseInt(boss.pos.match(/top:(\d+)px/)[1]);
        const l = parseInt(boss.pos.match(/left:(\d+)px/)[1]);
        scale = 0.6;
        posX = (window.innerWidth/2) - (l * scale);
        posY = (window.innerHeight/2) - (t * scale);
        update();
    }

    function update() { 
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; 
    }

    // ЗУМ МЫШКОЙ
    viewport.onwheel = e => { 
        e.preventDefault(); 
        const d = e.deltaY > 0 ? 0.8 : 1.2; 
        const ns = Math.min(Math.max(0.05, scale * d), 4); 
        posX = e.clientX - (e.clientX - posX) * (ns / scale); 
        posY = e.clientY - (e.clientY - posY) * (ns / scale); 
        scale = ns; 
        update(); 
    };

    // ПЕРЕМЕЩЕНИЕ (МЫШЬ И ТАЧ)
    let isDrag = false, lx, ly;

    const startDrag = (x, y) => { isDrag = true; lx = x; ly = y; };
    const doDrag = (x, y) => {
        if (isDrag) {
            posX += x - lx;
            posY += y - ly;
            lx = x; ly = y;
            update();
        }
    };
    const stopDrag = () => { isDrag = false; };

    viewport.onmousedown = e => { if(e.button === 0) startDrag(e.clientX, e.clientY); };
    window.onmousemove = e => doDrag(e.clientX, e.clientY);
    window.onmouseup = stopDrag;

    // TOUCH СОБЫТИЯ
    viewport.ontouchstart = e => {
        if (e.touches.length === 1) {
            startDrag(e.touches[0].clientX, e.touches[0].clientY);
        }
    };
    window.ontouchmove = e => {
        if (e.touches.length === 1) {
            doDrag(e.touches[0].clientX, e.touches[0].clientY);
        }
    };
    window.ontouchend = stopDrag;

    viewport.oncontextmenu = e => e.preventDefault();
    init();
</script>
</body>
</html>
