<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Professional Tracker</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ffd700; --bg: #050505; --panel: rgba(15, 15, 15, 0.9); }
        body { margin: 0; padding: 0; background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        /* Маркеры */
        .rb-marker {
            position: absolute; width: 16px; height: 16px; background: rgba(255, 255, 255, 0.3);
            border: 1px solid #555; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
        }
        .rb-marker.is-alive { background: radial-gradient(circle, #ff4400 0%, #880000 100%); border-color: #fff; box-shadow: 0 0 15px #ff3200; width: 20px; height: 20px; z-index: 15; }
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 1px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none;
        }
        .rb-timer-map {
            position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 2px 6px; border-radius: 4px;
            font-weight: bold; font-family: monospace; font-size: 14px; border: 1px solid #00ffcc;
        }

        /* КОМПАКТНЫЙ ТОП САЙДБАР */
        #top-sidebar {
            position: fixed; top: 10px; left: 310px; right: 10px;
            background: var(--panel); border: 1px solid #333; padding: 5px;
            z-index: 900; border-radius: 10px; backdrop-filter: blur(5px);
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 5px;
        }
        .epic-card {
            background: #222; border: 1px solid #444; padding: 4px; border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; min-width: 100px;
        }
        .epic-name { font-size: 10px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .epic-timer { font-family: monospace; font-size: 12px; color: #00ffcc; line-height: 1.2; }
        .epic-status { font-size: 9px; color: #777; }
        .epic-set-btn { font-size: 9px; background: #333; color: #fff; border: none; padding: 2px 8px; cursor: pointer; margin-top: 2px; border-radius: 3px; }

        /* ИЗМЕНЯЕМЫЙ САЙДБАР */
        #sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background: var(--panel); border-right: 1px solid #333;
            padding: 15px; z-index: 1000; box-sizing: border-box;
        }
        #sidebar-resizer {
            position: absolute; right: -5px; top: 0; width: 10px; height: 100%;
            cursor: ew-resize; z-index: 1001;
        }

        /* Календарь окон (Модалка) */
        #epic-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid var(--accent); padding: 20px; z-index: 2000;
            border-radius: 15px; display: none; flex-direction: column; width: 350px; max-height: 80vh; overflow-y: auto;
        }
        .window-item { background: #222; margin-bottom: 5px; padding: 8px; border-radius: 5px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .del-win { color: #ff4400; cursor: pointer; font-weight: bold; padding: 0 5px; }

        /* Утилиты */
        #game-time { font-size: 28px; color: var(--accent); font-family: monospace; text-align: center; margin-bottom: 10px; }
        .btn { width: 100%; padding: 8px; border-radius: 6px; font-weight: bold; margin-bottom: 5px; cursor: pointer; border: none; }
        .btn-editor { background: #222; color: #0f0; border: 1px solid #050; }
        #monitor-list { margin-top: 10px; height: calc(100vh - 200px); overflow-y: auto; }
        .monitor-item { padding: 8px; border-bottom: 1px solid #222; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; }
        .ready-text { color: #ff3300; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-sidebar"></div>

<div id="epic-modal">
    <h3 id="modal-title" style="margin:0 0 15px 0; color:var(--accent);">Settings</h3>
    <div id="existing-windows" style="margin-bottom: 15px;"></div>
    
    <div style="border-top: 1px solid #444; padding-top: 15px;">
        <label style="font-size: 12px;">Новое окно старт:</label>
        <input type="datetime-local" id="epic-start" style="width:100%; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; padding:5px;">
        <label style="font-size: 12px;">Новое окно конец:</label>
        <input type="datetime-local" id="epic-end" style="width:100%; margin-bottom:15px; background:#222; color:#fff; border:1px solid #444; padding:5px;">
        
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="addEpicWindow()" style="background:#0066cc; color:#fff;">ДОБАВИТЬ</button>
            <button class="btn" onclick="closeEpicModal()" style="background:#444; color:#fff;">ЗАКРЫТЬ</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div id="sidebar-resizer"></div>
    <div id="game-time">00:00</div>
    <button onclick="toggleEditor()" id="editor-btn" class="btn btn-editor">РЕДАКТОР: ВЫКЛ</button>
    <div id="monitor-list"></div>
</div>

<div id="viewport"><div id="map-wrapper"></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB0b73t1ztVYKqZ_Vl8LH8EF2SpaQsBMHc",
        projectId: "l2-rb-map",
        databaseURL: "https://l2-rb-map-default-rtdb.europe-west1.firebasedatabase.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const epicsList = ["queen ant", "core", "orfen", "zaken", "baium", "frintezza", "antharas", "valakas", "beleth"];
    let bossData = [];
    let epicSchedules = {};
    let currentEditingEpic = null;
    let isEditorMode = false;
    let scale = 0.2;
    let posX = 0, posY = 0;

    function init() {
        document.getElementById('map-wrapper').style.backgroundImage = `url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true')`;
        renderEpicStaticUI();
        listenData();
        initResize();
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);
    }

    // --- ЛОГИКА КАЛЕНДАРЯ ЭПИКОВ ---
    function renderEpicStaticUI() {
        const container = document.getElementById('top-sidebar');
        container.innerHTML = epicsList.map(name => {
            const id = name.replace(/\s+/g, '-');
            return `
                <div class="epic-card" id="epic-${id}">
                    <div class="epic-name">${name}</div>
                    <div class="epic-timer" id="timer-${id}">--:--:--</div>
                    <div class="epic-status" id="status-${id}">No Schedule</div>
                    <button class="epic-set-btn" onclick="openEpicModal('${name}')">SCHEDULE</button>
                </div>
            `;
        }).join('');
    }

    function openEpicModal(name) {
        currentEditingEpic = name;
        const id = name.replace(/\s+/g, '-');
        document.getElementById('modal-title').innerText = name.toUpperCase() + " Windows";
        renderWindowsList();
        document.getElementById('epic-modal').style.display = 'flex';
    }

    function renderWindowsList() {
        const id = currentEditingEpic.replace(/\s+/g, '-');
        const windows = epicSchedules[id] || [];
        const container = document.getElementById('existing-windows');
        
        if (windows.length === 0) {
            container.innerHTML = "<p style='font-size:12px; color:#666;'>Нет запланированных окон</p>";
            return;
        }

        container.innerHTML = windows.map((win, index) => `
            <div class="window-item">
                <span>${new Date(win.start).toLocaleDateString()} | ${new Date(win.start).getHours()}:${new Date(win.start).getMinutes().toString().padStart(2,'0')} ➔ ...</span>
                <span class="del-win" onclick="deleteWindow(${index})">✕</span>
            </div>
        `).join('');
    }

    function addEpicWindow() {
        const start = new Date(document.getElementById('epic-start').value).getTime();
        const end = new Date(document.getElementById('epic-end').value).getTime();
        if (isNaN(start) || isNaN(end)) return alert("Выберите даты!");

        const id = currentEditingEpic.replace(/\s+/g, '-');
        if (!epicSchedules[id]) epicSchedules[id] = [];
        epicSchedules[id].push({ start, end });
        
        db.ref('epics/' + id).set(epicSchedules[id]);
        renderWindowsList();
    }

    function deleteWindow(index) {
        const id = currentEditingEpic.replace(/\s+/g, '-');
        epicSchedules[id].splice(index, 1);
        db.ref('epics/' + id).set(epicSchedules[id]);
        renderWindowsList();
    }

    function closeEpicModal() { document.getElementById('epic-modal').style.display = 'none'; }

    function updateEpicsLogic() {
        const now = Date.now();
        epicsList.forEach(name => {
            const id = name.replace(/\s+/g, '-');
            const windows = epicSchedules[id] || [];
            const timerEl = document.getElementById('timer-' + id);
            const statusEl = document.getElementById('status-' + id);
            
            // Фильтруем прошедшие окна и ищем текущее или ближайшее
            const activeWindows = windows.filter(w => w.end > now).sort((a,b) => a.start - b.start);
            
            if (activeWindows.length === 0) {
                timerEl.innerText = "--:--:--";
                statusEl.innerText = "No Schedule";
                return;
            }

            const next = activeWindows[0];
            if (now < next.start) {
                timerEl.innerText = formatTime(next.start - now);
                timerEl.style.color = "#00ffcc";
                statusEl.innerText = "Wait Respawn";
            } else if (now >= next.start && now <= next.end) {
                timerEl.innerText = formatTime(next.end - now);
                timerEl.style.color = "#ff4400";
                statusEl.innerText = "WINDOW OPEN";
            }
        });
    }

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    // --- РЕСАЙЗ САЙДБАРА ---
    function initResize() {
        const sidebar = document.getElementById('sidebar');
        const resizer = document.getElementById('sidebar-resizer');
        const topBar = document.getElementById('top-sidebar');
        let isResizing = false;

        resizer.addEventListener('mousedown', () => isResizing = true);
        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = e.clientX;
            sidebar.style.width = newWidth + 'px';
            topBar.style.left = (newWidth + 20) + 'px';
        });
        window.addEventListener('mouseup', () => isResizing = false);
    }

    // --- БАЗОВЫЙ ФУНКЦИОНАЛ ---
    function listenData() {
        db.ref('bosses').on('value', snap => {
            const val = snap.val() || {};
            bossData = Object.keys(val).map(id => ({ id, ...val[id] }));
            renderMarkers();
            renderMonitor();
        });
        db.ref('epics').on('value', snap => {
            epicSchedules = snap.val() || {};
            updateEpicsLogic();
        });
    }

    function renderMarkers() {
        const wrapper = document.getElementById('map-wrapper');
        bossData.forEach(boss => {
            let m = document.getElementById('rb-' + boss.id);
            if (!m) {
                m = document.createElement('div');
                m.id = 'rb-' + boss.id;
                m.className = 'rb-marker';
                m.setAttribute('data-name', boss.name);
                m.onclick = (e) => { e.stopPropagation(); focus(boss); };
                m.ondblclick = (e) => { e.stopPropagation(); markDead(boss.id); };
                wrapper.appendChild(m);
            }
            const p = boss.pos.split(';');
            m.style.top = p[0].split(':')[1];
            m.style.left = p[1].split(':')[1];
            boss.isAlive ? m.classList.add('is-alive') : m.classList.remove('is-alive');
        });
    }

    function markDead(id) {
        const msk = new Date().toLocaleTimeString('ru-RU', { timeZone: 'Europe/Moscow', hour: '2-digit', minute: '2-digit' });
        db.ref('bosses/' + id).update({ isAlive: false, deathTime: Date.now(), startTimeMsk: msk });
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(boss => {
            const m = document.getElementById('rb-' + boss.id);
            if (!m) return;
            if (boss.deathTime && !boss.isAlive) {
                const elapsed = Math.floor((now - boss.deathTime) / 1000);
                const rem = (15 * 60) - elapsed;
                if (rem <= 0) {
                    db.ref('bosses/' + boss.id).update({ isAlive: true, deathTime: null, startTimeMsk: null });
                } else {
                    let t = m.querySelector('.rb-timer-map') || document.createElement('div');
                    t.className = 'rb-timer-map'; if (!m.contains(t)) m.appendChild(t);
                    t.innerText = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
                }
            } else {
                const t = m.querySelector('.rb-timer-map'); if (t) t.remove();
            }
        });
        updateEpicsLogic();
        renderMonitor();
    }

    function renderMonitor() {
        const list = document.getElementById('monitor-list');
        const now = Date.now();
        const active = bossData.filter(b => b.isAlive || (b.deathTime && (15*60 - Math.floor((now-b.deathTime)/1000)) > 0));
        active.sort((a,b) => (a.deathTime || 0) - (b.deathTime || 0));
        list.innerHTML = active.map(b => {
            let timeStr = "READY";
            if (b.deathTime && !b.isAlive) {
                const rem = Math.max(0, (15*60) - Math.floor((now - b.deathTime) / 1000));
                timeStr = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
            }
            return `<div class="monitor-item" onclick="focusById('${b.id}')">
                <span><b>${b.name}</b></span>
                <span class="${timeStr==='READY'?'ready-text':''}">${timeStr}</span>
            </div>`;
        }).join('');
    }

    function focusById(id) { const b = bossData.find(x=>x.id===id); if(b) focus(b); }
    function focus(boss) {
        const p = boss.pos.split(';');
        const t = parseInt(p[0].split(':')[1]); const l = parseInt(p[1].split(':')[1]);
        scale = 0.8; posX = (window.innerWidth / 2) - (l * scale); posY = (window.innerHeight / 2) - (t * scale);
        update();
    }
    function update() { document.getElementById('map-wrapper').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function updateGameTime() {
        const now = new Date();
        const sec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        let gameMin = Math.floor(1056 + (sec - 71766) / 10);
        gameMin = ((gameMin % 1440) + 1440) % 1440;
        document.getElementById('game-time').innerText = Math.floor(gameMin/60).toString().padStart(2,'0') + ":" + (gameMin%60).toString().padStart(2,'0');
    }

    function toggleEditor() {
        if (!isEditorMode) { if (prompt("Password:") === "D36rk43mgm") isEditorMode = true; else return; }
        else isEditorMode = false;
        document.getElementById('editor-btn').innerText = isEditorMode ? "РЕДАКТОР: ОН" : "РЕДАКТОР: ВЫКЛ";
    }

    // Drag & Zoom
    let isDrag = false, lx, ly;
    window.onmousedown = e => { if(e.button === 0 && !e.target.closest('#sidebar') && !e.target.closest('#top-sidebar') && !e.target.closest('#epic-modal')) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onmousemove = e => { if(isDrag) { posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); } };
    window.onmouseup = () => isDrag = false;
    window.onwheel = e => {
        const delta = e.deltaY > 0 ? 0.8 : 1.2;
        const ns = Math.min(Math.max(0.05, scale * delta), 4);
        posX = e.clientX - (e.clientX - posX) * (ns / scale);
        posY = e.clientY - (e.clientY - posY) * (ns / scale);
        scale = ns; update();
    };

    init();
</script>
</body>
</html>
