<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Live Sync & Editor</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        /* Маркеры */
        .rb-marker {
            position: absolute; width: 12px; height: 12px;
            background: rgba(150, 150, 150, 0.4); border: 1px solid #555;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
        }

        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff3300 0%, #880000 100%) !important; 
            border-color: #fff !important; box-shadow: 0 0 15px rgba(255, 50, 0, 0.8) !important; 
            width: 16px; height: 16px; z-index: 15;
        }

        /* Специальная мигающая метка */
        .special-marker {
            background: #ffd700 !important; border: 2px solid #fff !important;
            animation: pulse-special 1.5s infinite; z-index: 20;
        }
        @keyframes pulse-special {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #bbb; padding: 2px 8px; border-radius: 4px; 
            font-size: 11px; white-space: nowrap; border: 1px solid #333; opacity: 0.8; pointer-events: none;
        }
        .rb-marker:hover::after { opacity: 1; color: #fff; font-size: 14px; background: #000; z-index: 100; }

        .rb-timer-map {
            position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 1px 4px; border-radius: 4px;
            font-weight: bold; font-family: monospace; font-size: 11px; border: 1px solid #00ffcc;
        }

        /* Панель */
        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 280px;
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 15px; backdrop-filter: blur(15px);
        }

        #timer-monitor { margin-top: 15px; max-height: 40vh; overflow-y: auto; border-top: 1px solid #222; }
        .monitor-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; padding: 8px; border-bottom: 1px solid #222; cursor: pointer;
        }
        .monitor-item:hover { background: rgba(255,255,255,0.05); }
        .ready-text { color: #ff3300; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
        
        #game-time { font-size:32px; color:#ffd700; font-family:monospace; text-align:center; margin: 10px 0; }
        input { width:100%; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box; margin-bottom:10px; }
        
        .btn { width:100%; padding:10px; border-radius:8px; font-weight:bold; font-size:11px; margin-bottom:5px; border:1px solid transparent; cursor:pointer; }
        .btn-reset { background:#400; color:#f88; border-color:#844; }
        .btn-editor { background:#222; color:#0f0; border-color:#050; }
        .btn-editor.active { background:#050; color:#fff; box-shadow: 0 0 10px #0f0; }
        
        #editor-hint { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,0,0.8); color: #000; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; display: none; z-index: 2000;
        }
    </style>
</head>

        { name: "Abyssal Makkum", note: "newly added", pos: "top:2567px;left:3804px;" },
        { name: "gordon", note: "newly added", pos: "top:1577px;left:4400px;" },
        { name: "Typhoon", note: "newly added", pos: "top:4008px;left:2830px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const monitorList = document.getElementById('monitor-list');
    const viewport = document.getElementById('viewport');
    
    let scale = window.innerWidth / 5062;
    let posX = 0, posY = 0;

    function init() {
        wrapper.style.backgroundImage = `url('${MAP_IMAGE}')`;
        drawMarkers();
        listenFirebase(); 
        update();
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);

        // Клик по обертке (для режима редактора)
        wrapper.addEventListener('click', (e) => {
            if (!isEditorMode) return;
            const rect = wrapper.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / scale);
            const y = Math.round((e.clientY - rect.top) / scale);
            
            const bossName = prompt("Введите имя нового босса:");
            if (bossName) {
                const dbId = bossName.replace(/\./g, '_');
                rbRef.child(dbId).set({
                    name: bossName,
                    pos: `top:${y}px;left:${x}px;`,
                    note: "Добавлено вручную",
                    isCustom: true
                });
            }
        });

        // Добавляем секретную метку
        addSpecialMarker();
    }

    function addSpecialMarker() {
        const sm = document.createElement('div');
        sm.className = 'rb-marker special-marker';
        sm.style.cssText = "top:2970px;left:4322px;";
        sm.setAttribute('data-name', 'SECRET IMAGE');
        sm.onclick = (e) => {
            e.stopPropagation();
            window.open('https://github.com/iDLC1990/FarmRB/blob/main/34.jpg?raw=true', '_blank');
        };
        wrapper.appendChild(sm);
    }

    function drawMarkers() {
        // Очищаем только тех, кого нет в bossData
        wrapper.querySelectorAll('.rb-marker:not(.special-marker)').forEach(m => m.remove());
        bossData.forEach(createMarkerElement);
    }

    function createMarkerElement(boss) {
        if (boss.markerEl) boss.markerEl.remove();
        
        const m = document.createElement('div');
        m.className = 'rb-marker';
        m.style.cssText = boss.pos;
        m.setAttribute('data-name', boss.name);
        
        let clickTimer = null;

        m.onclick = (e) => {
            if (isEditorMode) return;
            e.stopPropagation();

            if (clickTimer) {
                // ДВОЙНОЙ КЛИК
                clearTimeout(clickTimer);
                clickTimer = null;
                onMarkerDoubleClick(boss);
            } else {
                // ОДИНОЧНЫЙ КЛИК (ждем, не будет ли второго)
                clickTimer = setTimeout(() => {
                    focus(boss);
                    clickTimer = null;
                }, 250);
            }
        };

        wrapper.appendChild(m);
        boss.markerEl = m;
    }

    function onMarkerDoubleClick(boss) {
        const dbId = boss.name.replace(/\./g, '_');
        if (boss.isAlive) {
            rbRef.child(dbId).update({ isAlive: false, deathTime: null });
        } else {
            rbRef.child(dbId).update({ deathTime: Date.now(), isAlive: false });
        }
    }

    function listenFirebase() {
        rbRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // Сброс состояний
            bossData.forEach(boss => {
                boss.deathTime = null; boss.isAlive = false;
                if(boss.markerEl) {
                    boss.markerEl.classList.remove('is-alive');
                    const t = boss.markerEl.querySelector('.rb-timer-map');
                    if(t) t.remove();
                }
            });

            for (let id in data) {
                const item = data[id];
                const name = item.name || id.replace(/_/g, '.');
                let boss = bossData.find(b => b.name === name);
                
                // Если босс новый (из редактора)
                if (!boss) {
                    boss = { name: name, pos: item.pos, note: item.note || "" };
                    bossData.push(boss);
                    createMarkerElement(boss);
                }

                boss.deathTime = item.deathTime;
                boss.isAlive = item.isAlive;
                if (boss.isAlive && boss.markerEl) boss.markerEl.classList.add('is-alive');
            }
            renderMonitor();
        });
    }

    function toggleEditor() {
        isEditorMode = !isEditorMode;
        document.getElementById('editor-btn').classList.toggle('active');
        document.getElementById('editor-hint').style.display = isEditorMode ? 'block' : 'none';
        viewport.style.cursor = isEditorMode ? 'crosshair' : 'grab';
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(boss => {
            if (boss.deathTime && !boss.isAlive) {
                const elapsed = Math.floor((now - boss.deathTime) / 1000);
                const remaining = SPAWN_WINDOW - elapsed;

                if (remaining <= 0) {
                    rbRef.child(boss.name.replace(/\./g, '_')).update({ isAlive: true, deathTime: null });
                } else {
                    let tMap = boss.markerEl.querySelector('.rb-timer-map');
                    if (!tMap) {
                        tMap = document.createElement('div');
                        tMap.className = 'rb-timer-map';
                        boss.markerEl.appendChild(tMap);
                    }
                    const m = Math.floor(remaining / 60);
                    const s = remaining % 60;
                    tMap.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }
        });
    }

    function renderMonitor() {
        const active = bossData.filter(b => b.deathTime || b.isAlive);
        active.sort((a, b) => (a.isAlive === b.isAlive) ? (a.deathTime - b.deathTime) : (a.isAlive ? -1 : 1));

        const now = Date.now();
        monitorList.innerHTML = active.map(b => {
            let timeStr = "READY!";
            if (!b.isAlive) {
                const rem = SPAWN_WINDOW - Math.floor((now - b.deathTime) / 1000);
                const m = Math.max(0, Math.floor(rem / 60));
                const s = Math.max(0, rem % 60);
                timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
            return `
                <div class="monitor-item" onclick="focusByName('${b.name.replace(/'/g, "\\'")}')">
                    <div style="flex:1">
                        <div style="font-weight:bold; color:#fff">${b.name}</div>
                        <div style="font-size:10px; color:#666">${b.note}</div>
                    </div>
                    <div class="${b.isAlive ? 'ready-text' : ''}" style="font-family:monospace; padding:4px 8px; border:1px solid ${b.isAlive ? '#f30' : '#0fc'}; border-radius:4px;">
                        ${timeStr}
                    </div>
                </div>
            `;
        }).join('');
    }

    function focusByName(name) {
        const boss = bossData.find(b => b.name === name);
        if (boss) focus(boss);
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        if (val.length < 3) return;
        const boss = bossData.find(b => b.name.toLowerCase().includes(val));
        if (boss) focus(boss);
    }

    function focus(boss) {
        const t = parseInt(boss.pos.match(/top:(\d+)px/)[1]);
        const l = parseInt(boss.pos.match(/left:(\d+)px/)[1]);
        scale = window.innerWidth < 600 ? 1.2 : 0.8;
        posX = (window.innerWidth / 2) - (l * scale);
        posY = (window.innerHeight / 2) - (t * scale);
        update();
    }

    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function updateGameTime() {
        const SYNC_REAL_SEC = (22 * 3600) + (56 * 60) + 6;
        const SYNC_GAME_MIN = (17 * 60) + 36;
        const now = new Date();
        const nowRealSec = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        const diffGameMin = (nowRealSec - SYNC_REAL_SEC) / 10;
        let totalGameMin = Math.floor(SYNC_GAME_MIN + diffGameMin);
        totalGameMin = ((totalGameMin % 1440) + 1440) % 1440;
        const h = Math.floor(totalGameMin / 60);
        const m = totalGameMin % 60;
        document.getElementById('game-time').innerText = `${h < 10 ? '0' + h : h}:${m < 10 ? '0' + m : m}`;
    }

    function resetAllFirebase() {
        if(confirm("Очистить ВСЕ таймеры для всех игроков?")) {
            // Удаляем только динамические данные (время смерти и статус), сохраняя координаты
            rbRef.once('value', snapshot => {
                const data = snapshot.val();
                for (let id in data) {
                    rbRef.child(id).update({ deathTime: null, isAlive: false });
                }
            });
        }
    }

    // Управление
    let isDrag = false, lx, ly, initialDist = 0;

    viewport.addEventListener('wheel', e => {
        e.preventDefault();
        applyZoom(e.deltaY > 0 ? 0.8 : 1.2, e.clientX, e.clientY);
    }, { passive: false });

    function applyZoom(delta, centerX, centerY) {
        const ns = Math.min(Math.max(0.05, scale * delta), 4);
        posX = centerX - (centerX - posX) * (ns / scale);
        posY = centerY - (centerY - posY) * (ns / scale);
        scale = ns;
        update();
    }

    viewport.onmousedown = e => { if(e.button === 0) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onmousemove = e => { if(isDrag) { posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); } };
    window.onmouseup = () => isDrag = false;

    viewport.addEventListener('touchstart', e => {
        if (e.touches.length === 1) { isDrag = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
        else if (e.touches.length === 2) { initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); }
    });

    viewport.addEventListener('touchmove', e => {
        e.preventDefault(); 
        if (e.touches.length === 1 && isDrag) {
            posX += e.touches[0].clientX - lx; posY += e.touches[0].clientY - ly;
            lx = e.touches[0].clientX; ly = e.touches[0].clientY; update();
        } else if (e.touches.length === 2) {
            const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            if (initialDist > 0) {
                applyZoom(currentDist / initialDist, (e.touches[0].clientX + e.touches[1].clientX) / 2, (e.touches[0].clientY + e.touches[1].clientY) / 2);
                initialDist = currentDist;
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', () => { isDrag = false; initialDist = 0; });

    init();
</script>
</body>
</html>
