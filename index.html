<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 RB Map - Final Fix</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
        }

        /* Контейнер для калибровки координат */
        #map-wrapper {
            position: absolute;
            width: 2048px; /* Базовая ширина для координат из вашего файла */
            height: 3072px; 
            transform-origin: 0 0;
        }

        #map-image {
            width: 100%;
            height: 100%;
            background-image: url('https://linedia.ru/img/map.jpg');
            background-size: contain;
            background-repeat: no-repeat;
        }

        .boss-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background: url('https://linedia.ru/img/flag.png') no-repeat center;
            background-size: contain;
            cursor: pointer;
            z-index: 10;
            /* КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: смещаем флаг так, чтобы острие было в точке координат */
            margin-left: -10px; /* Половина ширины иголки */
            margin-top: -30px;  /* Почти вся высота флага */
            filter: drop-shadow(0 0 2px black);
        }

        .boss-marker:hover { transform: scale(1.2); z-index: 100; filter: brightness(1.3) drop-shadow(0 0 10px #00ff88); }
        .boss-marker.active { filter: hue-rotate(260deg) drop-shadow(0 0 10px red); }

        /* UI */
        #ui {
            position: fixed; top: 20px; right: 20px; width: 260px;
            background: rgba(10, 15, 25, 0.96); border: 1px solid #444;
            border-radius: 12px; padding: 20px; color: white; z-index: 1000; display: none;
        }
        .timer-display { font-size: 2.5em; text-align: center; color: #ff4d4d; font-family: monospace; margin: 15px 0; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { cursor: pointer; border: none; padding: 10px; border-radius: 6px; background: #2c3e50; color: white; font-weight: bold; }
        .btn-main { background: #950740; grid-column: span 2; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="map-wrapper" id="move-layer">
        <div id="map-image"></div>
    </div>
</div>

<div id="ui">
    <div id="b-name" style="font-size: 1.2em; font-weight: bold; color: #00ff88;"></div>
    <div id="b-timer" class="timer-display">ALIVE</div>
    <div class="btns">
        <button onclick="setTimer(12)">12ч</button>
        <button onclick="setTimer(24)">24ч</button>
        <button class="btn-main" onclick="setCustom()">Свой таймер (мин)</button>
        <button style="grid-column: span 2" onclick="resetTimer()">Жив / Сброс</button>
        <button style="grid-column: span 2; background: #444;" onclick="closeUI()">Закрыть</button>
    </div>
</div>

<script>
    // Твой отфильтрованный список (координаты напрямую из твоего файла)

        { name: "Demons Agent Falston", pos: "top:1124px;left:1388px" },
        { name: "Last Titan Utenus", pos: "top:1134px;left:1612px" },
        { name: "Kelone", pos: "top:1124px;left:1360px" },
        { name: "Andras the Betrayer", pos: "top:1198px;left:1442px" },

        { name: "Palibati Queen Themis", pos: "top:1284px;left:1546px" },
        { name: "Shilen's Messenger Cabrio", pos: "top:1344px;left:1552px" },
        { name: "Immortal Savior Mardil", pos: "top:1320px;left:1582px" },
        { name: "Doom Blade Tanatos", pos: "top:1134px;left:1568px" },
        { name: "Water Dragon Seer Sheshark", pos: "top:2160px;left:1285px" },
        { name: "Death Lord Hallate", pos: "top:1344px;left:1496px" },
        { name: "Icicle Emperor Bumbalump", pos: "top:580px;left:1380px" },
        { name: "Beast Lord Behemoth", pos: "top:2114px;left:1312px" },
        { name: "Meanas Anor", pos: "top:1186px;left:1532px" },
        { name: "Roaring Skylancer", pos: "top:1186px;left:1552px" },
        { name: "Eilhalder von Hellmann", pos: "top:1094px;left:1406px" },
        { name: "Vanor Chief Kandra", pos: "top:1334px;left:1212px" },
        { name: "Antharas Priest Cloe", pos: "top:1734px;left:1682px" },
        { name: "Fafurion's Herald Lokness", pos: "top:2114px;left:1272px" },
        { name: "Krokian Padisha Sobekk", pos: "top:2173px;left:1235px" },

        { name: "Death Lord Shax", pos: "top:1234px;left:1582px" },
        { name: "Kernon", pos: "top:1364px;left:1496px" },
        { name: "Lesser Giant Olkuth", pos: "top:1894px;left:1612px" },
        { name: "Storm Winged Naga", pos: "top:1794px;left:1612px" },
        { name: "Palatanos of Horrific Power", pos: "top:1186px;left:1662px" },
        { name: "Flamestone Giant", pos: "top:1376px;left:1342px" },
        { name: "Ocean Flame Ashakiel", pos: "top:1734px;left:1612px" },
        { name: "Hestia", pos: "top:624px;left:1396px" },
        { name: "Last Lesser Giant Glaki", pos: "top:1914px;left:1646px" },
        { name: "Daimon the White-Eyed", pos: "top:1234px;left:1356px" },
        { name: "Fire of Wrath Shuriel", pos: "top:1364px;left:1396px" },
        { name: "Longhorn Golkonda", pos: "top:1364px;left:1532px" },
        { name: "Cherub Galaxia", pos: "top:1364px;left:1552px" },
        { name: "Ketra's Hero Hekaton", pos: "top:764px;left:1112px" },
        { name: "Varka's Hero Shadith", pos: "top:894px;left:1134px" },
        { name: "Queen Shyeed", pos: "top:624px;left:1062px" },
        { name: "Ketra's Commander Tayr", pos: "top:724px;left:1085px" },
        { name: "Varka's Commander Mos", pos: "top:924px;left:1062px" },
        { name: "Ember", pos: "top:1364px;left:1312px" },
        { name: "Uruka", pos: "top:1894px;left:1085px" },
        { name: "Ketra's Chief Brakki", pos: "top:764px;left:1044px" },
        { name: "Gordon", pos: "top:1034px;left:1282px" },
        { name: "Soul of Water Ashutar", pos: "top:724px;left:1134px" },
        { name: "Soul of Fire Nastron", pos: "top:894px;left:1044px" },
        { name: "Varka's Chief Horus", pos: "top:924px;left:1112px" },
        { name: "Sailren", pos: "top:1934px;left:1044px" },
        { name: "Anays", pos: "top:1114px;left:1456px" },
        { name: "Andreas van Halter", pos: "top:1186px;left:1488px" },
        { name: "Plague Golem", pos: "top:1224px;left:1396px" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    let scale = 0.6, posX = -400, posY = -600;
    let storage = JSON.parse(localStorage.getItem('rb_timers_final_v5')) || {};
    let activeId = null;

    // Отрисовка
    bossList.forEach((b, i) => {
        const flag = document.createElement('div');
        flag.className = 'boss-marker';
        flag.style.cssText = b.pos;
        flag.onclick = (e) => { e.stopPropagation(); openUI(i); };
        wrapper.appendChild(flag);
    });

    function render() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    // Управление
    viewport.onwheel = (e) => {
        const d = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.min(Math.max(0.1, scale * d), 4);
        render();
    };

    let isDrag = false, sX, sY;
    viewport.onmousedown = (e) => { isDrag = true; sX = e.clientX - posX; sY = e.clientY - posY; viewport.style.cursor = 'grabbing'; };
    window.onmousemove = (e) => { if(!isDrag) return; posX = e.clientX - sX; posY = e.clientY - sY; render(); };
    window.onmouseup = () => { isDrag = false; viewport.style.cursor = 'grab'; };

    // Таймер
    function openUI(id) {
        activeId = id;
        document.getElementById('ui').style.display = 'block';
        document.getElementById('b-name').innerText = bossList[id].name;
        updateUI();
    }
    function closeUI() { document.getElementById('ui').style.display = 'none'; activeId = null; }
    function setTimer(h) { storage[activeId] = Date.now() + (h * 3600000); save(); }
    function setCustom() { let m = prompt("Минут до появления:"); if(m) { storage[activeId] = Date.now() + (m * 60000); save(); } }
    function resetTimer() { delete storage[activeId]; save(); }
    function save() { localStorage.setItem('rb_timers_final_v5', JSON.stringify(storage)); }

    function updateUI() {
        if (activeId === null) return;
        const el = document.getElementById('b-timer');
        if (!storage[activeId]) { el.innerText = "ALIVE"; el.style.color = "#00ff88"; return; }
        const diff = storage[activeId] - Date.now();
        if (diff <= 0) { el.innerText = "READY"; el.style.color = "#00ff88"; }
        else {
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            el.innerText = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            el.style.color = "#f44";
        }
    }

    setInterval(() => {
        updateUI();
        bossList.forEach((_, i) => {
            const m = wrapper.getElementsByClassName('boss-marker')[i];
            if (storage[i] && storage[i] > Date.now()) m.classList.add('active');
            else m.classList.remove('active');
        });
    }, 1000);

    render();
</script>

</body>
</html>
