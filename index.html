<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 Map Constructor - FIXED</title>
    <style>
        body { margin: 0; padding: 0; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        
        #viewport {
            width: 100vw; height: 100vh;
            cursor: crosshair; overflow: hidden; position: relative;
            background: #000;
        }

        #map-wrapper {
            position: absolute;
            /* Размеры для карты la2.one (2560x1707) */
            width: 2560px; 
            height: 1707px; 
            transform-origin: 0 0;
            /* Прямая ссылка на карту через фотохостинг, который не блокирует доступ */
            background: url('https://i.imgur.com/uN8G9G0.jpg') no-repeat;
            background-size: 2560px 1707px;
        }

        .temp-marker {
            position: absolute; width: 20px; height: 20px;
            background: #ff0000; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; box-shadow: 0 0 10px red;
        }

        #panel {
            position: fixed; top: 10px; left: 10px; width: 350px;
            background: rgba(0,0,0,0.9); border: 2px solid #00ff88;
            padding: 15px; z-index: 1000; border-radius: 8px;
        }

        textarea { 
            width: 100%; height: 200px; margin-top: 10px; 
            background: #000; color: #00ff88; border: 1px solid #333; 
            font-family: monospace; font-size: 11px;
        }

        .hint { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        b { color: #00ff88; }
        button { cursor: pointer; background: #333; color: white; border: 1px solid #555; padding: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="panel">
    <b>Конструктор РБ (FIXED)</b>
    <div class="hint">
        1. <b>Колесико</b> — Зум<br>
        2. <b>Зажать ПКМ</b> — Двигать карту<br>
        3. <b>ЛКМ</b> — Поставить метку
    </div>
    <textarea id="output" readonly placeholder="Тут появится код..."></textarea>
    <button onclick="clearOutput()">Очистить всё</button>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    const output = document.getElementById('output');

    let scale = 0.5; 
    let posX = 0;
    let posY = 0;

    function render() {
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }
    render();

    // Логика клика
    viewport.addEventListener('click', (e) => {
        if (isDragging) return; 

        const rect = wrapper.getBoundingClientRect();
        const realX = Math.round((e.clientX - rect.left) / scale);
        const realY = Math.round((e.clientY - rect.top) / scale);

        // Ставим точку
        const dot = document.createElement('div');
        dot.className = 'temp-marker';
        dot.style.left = realX + 'px';
        dot.style.top = realY + 'px';
        wrapper.appendChild(dot);

        const name = prompt(`X:${realX}, Y:${realY}\nИмя босса:`, "Boss");
        if (name) {
            const line = `{ name: "${name}", pos: "top:${realY}px;left:${realX}px;" },`;
            output.value += line + "\n";
        } else {
            dot.remove();
        }
    });

    // Зум
    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.min(Math.max(0.1, scale * delta), 3);
        posX = e.clientX - (e.clientX - posX) * (newScale / scale);
        posY = e.clientY - (e.clientY - posY) * (newScale / scale);
        scale = newScale;
        render();
    };

    // Перетаскивание (ПКМ)
    let isDragging = false;
    let lastX, lastY;
    viewport.oncontextmenu = (e) => e.preventDefault();
    viewport.onmousedown = (e) => {
        if (e.button === 2) {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        }
    };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX += (e.clientX - lastX);
        posY += (e.clientY - lastY);
        lastX = e.clientX;
        lastY = e.clientY;
        render();
    };
    window.onmouseup = () => { isDragging = false; };

    function clearOutput() {
        output.value = "";
        document.querySelectorAll('.temp-marker').forEach(m => m.remove());
    }
</script>

</body>
</html>
