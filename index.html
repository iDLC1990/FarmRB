    <meta charset="UTF-8">

    <title>L2 RB Map - Live Tracking</title>

    <style>
        /* --- ТВОИ ОРИГИНАЛЬНЫЕ СТИЛИ (СОХРАНЕНЫ) --- */
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        .rb-marker { position: absolute; width: 18px; height: 18px; background: rgba(255, 255, 255, 0.4); border: 2px solid #333; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .rb-marker.is-alive { background: radial-gradient(circle, #ff4400 0%, #880000 100%) !important; border-color: #fff !important; box-shadow: 0 0 20px rgba(255, 50, 0, 1) !important; width: 22px; height: 22px; z-index: 15; }
        .rb-marker::after { content: attr(data-name); position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; border: 1px solid #444; pointer-events: none; }

        /* Специальный маркер для карты */
        .special-marker { background: #ffd700 !important; border: 2px solid #fff !important; animation: pulse 1.5s infinite; z-index: 25; }
        @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.3; } 100% { scale: 1; } }

        /* --- НОВЫЕ СТИЛИ МОДАЛКИ КАРТЫ --- */
        #map-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 9999; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .map-modal-content { 
            position: relative; max-width: 95%; max-height: 95%; 
            border: 2px solid #ffd700; border-radius: 10px; overflow: hidden;
            background: #111;
        }
        .map-modal-content img { display: block; width: auto; height: auto; max-width: 90vw; max-height: 80vh; object-fit: contain; }
        .close-map-btn {
            background: #ffd700; color: #000; border: none; padding: 15px;
            width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px;
        }

        /* Сайдбары и кнопки */
        #sidebar { position: fixed; top: 15px; left: 15px; width: 290px; background: rgba(10, 10, 10, 0.95); border: 1px solid #333; padding: 15px; z-index: 1000; border-radius: 15px; backdrop-filter: blur(10px); height: calc(100vh - 50px); }
        #top-sidebar { position: fixed; top: 10px; left: 320px; right: 15px; background: rgba(10, 10, 10, 0.85); border: 1px solid #444; padding: 4px; z-index: 900; border-radius: 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .epic-card { background: #111; border: 1px solid #222; padding: 2px 4px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; }
        .epic-window-open { animation: window-blink 1s infinite alternate; border-color: #ffcc00 !important; }
        @keyframes window-blink { from { background: #111; } to { background: #443300; } }
    </style>
</head>
<body>

        { id: "Isabella", name: "Isabella", note: "newly added", pos: "top:2627px;left:2408px;" },
        { id: "Royal_Sharpshooter", name: "Royal Sharpshooter", note: "newly added", pos: "top:2638px;left:3712px;" },
        { id: "Enchanced_Mimir", name: "Enchanced Mimir", note: "newly added", pos: "top:2937px;left:4001px;" },
        { id: "Abyssal_Makkum", name: "Abyssal Makkum", note: "newly added", pos: "top:2567px;left:3804px;" },
        { id: "Gordon", name: "gordon", note: "newly added", pos: "top:1577px;left:4400px;" },
        { id: "Typhoon", name: "Typhoon", note: "newly added", pos: "top:4008px;left:2830px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    let scale = window.innerWidth / 5062;
    let posX = 0, posY = 0;
    let isEditorMode = false;

    function init() {
        wrapper.style.backgroundImage = `url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true')`;
        initEpics();
        addTeleportMarker();
        listenFirebase();
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);
        update();
    }

    // Логика модального окна
    function openMapModal() { document.getElementById('map-modal').style.display = 'flex'; }
    function closeMapModal() { document.getElementById('map-modal').style.display = 'none'; }

    function addTeleportMarker() {
        const sm = document.createElement('div');
        sm.className = 'rb-marker special-marker';
        sm.style.top = "2970px"; sm.style.left = "4322px";
        sm.setAttribute('data-name', 'TELEPORT MAP');
        sm.onclick = (e) => { 
            e.stopPropagation(); 
            openMapModal(); // Открываем модалку вместо инструкции
        };
        wrapper.appendChild(sm);
    }

    function initEpics() {
        const epics = ["queen ant", "core", "orfen", "zaken", "baium", "frintezza", "antharas", "valakas", "beleth"];
        const container = document.getElementById('top-sidebar');
        container.innerHTML = epics.map(name => `
            <div class="epic-card" id="epic-${name.replace(' ', '-')}">
                <div style="font-size:9px; color:#ffd700; font-weight:bold;">${name.toUpperCase()}</div>
                <div class="epic-timer" id="timer-${name.replace(' ', '-')}">--:--:--</div>
            </div>
        `).join('');
    }

    function listenFirebase() {
        rbRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            bossData.forEach(boss => {
                const liveData = data[boss.id] || {};
                boss.isAlive = liveData.isAlive || false;
                boss.deathTime = liveData.deathTime || null;
                renderMarker(boss);
            });
            renderMonitor();
        });
    }

    function renderMarker(boss) {
        let m = document.getElementById('rb-' + boss.id);
        if (!m) {
            m = document.createElement('div');
            m.id = 'rb-' + boss.id;
            m.className = 'rb-marker';
            const p = boss.pos.split(';');
            m.style.top = p[0].split(':')[1];
            m.style.left = p[1].split(':')[1];
            m.setAttribute('data-name', boss.name);
            m.onclick = (e) => { e.stopPropagation(); focus(boss); };
            wrapper.appendChild(m);
        }
        boss.isAlive ? m.classList.add('is-alive') : m.classList.remove('is-alive');
    }

    function tick() { renderMonitor(); }

    function renderMonitor() {
        const list = document.getElementById('monitor-list');
        const active = bossData.filter(b => b.isAlive);
        list.innerHTML = active.map(b => `
            <div style="padding:10px; border-bottom:1px solid #222; cursor:pointer;" onclick="focusById('${b.id}')">
                <b>${b.name}</b> <span style="color:#ff3300; float:right;">READY</span>
            </div>
        `).join('');
    }

    function focusById(id) { const b = bossData.find(x => x.id === id); if (b) focus(b); }
    function focus(boss) {
        const m = document.getElementById('rb-' + boss.id);
        const t = parseInt(m.style.top); const l = parseInt(m.style.left);
        scale = 0.8; posX = (window.innerWidth / 2) - (l * scale); posY = (window.innerHeight / 2) - (t * scale);
        update();
    }

    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function updateGameTime() {
        const now = new Date();
        const h = now.getUTCHours().toString().padStart(2,'0');
        const m = now.getUTCMinutes().toString().padStart(2,'0');
        document.getElementById('game-time').innerText = `${h}:${m}`;
    }

    function toggleEditor() { isEditorMode = !isEditorMode; document.getElementById('editor-btn').innerText = isEditorMode ? "РЕДАКТОР: ВКЛ" : "РЕДАКТОР: ВЫКЛ"; }

    // Управление картой (Drag & Zoom)
    let isDrag = false, lx, ly;
    window.onpointerdown = e => { if(e.button === 0 && !e.target.closest('#sidebar')) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onpointermove = e => { if (isDrag) { posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); } };
    window.onpointerup = () => isDrag = false;
    viewport.onwheel = e => {
        const delta = e.deltaY > 0 ? 0.8 : 1.2;
        const ns = Math.min(Math.max(0.05, scale * delta), 4);
        posX = e.clientX - (e.clientX - posX) * (ns / scale);
        posY = e.clientY - (e.clientY - posY) * (ns / scale);
        scale = ns; update();
    };

    init();
</script>
