<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 Raid Tracker - Interlude Map</title>
    <style>
        body { background: #000; color: #ccc; font-family: sans-serif; margin: 0; overflow: auto; }
        
        /* Контейнер карты */
        .worldmap { position: relative; width: 2500px; height: 3500px; background: url('https://linedia.ru/img/map.jpg') no-repeat; }
        
        /* Флаги РБ */
        .raidcontainer { position: absolute; cursor: pointer; z-index: 10; }
        .raidflag { width: 32px; height: 32px; transition: transform 0.2s; }
        .raidflag:hover { transform: scale(1.2); }

        /* Всплывающее окно с инфой */
        .raidcontainerinner {
            display: none; /* По умолчанию скрыто */
            position: absolute;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #555;
            padding: 15px;
            width: 350px;
            z-index: 100;
            border-radius: 8px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            margin-top: 10px;
        }

        .raidname a { color: #ffd700; font-weight: bold; text-decoration: none; font-size: 1.1rem; }
        .raidnamelvl { color: #aaa; font-size: 0.9rem; }
        .raidinfotext { font-size: 0.85rem; color: #bbb; margin-top: 10px; line-height: 1.4; }
        .raidhr { border: 0; border-top: 1px solid #444; margin: 10px 0; }
        .raidimg { float: left; margin-right: 10px; border: 1px solid #444; width: 80px; }

        /* Таймерный блок */
        .timer-section {
            margin-top: 15px;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #ffd700;
            border-radius: 5px;
            text-align: center;
        }
        .time-left { font-size: 20px; font-weight: bold; color: #00ff88; display: block; margin-bottom: 8px; }
        .kill-btn { 
            background: #b32d2d; color: white; border: none; padding: 6px 15px; 
            cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%;
        }
        .kill-btn:hover { background: #ff4444; }

        /* Подсветка живого РБ на карте */
        .is-alive .raidflag {
            filter: drop-shadow(0 0 8px #00ff88);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Кнопка закрытия окна */
        .close-popup { position: absolute; right: 8px; top: 5px; color: #888; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="worldmap" id="worldmap">
    <div class="raidcontainer" data-name="Кутус Серый Коготь" style="top:2018px;left:378px;">
        <img class="raidflag" src="https://linedia.ru/img/flag.png">
        <div class="raidcontainerinner">
            <span class="close-popup">×</span>
            <img class="raidimg" src="https://linedia.ru/npcs/25001.jpg">
            <div class="wmraidinfo">
                <span class="raidnamelvl">Рейд-Босс (Lvl: 23)</span><br>
                <div class="raidname"><a href="#">Кутус Серый Коготь</a></div>
                <div class="raidinfotext">Солдат из Осужденных Наемников...</div>
            </div>
        </div>
    </div>

    <div class="raidcontainer" data-name="Капитан Наемников Турек" style="top:1786px;left:178px;">
        <img class="raidflag" src="https://linedia.ru/img/flag.png">
        <div class="raidcontainerinner">
            <span class="close-popup">×</span>
            <img class="raidimg" src="https://linedia.ru/npcs/25004.jpg">
            <div class="wmraidinfo">
                <span class="raidnamelvl">Рейд-Босс (Lvl: 30)</span><br>
                <div class="raidname"><a href="#">Капитан Наемников Турек</a></div>
            </div>
        </div>
    </div>

    <div class="raidcontainer" data-name="Паук Клету" style="top:1662px;left:1270px;">
        <img class="raidflag" src="https://linedia.ru/img/flag.png">
        <div class="raidcontainerinner">
            <span class="close-popup">×</span>
            <img class="raidimg" src="https://linedia.ru/npcs/25007.jpg">
            <div class="wmraidinfo">
                <span class="raidnamelvl">Рейд-Босс (Lvl: 42)</span><br>
                <div class="raidname"><a href="#">Паук Клету</a></div>
            </div>
        </div>
    </div>

    <div class="raidcontainer" data-name="Посланец Шилен Кабрио" style="top:1344px;left:1552px;">
        <img class="raidflag" src="https://linedia.ru/img/flag.png">
        <div class="raidcontainerinner">
            <span class="close-popup">×</span>
            <img class="raidimg" src="https://linedia.ru/npcs/25035.jpg">
            <div class="wmraidinfo">
                <span class="raidnamelvl">Рейд-Босс (Lvl: 70)</span><br>
                <div class="raidname"><a href="#">Посланец Шилен Кабрио</a></div>
            </div>
        </div>
    </div>
    
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const containers = document.querySelectorAll('.raidcontainer');
    let timers = JSON.parse(localStorage.getItem('l2_map_timers')) || {};

    containers.forEach(container => {
        const name = container.getAttribute('data-name');
        const inner = container.querySelector('.raidcontainerinner');
        const flag = container.querySelector('.raidflag');
        const closeBtn = container.querySelector('.close-popup');

        // 1. Логика открытия/закрытия окон
        flag.onclick = (e) => {
            // Закрыть другие окна
            document.querySelectorAll('.raidcontainerinner').forEach(el => el.style.display = 'none');
            inner.style.display = 'block';
        };
        
        if(closeBtn) {
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                inner.style.display = 'none';
            };
        }

        // 2. Инъекция таймера
        const timerSection = document.createElement('div');
        timerSection.className = 'timer-section';
        timerSection.innerHTML = `
            <span class="time-left" id="time-${name}">ЖИВОЙ</span>
            <button class="kill-btn" id="btn-${name}">УБИТ (12ч)</button>
        `;
        inner.querySelector('.wmraidinfo').appendChild(timerSection);

        const killBtn = timerSection.querySelector('.kill-btn');
        killBtn.onclick = () => {
            const respawnTime = Date.now() + (12 * 60 * 60 * 1000); // Респ 12 часов
            timers[name] = respawnTime;
            localStorage.setItem('l2_map_timers', JSON.stringify(timers));
        };
    });

    // 3. Обновление счетчиков каждую секунду
    setInterval(() => {
        const now = Date.now();
        containers.forEach(container => {
            const name = container.getAttribute('data-name');
            const display = document.getElementById(`time-${name}`);
            
            if (timers[name]) {
                const diff = timers[name] - now;
                if (diff > 0) {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    display.innerText = `${h}ч ${m}м ${s}с`;
                    display.style.color = "#ff4444";
                    container.classList.remove('is-alive');
                } else {
                    display.innerText = "ЖИВОЙ / ОКНО";
                    display.style.color = "#00ff88";
                    container.classList.add('is-alive');
                }
            } else {
                container.classList.add('is-alive');
            }
        });
    }, 1000);
});
</script>

</body>
</html>
