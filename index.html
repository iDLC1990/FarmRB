<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/800/800212.png">

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        /* Маркеры */
        .rb-marker {
            position: absolute; 
            width: 22px; height: 22px; 
            background: rgba(0, 0, 0, 0.8); 
            border: 2px solid #555; 
            border-radius: 50%;
            transform: translate(-50%, -50%); 
            z-index: 10; 
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff3300 0%, #880000 100%) !important; 
            border-color: #fff !important; 
            box-shadow: 0 0 15px rgba(255, 50, 0, 0.9) !important; 
        }
        
        .rb-marker::after {
            content: attr(data-name); 
            position: absolute; 
            bottom: 26px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #ccc; 
            padding: 3px 10px; border-radius: 6px; 
            font-size: 11px; white-space: nowrap; 
            border: 1px solid #444; pointer-events: none; opacity: 0.9;
        }

        .rb-timer-map {
            position: absolute; top: 26px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 2px 8px; border-radius: 4px;
            font-weight: bold; font-family: monospace; font-size: 13px;
            border: 1px solid #00ffcc; z-index: 100; pointer-events: none;
        }

        /* Интерфейс */
        #sidebar {
            position: fixed; top: 15px; left: 15px; 
            width: 280px;
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 15px; backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #game-clock-container {
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border: 1px solid #ffd70044; border-radius: 10px;
            padding: 12px; margin-bottom: 15px; text-align: center;
        }

        #game-time {
            font-family: 'Courier New', monospace; font-size: 36px; font-weight: bold;
            color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        #timer-monitor {
            background: rgba(255, 255, 255, 0.03); border: 1px solid #ffffff11;
            border-radius: 10px; padding: 5px; margin-top: 15px;
            max-height: 40vh; overflow-y: auto;
        }
        
        .monitor-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; margin-bottom: 5px; border-bottom: 1px solid #222; 
            padding: 8px; cursor: pointer; border-radius: 5px;
        }

        .monitor-item:hover { background: rgba(255,255,255,0.07); }
        .monitor-note { color: #00ffcc; font-size: 11px; font-family: monospace; }
        .ready-text { color: #ff3300; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        #search-input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; 
            background: #111; color: #fff; box-sizing: border-box; outline: none;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="game-clock-container">
        <span style="font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 2px;">L2 Game Time</span>
        <div id="game-time">--:--</div>
    </div>
    
    <input type="text" id="search-input" placeholder="Поиск босса..." oninput="handleSearch()">
    
    <div id="timer-monitor">
        <div id="monitor-list">
            <div style="color: #555; font-size: 11px; text-align: center; padding: 20px;">Нет активных таймеров</div>
        </div>
    </div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

        { name: "Storm Winged Naga", note: "th_ostrov bsnaga", pos: "top:1894px;left:4227px;" },
        { name: "Palatanos of Horrific Power", note: "pp_woawarka PALATAN5", pos: "top:1906px;left:4305px;" },
        { name: "Flamestone Giant", note: "pp_woawarka WATP", pos: "top:2014px;left:4287px;" },

        { name: "Varka's Hero Shadith", note: "pp_woawarka iiiadit", pos: "top:1750px;left:4017px;" },
        { name: "Varka's Commander Mos", note: "LL_ULANX500 5ALI", pos: "top:1770px;left:3960px;" },
        { name: "Ember", note: "ww_ulanworktk bember", pos: "top:1173px;left:4720px;" },
        { name: "Uruka", note: "ww_ulanworktk urkahan", pos: "top:1990px;left:3002px;" },
        { name: "Soul of Water Ashutar", note: "kk_port1 wwarka", pos: "top:1765px;left:3911px;" },
        { name: "Soul of Fire Nastron", note: "kk_port1 kketra", pos: "top:1411px;left:4266px;" },
        { name: "Varka's Chief Horus", note: "LL_ULANX500 4ALI", pos: "top:1721px;left:3923px;" },
        { name: "Andreas van Halter", note: "LL_ULANX500 PAGANKA", pos: "top:1640px;left:3222px;" },
        { name: "Plague Golem", note: "ll_woatab 4tab", pos: "top:1584px;left:4509px;" },
        { name: "MILENU", note: "GM_RUSMAG FSO", pos: "top:3972px;left:3737px;" },
        { name: "Ketra's Chief Brakki", note: "kk_port1 kketra", pos: "top:1385px;left:4289px;" },
        { name: "Ketra's Commander Tayr", note: "kk_port1 kketra", pos: "top:1421px;left:4298px;" },
        { name: "Ketra's Hero Hekaton", note: "Ketra Hekaton", pos: "top:1477px;left:4316px;" },
        { name: "Queen Shyeed", note: "Queen Shyeed", pos: "top:1714px;left:3813px;" },
        { name: "Lord of Splendor Anays", note: "Anays", pos: "top:1402px;left:4036px;" },
        { name: "Sealed Evil Power Sailren", note: "Sailren", pos: "top:1956px;left:3236px;" },
        { name: "Daimon the White-Eyed", note: "Daimon", pos: "top:1717px;left:4660px;" },
        { name: "Last Lesser Giant Glaki", note: "Glaki", pos: "top:2492px;left:4526px;" },
        { name: "Icicle Emperor Bumbalump", note: "Bumbalump", pos: "top:1103px;left:4403px;" },
        { name: "Gorgolos", note: "GM_RUSMAG BATAT", pos: "top:2542px;left:4659px;" },
        { name: "Roaring Lord Kastor", note: "Kastor", pos: "top:2035px;left:3921px;" },
        { name: "Hekaton Prime", note: "GM_RUSMAG BATAT", pos: "top:2606px;left:4688px;" },
        { name: "Last Titan Utenus", note: "GM_RUSMAG BATAT", pos: "top:2579px;left:4672px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const monitorList = document.getElementById('monitor-list');
    const viewport = document.getElementById('viewport');
    const gameClockDisplay = document.getElementById('game-time');
    
    let scale = window.innerWidth / 5062;
    let posX = 0, posY = 0;
    let prevDiff = -1;

    // Игровое время
    const CORRECTION_SECONDS = 6; 
    const SYNC_REAL_SEC = (22 * 3600) + (56 * 60) + CORRECTION_SECONDS;
    const SYNC_GAME_MIN = (17 * 60) + 36;

    function updateGameTime() {
        const now = new Date();
        const nowRealSec = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        const diffRealSec = nowRealSec - SYNC_REAL_SEC;
        const diffGameMin = diffRealSec / 10;
        let totalGameMin = Math.floor(SYNC_GAME_MIN + diffGameMin);
        totalGameMin = ((totalGameMin % 1440) + 1440) % 1440;
        const h = Math.floor(totalGameMin / 60);
        const m = totalGameMin % 60;
        gameClockDisplay.innerText = `${h < 10 ? '0' + h : h}:${m < 10 ? '0' + m : m}`;
    }

    setInterval(updateGameTime, 1000);

    // Инициализация
    function init() {
        wrapper.style.backgroundImage = `url('${MAP_IMAGE}')`;
        posY = (window.innerHeight - (4210 * scale)) / 2;
        drawMarkers();
        loadState(); 
        update();
        updateGameTime();
    }

    function drawMarkers() {
        wrapper.innerHTML = '';
        bossData.forEach((boss) => {
            const m = document.createElement('div');
            m.className = 'rb-marker';
            m.style.cssText = boss.pos;
            m.setAttribute('data-name', boss.name);
            m.onclick = (e) => {
                e.stopPropagation();
                if (m.classList.contains('is-alive')) {
                    m.classList.remove('is-alive');
                    boss.currentTime = null;
                } else if (!boss.timerInterval) {
                    startTimer(boss);
                } else {
                    focus(boss);
                }
                saveState();
                updateMonitor();
            };
            wrapper.appendChild(m);
            boss.markerEl = m;
        });
    }

    function startTimer(boss) {
        if (boss.timerInterval) return;
        let timeLeft = 15 * 60; 
        const timerDisplay = document.createElement('div');
        timerDisplay.className = 'rb-timer-map';
        boss.markerEl.appendChild(timerDisplay);
        
        boss.timerInterval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;
            timerDisplay.innerText = timeStr;
            boss.currentTime = timeStr;
            
            if (timeLeft <= 0) {
                clearInterval(boss.timerInterval);
                boss.timerInterval = null;
                if (timerDisplay) timerDisplay.remove();
                boss.markerEl.classList.add('is-alive');
                boss.currentTime = "READY!";
                saveState();
            }
            updateMonitor();
        }, 1000);
    }

    function saveState() {
        const activeNames = bossData
            .filter(b => b.markerEl.classList.contains('is-alive'))
            .map(b => b.name);
        localStorage.setItem('l2_alive_bosses', JSON.stringify(activeNames));
    }

    function loadState() {
        const saved = localStorage.getItem('l2_alive_bosses');
        if (saved) {
            const aliveNames = JSON.parse(saved);
            bossData.forEach(boss => {
                if (aliveNames.includes(boss.name)) {
                    boss.markerEl.classList.add('is-alive');
                    boss.currentTime = "READY!";
                }
            });
            updateMonitor();
        }
    }

    function updateMonitor() {
        const active = bossData.filter(b => b.timerInterval || b.currentTime === "READY!");
        active.sort((a, b) => (a.currentTime === "READY!" ? 1 : -1));

        if (active.length === 0) {
            monitorList.innerHTML = '<div style="color: #444; font-size: 11px; text-align: center; padding: 15px;">Список пуст</div>';
            return;
        }

        monitorList.innerHTML = active.map(b => {
            const isReady = b.currentTime === "READY!";
            return `
                <div class="monitor-item" onclick="focusByName('${b.name.replace(/'/g, "\\'")}')">
                    <span class="monitor-note">${b.note}</span>
                    <span class="${isReady ? 'ready-text' : ''}" style="font-family:monospace; background:${isReady ? '#ff330022' : '#00ffcc22'}; padding:2px 8px; border-radius:4px; border: 1px solid ${isReady ? '#ff3300' : '#00ffcc44'}">
                        ${b.currentTime}
                    </span>
                </div>
            `;
        }).join('');
    }

    function focusByName(name) {
        const boss = bossData.find(b => b.name === name);
        if (boss) focus(boss);
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        if (val.length < 2) return;
        const boss = bossData.find(b => b.name.toLowerCase().includes(val) || b.note.toLowerCase().includes(val));
        if (boss) focus(boss);
    }

    function focus(boss) {
        const t = parseInt(boss.pos.match(/top:(\d+)px/)[1]);
        const l = parseInt(boss.pos.match(/left:(\d+)px/)[1]);
        scale = 0.8;
        posX = (window.innerWidth/2) - (l * scale);
        posY = (window.innerHeight/2) - (t * scale);
        update();
    }

    function update() { 
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; 
    }

    // Zoom & Pan
    let isDrag = false, lx, ly;
    viewport.onwheel = e => { e.preventDefault(); applyZoom(e.deltaY > 0 ? 0.9 : 1.1, e.clientX, e.clientY); };

    function applyZoom(delta, centerX, centerY) {
        const ns = Math.min(Math.max(0.1, scale * delta), 3);
        posX = centerX - (centerX - posX) * (ns / scale);
        posY = centerY - (centerY - posY) * (ns / scale);
        scale = ns;
        update();
    }

    viewport.ontouchstart = e => {
        if (e.touches.length === 1) { isDrag = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
        else if (e.touches.length === 2) { isDrag = false; prevDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
    };

    viewport.ontouchmove = e => {
        e.preventDefault();
        if (e.touches.length === 1 && isDrag) {
            posX += e.touches[0].clientX - lx; posY += e.touches[0].clientY - ly;
            lx = e.touches[0].clientX; ly = e.touches[0].clientY; update();
        } else if (e.touches.length === 2) {
            const curDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (prevDiff > 0) applyZoom(curDiff / prevDiff, (e.touches[0].clientX + e.touches[1].clientX) / 2, (e.touches[0].clientY + e.touches[1].clientY) / 2);
            prevDiff = curDiff;
        }
    };

    viewport.ontouchend = () => { isDrag = false; prevDiff = -1; };
    viewport.onmousedown = e => { if(e.button === 0) { isDrag = true; lx = e.clientX; ly = e.clientY; }};
    window.onmousemove = e => { if(isDrag) { posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); }};
    window.onmouseup = () => isDrag = false;

    // РЕГИСТРАЦИЯ SERVICE WORKER (ДЛЯ КНОПКИ УСТАНОВКИ)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('SW registered!');
            }).catch(err => console.log('SW error:', err));
        });
    }

    init();
</script>
</body>
</html>
