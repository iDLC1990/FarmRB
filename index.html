<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 Map Constructor - Aden World</title>
    <style>
        body { margin: 0; padding: 0; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        
        #viewport {
            width: 100vw; height: 100vh;
            cursor: crosshair; overflow: hidden; position: relative;
            background: #050505;
        }

        #map-wrapper {
            position: absolute;
            transform-origin: 0 0;
            /* Ссылка на твою карту */
            background-image: url('https://lineage.pmfun.com/data/maps/world/Aden%20World%20Map%20CT2%20%28relief_KPAK_Edit%29.gif');
            background-repeat: no-repeat;
            background-size: contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .temp-marker {
            position: absolute; width: 12px; height: 12px;
            background: #ff0000; border: 2px solid #fff;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red; z-index: 10; cursor: pointer;
        }

        #panel {
            position: fixed; top: 15px; left: 15px; width: 330px;
            background: rgba(15, 15, 15, 0.9); border: 1px solid #00ff88;
            padding: 15px; z-index: 1000; border-radius: 10px;
            backdrop-filter: blur(4px);
        }

        #info { font-size: 11px; color: #00ff88; margin-bottom: 10px; font-family: monospace; }
        
        textarea { 
            width: 100%; height: 250px; margin-top: 10px; 
            background: #000; color: #00ff88; border: 1px solid #333; 
            font-family: 'Consolas', monospace; font-size: 11px; padding: 5px;
            box-sizing: border-box;
        }

        .controls { display: flex; gap: 5px; margin-top: 10px; }
        button { 
            flex: 1; padding: 8px; cursor: pointer; background: #222; 
            color: #eee; border: 1px solid #444; border-radius: 4px;
        }
        button:hover { background: #333; border-color: #00ff88; }
        
        .hint { font-size: 11px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="panel">
    <div style="font-weight: bold; color: #00ff88; margin-bottom: 5px;">Aden World Constructor</div>
    <div id="info">X: 0, Y: 0 | Zoom: 100%</div>
    <div class="hint">ЛКМ: Метка | ПКМ: Двигать | Колесо: Зум</div>
    <textarea id="output" readonly placeholder="Код объектов появится здесь..."></textarea>
    <div class="controls">
        <button onclick="copyCode()">Копировать</button>
        <button onclick="clearAll()">Очистить</button>
    </div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    const output = document.getElementById('output');
    const info = document.getElementById('info');

    let scale = 0.4; 
    let posX = 50, posY = 50;
    let markers = [];

    // Автоматическая подстройка под размер картинки
    const mapImg = new Image();
    mapImg.src = 'https://lineage.pmfun.com/data/maps/world/Aden%20World%20Map%20CT2%20%28relief_KPAK_Edit%29.gif';
    mapImg.onload = function() {
        wrapper.style.width = this.width + 'px';
        wrapper.style.height = this.height + 'px';
        console.log(`Карта загружена: ${this.width}x${this.height}`);
    };

    function render() {
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        info.innerText = `X: ${Math.round(posX)}, Y: ${Math.round(posY)} | Zoom: ${Math.round(scale * 100)}%`;
    }
    render();

    // Ставим метку
    viewport.addEventListener('click', (e) => {
        if (isDragging) return;
        if (e.target.classList.contains('temp-marker')) return;

        const rect = wrapper.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) / scale);
        const y = Math.round((e.clientY - rect.top) / scale);

        const name = prompt("Имя босса/объекта:", "Raid Boss");
        if (name) {
            const id = Date.now();
            const dot = document.createElement('div');
            dot.className = 'temp-marker';
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
            
            dot.onclick = (ev) => {
                ev.stopPropagation();
                if(confirm("Удалить метку?")) {
                    dot.remove();
                    markers = markers.filter(m => m.id !== id);
                    updateText();
                }
            };

            wrapper.appendChild(dot);
            markers.push({ id, name, x, y });
            updateText();
        }
    });

    function updateText() {
        const lines = markers.map(m => `  { name: "${m.name}", pos: "top:${m.y}px;left:${m.x}px;" }`);
        output.value = "[\n" + lines.join(",\n") + "\n]";
    }

    // Зум
    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.min(Math.max(0.05, scale * delta), 5);
        posX = e.clientX - (e.clientX - posX) * (newScale / scale);
        posY = e.clientY - (e.clientY - posY) * (newScale / scale);
        scale = newScale;
        render();
    };

    // Перемещение
    let isDragging = false, lastX, lastY;
    viewport.oncontextmenu = (e) => e.preventDefault();
    viewport.onmousedown = (e) => { if (e.button === 2) { isDragging = true; lastX = e.clientX; lastY = e.clientY; } };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX += (e.clientX - lastX);
        posY += (e.clientY - lastY);
        lastX = e.clientX; lastY = e.clientY;
        render();
    };
    window.onmouseup = () => isDragging = false;

    function copyCode() {
        output.select();
        document.execCommand('copy');
        alert("Скопировано!");
    }

    function clearAll() {
        if(confirm("Очистить все метки?")) {
            markers = [];
            document.querySelectorAll('.temp-marker').forEach(m => m.remove());
            updateText();
        }
    }
</script>

</body>
</html>
