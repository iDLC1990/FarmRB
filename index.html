<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Full Sub-Map Support</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        .rb-marker {
            position: absolute; width: 14px; height: 14px;
            background: rgba(150, 150, 150, 0.4); border: 1px solid #555;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
        }
        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff3300 0%, #880000 100%) !important; 
            border-color: #fff !important; box-shadow: 0 0 15px rgba(255, 50, 0, 0.8) !important; 
        }
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 2px 8px; border-radius: 4px; 
            font-size: 11px; white-space: nowrap; border: 1px solid #444; pointer-events: none;
        }

        .rb-timer-map {
            position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 1px 5px; border-radius: 4px;
            font-weight: bold; font-family: monospace; font-size: 11px; border: 1px solid #00ffcc;
        }

        .submap-entrance {
            position: absolute; width: 40px; height: 40px;
            background: rgba(0, 255, 200, 0.1); border: 2px solid #0ff;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; cursor: pointer;
            box-shadow: 0 0 20px #0ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 100% { opacity: 0.5; } }

        /* Окно подкарты */
        #submap-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 5000; overflow: hidden; touch-action: none;
        }
        #submap-wrapper {
            position: absolute; transform-origin: 0 0;
            background-repeat: no-repeat; background-size: 100% 100%;
            width: 1920px; height: 1334px; /* Примерные размеры 34.jpg, подстроятся сами */
        }

        /* Интерфейс */
        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 260px;
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 12px; backdrop-filter: blur(10px);
        }
        #game-time { font-size:28px; color:#ffd700; font-family:monospace; text-align: center; margin-bottom: 10px; }
        input { width:100%; padding:8px; background:#222; border:1px solid #444; color:white; border-radius:6px; margin-bottom:10px; box-sizing: border-box; }
        button { width:100%; padding:8px; border-radius:5px; cursor:pointer; font-size:11px; margin-bottom: 5px; border: 1px solid #444; color: white; background: #222; }
        #edit-mode-btn { background: #440; color: #ff0; }
        
        #coords-output { display:none; background:#000; color:#0f0; padding:10px; font-size:9px; font-family:monospace; margin-top:10px; max-height:100px; overflow-y:auto; }
        .monitor-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #222; font-size: 12px; cursor: pointer; }
        .ready-text { color: #f30; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="game-time">--:--</div>
    <input type="text" id="search-input" placeholder="Поиск босса..." oninput="handleSearch()">
    <button id="edit-mode-btn" onclick="toggleEditMode()">КОНСТРУКТОР: OFF</button>
    <button onclick="resetAllFirebase()" style="color:#f66;">СБРОСИТЬ ВСЕ</button>
    <div id="coords-output"></div>
    <div id="monitor-list"></div>
</div>

    let subBossData = [
        { name: "Sub-Boss 1", note: "Loc 34", pos: "top:200px;left:300px;" },
        { name: "Sub-Boss 2", note: "Loc 34", pos: "top:600px;left:800px;" }

    function init() {
        wrapper.style.backgroundImage = `url('${MAIN_MAP}')`;
        subWrapper.style.backgroundImage = `url('${SUB_MAP_IMG}')`;
        drawMarkers(wrapper, bossData);
        drawSubMapEntrance();
        listenFirebase();
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);
        update();
    }

    function drawSubMapEntrance() {
        const ent = document.createElement('div');
        ent.className = 'submap-entrance';
        ent.style.cssText = "top:2970px;left:4322px;";
        ent.onclick = openSubMap;
        wrapper.appendChild(ent);
    }

    function openSubMap() {
        isSubMapOpen = true;
        subOverlay.style.display = 'block';
        // Авто-зум под размер экрана
        subScale = Math.min(window.innerWidth / 1920, window.innerHeight / 1334) * 0.9;
        subX = (window.innerWidth - 1920 * subScale) / 2;
        subY = (window.innerHeight - 1334 * subScale) / 2;
        drawMarkers(subWrapper, subBossData);
        updateSub();
    }

    function closeSubMap() {
        isSubMapOpen = false;
        subOverlay.style.display = 'none';
    }

    function drawMarkers(container, data) {
        container.innerHTML = '';
        if(container === wrapper) drawSubMapEntrance();
        data.forEach((boss) => {
            const m = document.createElement('div');
            m.className = 'rb-marker';
            m.style.cssText = boss.pos;
            m.setAttribute('data-name', boss.name);
            let lastTap = 0;

            m.onmousedown = (e) => {
                if (!isEditMode) return;
                e.stopPropagation();
                const curScale = (container === wrapper) ? scale : subScale;
                const onMove = (ev) => {
                    const rect = container.getBoundingClientRect();
                    const x = Math.round((ev.clientX - rect.left) / curScale);
                    const y = Math.round((ev.clientY - rect.top) / curScale);
                    boss.pos = `top:${y}px;left:${x}px;`;
                    m.style.cssText = boss.pos;
                    generateCode();
                };
                window.onmousemove = onMove;
                window.onmouseup = () => window.onmousemove = null;
            };

            m.onclick = (e) => {
                if (isEditMode) return;
                e.stopPropagation();
                const now = Date.now();
                if (now - lastTap < 300) { onMarkerClick(boss); lastTap = 0; }
                else { lastTap = now; if(container === wrapper) focus(boss); }
            };
            container.appendChild(m);
            boss.markerEl = m;
        });
    }

    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
    function updateSub() { subWrapper.style.transform = `translate(${subX}px, ${subY}px) scale(${subScale})`; }

    // УПРАВЛЕНИЕ (ОСНОВНАЯ КАРТА + ПОДКАРТА)
    let isDrag = false, lx, ly, initialDist = 0;

    const handleInputStart = (e) => {
        isDrag = true;
        const t = e.touches ? e.touches[0] : e;
        lx = t.clientX; ly = t.clientY;
        if(e.touches && e.touches.length === 2) initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    };

    const handleInputMove = (e) => {
        if(!isDrag) return;
        const t = e.touches ? e.touches[0] : e;
        
        if(!isSubMapOpen) {
            if(e.touches && e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const d = dist / initialDist;
                const ns = Math.min(Math.max(0.05, scale * d), 4);
                const cx = (e.touches[0].clientX + e.touches[1].clientX)/2, cy = (e.touches[0].clientY + e.touches[1].clientY)/2;
                posX = cx - (cx - posX) * (ns / scale); posY = cy - (cy - posY) * (ns / scale);
                scale = ns; initialDist = dist; update();
            } else {
                posX += t.clientX - lx; posY += t.clientY - ly;
                lx = t.clientX; ly = t.clientY; update();
            }
        } else {
            // Движение подкарты
            subX += t.clientX - lx; subY += t.clientY - ly;
            lx = t.clientX; ly = t.clientY; updateSub();
        }
    };

    window.addEventListener('mousedown', handleInputStart);
    window.addEventListener('mousemove', handleInputMove);
    window.addEventListener('mouseup', () => isDrag = false);
    window.addEventListener('touchstart', handleInputStart, {passive:false});
    window.addEventListener('touchmove', (e) => { e.preventDefault(); handleInputMove(e); }, {passive:false});
    window.addEventListener('touchend', () => isDrag = false);

    window.addEventListener('wheel', (e) => {
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        if(!isSubMapOpen) {
            const ns = Math.min(Math.max(0.05, scale * delta), 4);
            posX = e.clientX - (e.clientX - posX) * (ns / scale);
            posY = e.clientY - (e.clientY - posY) * (ns / scale);
            scale = ns; update();
        } else {
            const ns = Math.min(Math.max(0.1, subScale * delta), 5);
            subX = e.clientX - (e.clientX - subX) * (ns / subScale);
            subY = e.clientY - (e.clientY - subY) * (ns / subScale);
            subScale = ns; updateSub();
        }
    }, {passive:false});

    // ОСТАЛЬНАЯ ЛОГИКА (FIREBASE, ТАЙМЕРЫ И Т.Д.)
    function listenFirebase() {
        rbRef.on('value', (s) => {
            const data = s.val() || {};
            [...bossData, ...subBossData].forEach(boss => {
                const node = data[boss.name.replace(/\./g, '_')];
                boss.deathTime = node ? node.deathTime : null;
                boss.isAlive = node ? node.isAlive : false;
                if(boss.markerEl) boss.markerEl.classList.toggle('is-alive', boss.isAlive);
            });
            renderMonitor();
        });
    }

    function tick() {
        [...bossData, ...subBossData].forEach(boss => {
            if (boss.deathTime && !boss.isAlive) {
                const rem = TIMER_SEC - Math.floor((Date.now() - boss.deathTime) / 1000);
                if (rem <= 0) rbRef.child(boss.name.replace(/\./g, '_')).update({ isAlive: true, deathTime: null });
                else {
                    let tMap = boss.markerEl.querySelector('.rb-timer-map');
                    if (!tMap) { tMap = document.createElement('div'); tMap.className = 'rb-timer-map'; boss.markerEl.appendChild(tMap); }
                    const m = Math.floor(rem/60), s = rem%60;
                    tMap.innerText = `${m}:${s<10?'0':''}${s}`;
                }
            } else if(boss.markerEl) {
                const tMap = boss.markerEl.querySelector('.rb-timer-map');
                if(tMap) tMap.remove();
            }
        });
    }

    function onMarkerClick(boss) {
        const id = boss.name.replace(/\./g, '_');
        if (boss.isAlive) rbRef.child(id).set(null);
        else if (!boss.deathTime) rbRef.child(id).set({ deathTime: Date.now(), isAlive: false });
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.getElementById('edit-mode-btn').innerText = isEditMode ? "КОНСТРУКТОР: ON" : "КОНСТРУКТОР: OFF";
        document.getElementById('coords-output').style.display = isEditMode ? "block" : "none";
        if(isEditMode) generateCode();
    }

    function generateCode() {
        const mainCode = bossData.map(b => `{ name: "${b.name}", note: "${b.note}", pos: "${b.pos}" }`).join(",\n");
        const subCode = subBossData.map(b => `{ name: "${b.name}", note: "${b.note}", pos: "${b.pos}" }`).join(",\n");
        document.getElementById('coords-output').innerText = "MAIN:\n" + mainCode + "\n\nSUB:\n" + subCode;
    }

    function renderMonitor() {
        const active = [...bossData, ...subBossData].filter(b => b.deathTime || b.isAlive);
        active.sort((a,b) => (a.isAlive?-1:1)-(b.isAlive?-1:1) || a.deathTime - b.deathTime);
        document.getElementById('monitor-list').innerHTML = active.map(b => {
            let ts = "READY!";
            if(!b.isAlive){
                const r = TIMER_SEC - Math.floor((Date.now()-b.deathTime)/1000);
                ts = `${Math.floor(r/60)}:${(r%60)<10?'0':''}${r%60}`;
            }
            return `<div class="monitor-item" onclick="focusByName('${b.name}')"><span>${b.name}</span><span class="${b.isAlive?'ready-text':''}">${ts}</span></div>`;
        }).join('');
    }

    function focusByName(n) { 
        if(isSubMapOpen) return;
        const b = bossData.find(x => x.name === n); 
        if(b) focus(b); 
    }
    function focus(b) {
        const t = parseInt(b.pos.match(/top:(\d+)/)[1]), l = parseInt(b.pos.match(/left:(\d+)/)[1]);
        scale = 0.8; posX = window.innerWidth/2 - l*scale; posY = window.innerHeight/2 - t*scale;
        update();
    }

    function updateGameTime() {
        const now = new Date();
        const totalMin = Math.floor(((now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds()) / 10 + 1056) % 1440);
        const h = Math.floor(totalMin/60), m = totalMin%60;
        document.getElementById('game-time').innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}`;
    }

    function resetAllFirebase() { if(confirm("Сбросить?")) rbRef.set(null); }
    function handleSearch() {
        const v = document.getElementById('search-input').value.toLowerCase();
        const b = bossData.find(x => x.name.toLowerCase().includes(v));
        if(b && v.length > 2) focus(b);
    }

    init();
</script>
</body>
</html>
