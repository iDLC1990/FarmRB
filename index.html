<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Global Time Sync</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        .rb-marker {
            position: absolute; width: 18px; height: 18px;
            background: rgba(255, 255, 255, 0.4); border: 2px solid #333;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
            display: block !important;
        }
        
        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff4400 0%, #880000 100%) !important; 
            border-color: #fff !important; box-shadow: 0 0 20px rgba(255, 50, 0, 1) !important; 
            width: 22px; height: 22px; z-index: 15;
        }

        .rb-marker.dragging { opacity: 0.6; scale: 2; z-index: 1000; cursor: grabbing; }

        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 4px; 
            font-size: 12px; white-space: nowrap; border: 1px solid #444; pointer-events: none;
        }

        .rb-timer-map {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 4px 10px; border-radius: 6px;
            font-weight: bold; font-family: 'Courier New', monospace; 
            font-size: 18px; border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.7);
            z-index: 100; pointer-events: none;
        }

        .special-marker { background: #ffd700 !important; border: 2px solid #fff !important; animation: pulse 1.5s infinite; z-index: 25; }
        @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.3; } 100% { scale: 1; } }

        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 290px;
            background: rgba(10, 10, 10, 0.95); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 15px; backdrop-filter: blur(10px);
        }
        #monitor-list { margin-top: 15px; max-height: 50vh; overflow-y: auto; }
        .monitor-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; padding: 10px; border-bottom: 1px solid #222; cursor: pointer;
        }
        .monitor-item:hover { background: rgba(255,255,255,0.1); }
        .rb-note-text { display: block; font-size: 10px; color: #888; font-weight: normal; margin-top: 2px; }
        .ready-text { color: #ff3300; font-weight: bold; }
        
        #game-time { font-size:36px; color:#ffd700; font-family:monospace; text-align:center; margin-bottom: 10px; }
        
        .btn { width:100%; padding:10px; border-radius:8px; font-weight:bold; margin-bottom:5px; cursor:pointer; border: none; }
        .btn-editor { background:#222; color:#0f0; border: 1px solid #050; }
        .btn-editor.active { background:#050; color:#fff; box-shadow: 0 0 15px #0f0; }
        .btn-reset { background: #441111; color: #ff6666; border: 1px solid #662222; margin-top: 5px; }

        #minimap-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; max-width: 700px; background: #000; border: 3px solid #ffd700;
            z-index: 3000; display: none; border-radius: 10px; overflow: hidden;
        }
        #minimap-overlay img { width: 100%; display: block; }
    </style>
</head>

{ name: "Enchanced Mimir", note: "newly added", pos: "top:2937px;left:4001px;" },
{ name: "Abyssal Makkum", note: "newly added", pos: "top:2567px;left:3804px;" },
{ name: "gordon", note: "newly added", pos: "top:1577px;left:4400px;" },
{ name: "Typhoon", note: "newly added", pos: "top:4008px;left:2830px;" },
        { id: "Utenus", name: "Last Titan Utenus", note: "GM_RUSMAG BATAT", pos: "top:2579px;left:4672px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    let scale = window.innerWidth / 5062;
    let posX = 0, posY = 0;

    function init() {
        wrapper.style.backgroundImage = `url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true')`;
        bossData.forEach(createMarker);
        addSpecialMarker();
        update();
        listenFirebase(); 
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);
    }

    function addSpecialMarker() {
        const sm = document.createElement('div');
        sm.className = 'rb-marker special-marker';
        sm.style.top = "2970px"; sm.style.left = "4322px";
        sm.setAttribute('data-name', 'SECRET MINI-MAP');
        sm.onclick = (e) => { 
            e.stopPropagation(); 
            document.getElementById('minimap-overlay').style.display = 'block'; 
        };
        wrapper.appendChild(sm);
    }

    function createMarker(boss) {
        let m = document.createElement('div');
        m.id = 'rb-' + boss.id;
        m.className = 'rb-marker';
        const p = boss.pos.split(';');
        m.style.top = p[0].split(':')[1];
        m.style.left = p[1].split(':')[1];
        m.setAttribute('data-name', boss.name);
        
        let clickTimer = null;
        m.onmousedown = (e) => {
            if (isEditorMode) {
                e.stopPropagation();
                draggedBossId = boss.id;
                m.classList.add('dragging');
            }
        };

        m.onclick = (e) => {
            if (isEditorMode) return;
            e.stopPropagation();
            if (clickTimer) {
                clearTimeout(clickTimer); clickTimer = null;
                onDoubleClick(boss);
            } else {
                clickTimer = setTimeout(() => { focus(boss); clickTimer = null; }, 250);
            }
        };
        wrapper.appendChild(m);
    }

    function onDoubleClick(boss) {
        const b = bossData.find(x => x.id === boss.id);
        if (b.isAlive) rbRef.child(boss.id).update({ isAlive: false, deathTime: null });
        else rbRef.child(boss.id).update({ deathTime: Date.now(), isAlive: false });
    }

    function listenFirebase() {
        rbRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            bossData.forEach(boss => {
                const item = data[boss.id];
                if (item) {
                    boss.deathTime = item.deathTime || null;
                    boss.isAlive = item.isAlive || false;
                    if (item.pos) {
                        boss.pos = item.pos;
                        const m = document.getElementById('rb-' + boss.id);
                        if (m && !m.classList.contains('dragging')) {
                            const p = item.pos.split(';');
                            m.style.top = p[0].split(':')[1];
                            m.style.left = p[1].split(':')[1];
                        }
                    }
                }
                const m = document.getElementById('rb-' + boss.id);
                if (m) {
                    if (boss.isAlive) m.classList.add('is-alive');
                    else m.classList.remove('is-alive');
                }
            });
            renderMonitor();
        });
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(boss => {
            const m = document.getElementById('rb-' + boss.id);
            if (!m) return;
            if (boss.deathTime && !boss.isAlive) {
                const rem = SPAWN_WINDOW - Math.floor((now - boss.deathTime) / 1000);
                if (rem <= 0) {
                    rbRef.child(boss.id).update({ isAlive: true, deathTime: null });
                } else {
                    let t = m.querySelector('.rb-timer-map');
                    if (!t) { t = document.createElement('div'); t.className = 'rb-timer-map'; m.appendChild(t); }
                    const min = Math.floor(rem / 60); const sec = rem % 60;
                    t.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                }
            } else {
                const t = m.querySelector('.rb-timer-map'); if (t) t.remove();
            }
        });
        renderMonitor();
    }

    function renderMonitor() {
        const list = document.getElementById('monitor-list');
        const active = bossData.filter(b => b.deathTime || b.isAlive);
        active.sort((a, b) => (a.isAlive === b.isAlive) ? (a.deathTime - b.deathTime) : (a.isAlive ? -1 : 1));
        const now = Date.now();
        list.innerHTML = active.map(b => {
            let timeStr = "READY";
            if (!b.isAlive) {
                const rem = SPAWN_WINDOW - Math.floor((now - b.deathTime) / 1000);
                const m = Math.max(0, Math.floor(rem / 60)); const s = Math.max(0, rem % 60);
                timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
            return `<div class="monitor-item" onclick="focusById('${b.id}')">
                <div>
                    <div style="font-weight:bold">${b.name}</div>
                    <div class="rb-note-text">${b.note || ""}</div>
                </div>
                <span class="${b.isAlive ? 'ready-text' : ''}" style="font-family:monospace; border:1px solid; padding:2px 5px; border-radius:4px">${timeStr}</span>
            </div>`;
        }).join('');
    }

    function resetTimers() {
        if(confirm("Очистить все таймеры и статусы боссов?")) {
            const updates = {};
            bossData.forEach(b => {
                updates[`${b.id}/deathTime`] = null;
                updates[`${b.id}/isAlive`] = false;
            });
            rbRef.update(updates);
        }
    }

    function toggleEditor() {
        if (!isEditorMode) {
            const pass = prompt("Введите пароль для входа в режим редактора:");
            if (pass === "D36rk43mgm") {
                isEditorMode = true;
            } else {
                alert("Неверный пароль!");
                return;
            }
        } else {
            isEditorMode = false;
        }
        
        const btn = document.getElementById('editor-btn');
        btn.innerText = isEditorMode ? "РЕДАКТОР: ВКЛ" : "РЕДАКТОР: ВЫКЛ";
        btn.classList.toggle('active');
    }

    function focusById(id) { const b = bossData.find(x => x.id === id); if (b) focus(b); }
    function focus(boss) {
        const m = document.getElementById('rb-' + boss.id);
        const t = parseInt(m.style.top); const l = parseInt(m.style.left);
        scale = 0.8; posX = (window.innerWidth / 2) - (l * scale); posY = (window.innerHeight / 2) - (t * scale);
        update();
    }
    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function updateGameTime() {
        const now = new Date();
        // Исправлено: используем UTC секунды для глобальной синхронизации
        const nowSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        
        // Точка синхронизации пересчитана под UTC
        const syncReal = (19 * 3600) + (56 * 60) + 6; 
        const syncGame = (17 * 60) + 36;
        
        let gameMin = Math.floor(syncGame + (nowSec - syncReal) / 10);
        gameMin = ((gameMin % 1440) + 1440) % 1440;
        
        const h = Math.floor(gameMin / 60); 
        const m = gameMin % 60;
        
        document.getElementById('game-time').innerText = `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}`;
    }

    let isDrag = false, lx, ly;
    window.onmousedown = e => { if(e.button === 0 && !draggedBossId) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onmousemove = e => {
        if (draggedBossId) {
            const rect = wrapper.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / scale);
            const y = Math.round((e.clientY - rect.top) / scale);
            const m = document.getElementById('rb-' + draggedBossId);
            m.style.top = y + 'px'; m.style.left = x + 'px';
        } else if (isDrag) {
            posX += e.clientX - lx; posY += e.clientY - ly;
            lx = e.clientX; ly = e.clientY; update();
        }
    };
    window.onmouseup = () => {
        if (draggedBossId) {
            const m = document.getElementById('rb-' + draggedBossId);
            rbRef.child(draggedBossId).update({ pos: `top:${m.style.top};left:${m.style.left};` });
            m.classList.remove('dragging');
            draggedBossId = null;
        }
        isDrag = false;
    };

    viewport.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.8 : 1.2;
        const ns = Math.min(Math.max(0.05, scale * delta), 4);
        posX = e.clientX - (e.clientX - posX) * (ns / scale);
        posY = e.clientY - (e.clientY - posY) * (ns / scale);
        scale = ns; update();
    }, { passive: false });

    init();
</script>
