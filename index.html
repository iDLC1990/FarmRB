<head>
    <meta charset="UTF-8">

    <title>L2 RB Map - Ultimate Tracking</title>

    <style>
        :root {
            --primary-gold: #ffd700;
            --bg-dark: #050505;
            --sidebar-bg: rgba(10, 10, 10, 0.95);
        }

        body { 
            margin: 0; padding: 0; background: var(--bg-dark); color: #eee; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            touch-action: none; user-select: none;
        }

        /* Верхняя панель Эпиков */
        #epic-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: linear-gradient(to bottom, #1a1a1a, #000);
            border-bottom: 2px solid var(--primary-gold);
            z-index: 2000; display: flex; align-items: center; 
            padding: 0 15px; overflow-x: auto; white-space: nowrap;
            gap: 12px; scrollbar-width: none;
        }
        #epic-bar::-webkit-scrollbar { display: none; }

        .epic-item {
            display: inline-flex; flex-direction: column; align-items: center;
            padding: 6px 12px; border: 1px solid #333; border-radius: 6px;
            min-width: 130px; background: rgba(255,255,255,0.05); cursor: pointer;
            transition: 0.3s;
        }
        .epic-item:hover { border-color: var(--primary-gold); background: rgba(255,215,0,0.1); }
        .epic-name { font-size: 11px; font-weight: bold; color: var(--primary-gold); text-transform: uppercase; margin-bottom: 2px; }
        .epic-timer { font-family: 'Courier New', monospace; font-size: 15px; color: #00ffcc; font-weight: bold; }
        .epic-status { font-size: 9px; color: #888; text-transform: uppercase; }
        
        .epic-item.active-window { 
            border-color: #ff4400; 
            box-shadow: 0 0 15px #f40; 
            animation: pulse-epic 1.5s infinite; 
            background: rgba(255, 68, 0, 0.2);
        }

        @keyframes pulse-epic { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; will-change: transform; transition: filter 0.5s; }

        /* Ночной режим */
        .night-mode #map-wrapper { filter: brightness(0.3) contrast(1.3) saturate(0.7); }

        /* Метки РБ */
        .rb-marker {
            position: absolute; width: 18px; height: 18px;
            background: rgba(255, 255, 255, 0.4); border: 2px solid #333;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff4400 0%, #880000 100%) !important; 
            border-color: #fff !important; box-shadow: 0 0 20px rgba(255, 50, 0, 1) !important; 
            width: 22px; height: 22px; z-index: 15;
        }
        
        /* Приоритет ★ */
        .rb-marker.priority::before {
            content: '★'; position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
            color: var(--primary-gold); font-size: 22px; text-shadow: 0 0 8px #000;
        }

        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 2px 8px; border-radius: 4px; 
            font-size: 11px; white-space: nowrap; pointer-events: none; border: 1px solid #444;
        }

        /* Режимы фильтрации */
        .mode-minimal .rb-marker::after, 
        .mode-minimal .rb-start-time-label, 
        .mode-minimal .rb-last-respawn-label, 
        .mode-minimal .rb-timer-map { display: none !important; }
        
        .mode-timers .rb-marker:not(.has-active-timer) { display: none !important; }
        .mode-ready .rb-marker.has-active-timer { display: none !important; }

        .rb-timer-map {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 3px 8px; border-radius: 6px;
            font-weight: bold; font-family: monospace; font-size: 16px; border: 2px solid #00ffcc;
            z-index: 100; pointer-events: none;
        }

        #sidebar {
            position: fixed; top: 90px; left: 15px; width: 280px;
            background: var(--sidebar-bg); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 15px; backdrop-filter: blur(10px);
            max-height: calc(100vh - 120px); overflow-y: auto;
        }

        .control-group { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        select, button { width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 12px; }
        
        #game-time { font-size: 36px; color: var(--primary-gold); text-align: center; margin-bottom: 10px; font-family: monospace; }

        /* Модалка Эпиков */
        #epic-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid var(--primary-gold); padding: 20px;
            z-index: 5000; display: none; border-radius: 12px; width: 320px; box-shadow: 0 0 50px #000;
        }
        .day-checkboxes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 12px 0; }
        .day-box { font-size: 11px; text-align: center; background: #222; padding: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .day-box.selected { background: var(--primary-gold); color: #000; border-color: #fff; }

        .monitor-item {
            padding: 10px; border-bottom: 1px solid #222; font-size: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .priority-text { color: var(--primary-gold); font-weight: bold; }
    </style>
</head>

    let epics = ["Queen Ant", "Core", "Orfen", "Zaken", "Baium", "Frintezza", "Antharas", "Valakas", "Beleth"];

    function init() {
        document.getElementById('map-wrapper').style.backgroundImage = `url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true')`;
        
        const eBar = document.getElementById('epic-bar');
        epics.forEach(name => {
            const div = document.createElement('div');
            div.className = 'epic-item';
            div.id = `epic-${name.replace(/\s/g, '')}`;
            div.innerHTML = `<span class="epic-name">${name}</span><span class="epic-timer">--:--:--</span><span class="epic-status">Ждёт</span>`;
            div.onclick = () => openEpicModal(name);
            eBar.appendChild(div);
        });

        document.querySelectorAll('.day-box').forEach(box => {
            box.onclick = () => box.classList.toggle('selected');
        });

        listenFirebase();
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);
        setInterval(updateEpicTimers, 1000);

    function listenFirebase() {
        rbRef.on('value', (snap) => {
            const fbData = snap.val() || {};
            bossData.forEach(localBoss => {
                const cloud = fbData[localBoss.id];
                if(cloud) {
                    localBoss.isAlive = cloud.isAlive;
                    localBoss.deathTime = cloud.deathTime;
                    localBoss.priority = cloud.priority;
                }
            });
            renderMarkers();
            renderMonitor();
        });
        epicRef.on('value', snap => { epicSettings = snap.val() || {}; });
    }

    function renderMarkers() {
        const wrapper = document.getElementById('map-wrapper');
        bossData.forEach(boss => {
            let m = document.getElementById('rb-' + boss.id);
            if (!m) {
                m = document.createElement('div');
                m.id = 'rb-' + boss.id;
                m.className = 'rb-marker';
                m.onclick = (e) => {
                    e.stopPropagation();
                    if(isEditorMode) { togglePriority(boss.id); return; }
                    handleBossClick(boss);
                };
                wrapper.appendChild(m);
            }
            const p = boss.pos.split(';');
            m.style.top = p[0].split(':')[1];
            m.style.left = p[1].split(':')[1];
            m.setAttribute('data-name', boss.name);
            m.classList.toggle('is-alive', !!boss.isAlive);
            m.classList.toggle('priority', !!boss.priority);
            m.classList.toggle('has-active-timer', (boss.deathTime && !boss.isAlive));
        });
    }

    function updateEpicTimers() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const serverTime = new Date(utc + (3600000 * 3)); // UTC+3

        epics.forEach(name => {
            const id = name.replace(/\s/g, '');
            const settings = epicSettings[id];
            const display = document.getElementById(`epic-${id}`);
            if (!settings || !display) return;

            const tLabel = display.querySelector('.epic-timer');
            const sLabel = display.querySelector('.epic-status');

            let target = new Date(serverTime);
            target.setDate(settings.startDate);
            const [h, m] = settings.startTime.split(':');
            target.setHours(h, m, 0, 0);

            let diff = target - serverTime;

            if (diff < 0) {
                const windowEnd = new Date(target.getTime() + 30 * 60000);
                if (serverTime < windowEnd) {
                    display.classList.add('active-window');
                    sLabel.innerText = "ОКНО ПОЯВЛЕНИЯ";
                    tLabel.innerText = formatTime(Math.floor((windowEnd - serverTime)/1000));
                } else {
                    display.classList.remove('active-window');
                    sLabel.innerText = "Ждёт настройки";
                    tLabel.innerText = "CLOSED";
                }
            } else {
                display.classList.remove('active-window');
                sLabel.innerText = "До начала";
                tLabel.innerText = formatTime(Math.floor(diff/1000));
            }
        });
    }

    function handleBossClick(boss) {
        const now = Date.now();
        if (boss.lastClick && (now - boss.lastClick < 400)) {
            rbRef.child(boss.id).update({ isAlive: false, deathTime: Date.now() });
        }
        boss.lastClick = now;
    }

    function togglePriority(id) {
        const b = bossData.find(x => x.id === id);
        rbRef.child(id).update({ priority: !b.priority });
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(boss => {
            const m = document.getElementById('rb-' + boss.id);
            if (!m) return;
            if (boss.deathTime && !boss.isAlive) {
                const rem = SPAWN_WINDOW - Math.floor((now - boss.deathTime) / 1000);
                if (rem <= 0) { rbRef.child(boss.id).update({ isAlive: true, deathTime: null }); }
                else {
                    let t = m.querySelector('.rb-timer-map') || document.createElement('div');
                    t.className = 'rb-timer-map'; if (!m.contains(t)) m.appendChild(t);
                    t.innerText = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
                }
            } else { if(m.querySelector('.rb-timer-map')) m.querySelector('.rb-timer-map').remove(); }
        });
    }

    function renderMonitor() {
        const list = document.getElementById('monitor-list');
        const active = bossData.filter(b => b.isAlive || b.deathTime)
            .sort((a,b) => (b.priority - a.priority));
        
        list.innerHTML = active.map(b => `
            <div class="monitor-item">
                <span class="${b.priority?'priority-text':''}">${b.priority?'★ ':''}${b.name}</span>
                <span style="color:${b.isAlive?'#0f0':'#00ffcc'}">${b.isAlive?'READY':'TIMER'}</span>
            </div>
        `).join('');
    }

    function updateGameTime() {
        const now = new Date();
        const nowSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        const syncReal = (19 * 3600) + (56 * 60) + 6; const syncGame = (17 * 60) + 36;
        let gameMin = Math.floor(syncGame + (nowSec - syncReal) / 10);
        gameMin = ((gameMin % 1440) + 1440) % 1440;
        document.getElementById('game-time').innerText = `${Math.floor(gameMin/60).toString().padStart(2,'0')}:${(gameMin%60).toString().padStart(2,'0')}`;
    }

    // Вспомогательные функции
    function formatTime(s) { 
        const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60); const sec = s%60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }
    function toggleNightMode() { isNightMode = !isNightMode; document.body.classList.toggle('night-mode', isNightMode); document.getElementById('night-btn').innerText = `НОЧНОЙ РЕЖИМ: ${isNightMode?'ВКЛ':'ВЫКЛ'}`; }
    function updateViewMode() { const mode = document.getElementById('view-mode').value; const wrapper = document.getElementById('map-wrapper'); wrapper.className = mode === 'default' ? '' : 'mode-' + mode; }
    function toggleEditor() { if (!isEditorMode) { if (prompt("Пароль:") === "D36rk43mgm") isEditorMode = true; else return; } else isEditorMode = false; document.getElementById('editor-btn').innerText = isEditorMode ? "РЕДАКТОР: ВКЛ" : "РЕДАКТОР: ВЫКЛ"; }
    function openEpicModal(name) { currentEditingEpic = name; document.getElementById('modal-title').innerText = name; document.getElementById('epic-modal').style.display = 'block'; }
    function closeEpicModal() { document.getElementById('epic-modal').style.display = 'none'; }
    function saveEpicSettings() {
        const d = document.getElementById('setup-date').value; const t = document.getElementById('setup-time').value;
        const days = Array.from(document.querySelectorAll('.day-box.selected')).map(b => parseInt(b.dataset.day));
        if(!d || !t) return alert("Заполни дату и время!");
        epicRef.child(currentEditingEpic.replace(/\s/g, '')).set({ startDate: parseInt(d), startTime: t, days: days });
        closeEpicModal();
    }

    // Навигация (Drag & Zoom)
    let scale = 0.25, posX = 0, posY = 0, isDrag = false, lx, ly;
    window.onpointerdown = e => { if(e.target.id === 'viewport' || e.target.id === 'map-wrapper') { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onpointermove = e => { if (!isDrag) return; posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; updateT(); };
    window.onpointerup = () => isDrag = false;
    window.onwheel = e => { const delta = e.deltaY > 0 ? 0.9 : 1.1; scale = Math.min(Math.max(0.1, scale * delta), 3); updateT(); };
    function updateT() { document.getElementById('map-wrapper').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    init();
</script>
</body>
</html>
