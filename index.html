<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 RB Map - Fixed Coordinates</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        
        /* Главный экран */
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
        }

        /* Контейнер всей карты */
        #map-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            width: 3072px; /* Фиксированная ширина как на источнике */
            height: 4608px;
        }

        /* Сама картинка карты */
        #map-image {
            width: 100%;
            height: 100%;
            background-image: url('https://linedia.ru/img/map.jpg');
            background-repeat: no-repeat;
            position: absolute;
        }

        .boss-marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background: url('https://linedia.ru/img/flag.png') no-repeat center;
            background-size: contain;
            cursor: pointer;
            z-index: 10;
            /* Центрируем иконку по координате */
            transform: translate(-50%, -100%); 
        }

        .boss-marker:hover { filter: brightness(1.5) drop-shadow(0 0 5px #00ff88); }
        .boss-marker.active { filter: hue-rotate(280deg) drop-shadow(0 0 8px red); }

        /* Панель управления */
        #ui-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(10, 15, 25, 0.9);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            z-index: 2000;
            display: none;
            backdrop-filter: blur(10px);
        }

        .timer-val { font-size: 2.5rem; text-align: center; color: #ff4d4d; font-family: monospace; margin: 10px 0; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 4px; background: #2c3e50; color: white; font-weight: bold; }
        button.start { background: #c0392b; grid-column: span 2; padding: 12px; margin-top: 5px; }

        #hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="map-wrapper">
        <div id="map-image"></div>
        </div>
</div>

<div id="ui-panel">
    <div id="ui-name" style="font-weight: bold; color: #00ff88;"></div>
    <div id="ui-timer" class="timer-val">READY</div>
    <div class="controls">
        <button onclick="startRB(12)">12ч</button>
        <button onclick="startRB(24)">24ч</button>
        <button class="start" onclick="manualStart()">Указать время</button>
        <button style="grid-column: span 2; margin-top: 5px;" onclick="resetRB()">Сбросить</button>
        <button style="grid-column: span 2; background: #444;" onclick="closeUI()">Закрыть</button>
    </div>
</div>

<div id="hint">Колесико: зум | Зажать мышь: двигать карту</div>

        { name: "Varka's Commander Mos", lvl: 80, pos: "top:924px;left:1062px;" },
        { name: "Ember", lvl: 80, pos: "top:1364px;left:1312px;" },
        { name: "Uruka", lvl: 80, pos: "top:1894px;left:1085px;" },
        { name: "Ketra's Chief Brakki", lvl: 80, pos: "top:764px;left:1044px;" },
        { name: "Gordon", lvl: 80, pos: "top:1034px;left:1282px;" },
        { name: "Soul of Water Ashutar", lvl: 80, pos: "top:724px;left:1134px;" },
        { name: "Soul of Fire Nastron", lvl: 80, pos: "top:894px;left:1044px;" },
        { name: "Varka's Chief Horus", lvl: 80, pos: "top:924px;left:1112px;" },
        { name: "Sailren", lvl: 80, pos: "top:1934px;left:1044px;" },
        { name: "Anays", lvl: 80, pos: "top:1114px;left:1456px;" },
        { name: "Andreas van Halter", lvl: 80, pos: "top:1186px;left:1488px;" },
        { name: "Plague Golem", lvl: 80, pos: "top:1224px;left:1396px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    let scale = 0.5; // Начальный зум (50%)
    let posX = -500, posY = -800; // Начальная позиция
    let states = JSON.parse(localStorage.getItem('rb_map_final')) || {};
    let currentId = null;

    // Инициализация меток
    bosses.forEach((boss, i) => {
        const m = document.createElement('div');
        m.className = 'boss-marker';
        m.id = `m-${i}`;
        m.style.cssText = boss.pos;
        m.onclick = (e) => { e.stopPropagation(); showUI(i); };
        wrapper.appendChild(m);
    });

    // Управление зумом и движением
    function updateTransform() {
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.min(Math.max(0.2, scale * delta), 2);
        updateTransform();
    };

    let isDragging = false, startX, startY;
    viewport.onmousedown = (e) => {
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
        viewport.style.cursor = 'grabbing';
    };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        updateTransform();
    };
    window.onmouseup = () => {
        isDragging = false;
        viewport.style.cursor = 'grab';
    };

    // Логика таймеров
    function showUI(id) {
        currentId = id;
        document.getElementById('ui-panel').style.display = 'block';
        document.getElementById('ui-name').innerText = bosses[id].name;
        updateUI();
    }

    function closeUI() { document.getElementById('ui-panel').style.display = 'none'; currentId = null; }

    function startRB(h) { states[currentId] = Date.now() + (h * 3600 * 1000); save(); }
    function manualStart() { 
        let m = prompt("Через сколько минут респ?");
        if (m) { states[currentId] = Date.now() + (m * 60 * 1000); save(); }
    }
    function resetRB() { delete states[currentId]; save(); }
    function save() { localStorage.setItem('rb_map_final', JSON.stringify(states)); }

    function updateUI() {
        if (currentId === null) return;
        const el = document.getElementById('ui-timer');
        if (!states[currentId]) { el.innerText = "ALIVE"; el.style.color = "#00ff88"; return; }
        const diff = states[currentId] - Date.now();
        if (diff <= 0) { el.innerText = "READY"; el.style.color = "#00ff88"; }
        else {
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            el.innerText = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            el.style.color = "#ff4d4d";
        }
    }

    setInterval(() => {
        updateUI();
        bosses.forEach((_, i) => {
            const m = document.getElementById(`m-${i}`);
            if (states[i] && states[i] > Date.now()) m.classList.add('active');
            else m.classList.remove('active');
        });
    }, 1000);

    updateTransform();
</script>

</html>
