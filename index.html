<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Fixed & Stable</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        /* Метки боссов */
        .rb-marker {
            position: absolute; width: 16px; height: 16px;
            background: rgba(255, 255, 255, 0.3); border: 2px solid #666;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            display: block !important; /* Гарантируем видимость */
        }
        
        /* Живой босс */
        .rb-marker.is-alive { 
            background: radial-gradient(circle, #ff4400 0%, #880000 100%) !important; 
            border-color: #fff !important; box-shadow: 0 0 20px rgba(255, 50, 0, 1) !important; 
            width: 20px; height: 20px; z-index: 15;
        }

        .rb-marker.dragging { opacity: 0.5; scale: 1.8; z-index: 100; cursor: grabbing; }

        /* Текст имени над меткой */
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 4px; 
            font-size: 12px; white-space: nowrap; border: 1px solid #444; pointer-events: none;
        }

        /* КРУПНЫЙ ТАЙМЕР НА КАРТЕ */
        .rb-timer-map {
            position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 3px 8px; border-radius: 6px;
            font-weight: bold; font-family: 'Courier New', monospace; 
            font-size: 16px; /* Еще крупнее */
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            z-index: 20; pointer-events: none;
        }

        /* Миникарта (Secret) */
        .special-marker { background: #ffd700 !important; border: 2px solid #fff !important; animation: pulse 1.5s infinite; z-index: 25; }
        @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.3; } 100% { scale: 1; } }

        /* Боковая панель */
        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 280px;
            background: rgba(10, 10, 10, 0.95); border: 1px solid #333;
            padding: 15px; z-index: 1000; border-radius: 15px; backdrop-filter: blur(10px);
        }
        #monitor-list { margin-top: 15px; max-height: 50vh; overflow-y: auto; }
        .monitor-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; padding: 10px; border-bottom: 1px solid #222; cursor: pointer; color: #ccc;
        }
        .monitor-item:hover { background: rgba(255,255,255,0.1); }
        .ready-text { color: #ff3300; font-weight: bold; }
        
        #game-time { font-size:36px; color:#ffd700; font-family:monospace; text-align:center; margin-bottom: 10px; }
        .btn { width:100%; padding:10px; border-radius:8px; font-weight:bold; margin-bottom:5px; cursor:pointer; border:1px solid transparent; }
        .btn-editor { background:#222; color:#0f0; border-color:#050; }
        .btn-editor.active { background:#050; color:#fff; box-shadow: 0 0 15px #0f0; }
        .btn-reset { background:#400; color:#f88; }

        #minimap-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; max-width: 700px; background: #000; border: 3px solid #ffd700;
            z-index: 3000; display: none; border-radius: 10px; overflow: hidden;
        }
        #minimap-overlay img { width: 100%; display: block; }
    </style>
</head>
<body>

<div id="minimap-overlay" onclick="this.style.display='none'">
    <img src="https://github.com/iDLC1990/FarmRB/blob/main/34.jpg?raw=true">
</div>

<div id="sidebar">
    <div id="game-time">00:00</div>
    <button onclick="toggleEditor()" id="editor-btn" class="btn btn-editor">РЕЖИМ РЕДАКТОРА (ВЫКЛ)</button>
    <button onclick="resetAllFirebase()" class="btn btn-reset">СБРОСИТЬ ВСЕ</button>
    <div id="monitor-list"></div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB0b73t1ztVYKqZ_Vl8LH8EF2SpaQsBMHc",
        projectId: "l2-rb-map",
        databaseURL: "https://l2-rb-map-default-rtdb.europe-west1.firebasedatabase.app",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const rbRef = db.ref('bosses');

    const MAP_IMAGE = "https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true";
    const SPAWN_WINDOW = 15 * 60; 

    let isEditorMode = false;
    let draggedBoss = null;
    let bossData = [];

    // Список боссов по умолчанию (если базы нет)
    const initialBosses = [
        { name: "Abyss Brukunt", pos: "top:2721px;left:4385px;" },
        { name: "Flame of Splendor Barakiel", pos: "top:1376px;left:3793px;" },
        { name: "Shilen's Messenger Cabrio", pos: "top:2145px;left:4614px;" },
        { name: "Death Lord Hallate", pos: "top:2175px;left:3959px;" },
        { name: "Kernon", pos: "top:2129px;left:4074px;" },
        { name: "Longhorn Golkonda", pos: "top:2216px;left:4078px;" }
        // ... (остальные боссы добавятся автоматически из Firebase)
    ];

    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    let scale = window.innerWidth / 5062;
    let posX = 0, posY = 0;

    function init() {
        wrapper.style.backgroundImage = `url('${MAP_IMAGE}')`;
        update();
        listenFirebase(); 
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);

        // Клик по карте для создания нового босса
        wrapper.addEventListener('click', (e) => {
            if (!isEditorMode || draggedBoss) return;
            const rect = wrapper.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / scale);
            const y = Math.round((e.clientY - rect.top) / scale);
            const name = prompt("Имя босса:");
            if (name) {
                const id = name.replace(/\./g, '_');
                rbRef.child(id).set({ name: name, pos: `top:${y}px;left:${x}px;` });
            }
        });

        addSpecialMarker();
    }

    function addSpecialMarker() {
        const sm = document.createElement('div');
        sm.className = 'rb-marker special-marker';
        sm.style.top = "2970px"; sm.style.left = "4322px";
        sm.setAttribute('data-name', 'SECRET MINI-MAP');
        sm.onclick = (e) => { e.stopPropagation(); document.getElementById('minimap-overlay').style.display = 'block'; };
        wrapper.appendChild(sm);
    }

    function getMarker(boss) {
        let m = document.getElementById('rb-' + boss.id);
        if (!m) {
            m = document.createElement('div');
            m.id = 'rb-' + boss.id;
            m.className = 'rb-marker';
            m.setAttribute('data-name', boss.name);
            
            let clickTimer = null;
            m.onmousedown = (e) => {
                if (isEditorMode) {
                    e.stopPropagation();
                    draggedBoss = boss;
                    m.classList.add('dragging');
                }
            };

            m.onclick = (e) => {
                if (isEditorMode) return;
                e.stopPropagation();
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                    onDoubleClick(boss);
                } else {
                    clickTimer = setTimeout(() => { focus(boss); clickTimer = null; }, 250);
                }
            };
            wrapper.appendChild(m);
        }
        return m;
    }

    function onDoubleClick(boss) {
        const ref = rbRef.child(boss.id);
        if (boss.isAlive) ref.update({ isAlive: false, deathTime: null });
        else ref.update({ deathTime: Date.now(), isAlive: false });
    }

    function listenFirebase() {
        rbRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // Очищаем локальные данные, но не удаляем DOM элементы
            bossData = [];

            for (let id in data) {
                const item = data[id];
                const boss = {
                    id: id,
                    name: item.name || id,
                    pos: item.pos,
                    deathTime: item.deathTime,
                    isAlive: item.isAlive
                };
                bossData.push(boss);

                const m = getMarker(boss);
                
                // Обновляем позицию только если не тащим и если она есть в базе
                if (!m.classList.contains('dragging') && boss.pos) {
                    const parts = boss.pos.split(';');
                    parts.forEach(p => {
                        if (p.includes('top')) m.style.top = p.split(':')[1];
                        if (p.includes('left')) m.style.left = p.split(':')[1];
                    });
                }

                // Статус живой/мертвый
                if (boss.isAlive) m.classList.add('is-alive');
                else m.classList.remove('is-alive');
            }
            renderMonitor();
        });
    }

    function tick() {
        const now = Date.now();
        bossData.forEach(boss => {
            const m = document.getElementById('rb-' + boss.id);
            if (!m) return;

            if (boss.deathTime && !boss.isAlive) {
                const elapsed = Math.floor((now - boss.deathTime) / 1000);
                const rem = SPAWN_WINDOW - elapsed;

                if (rem <= 0) {
                    rbRef.child(boss.id).update({ isAlive: true, deathTime: null });
                } else {
                    let tLabel = m.querySelector('.rb-timer-map');
                    if (!tLabel) {
                        tLabel = document.createElement('div');
                        tLabel.className = 'rb-timer-map';
                        m.appendChild(tLabel);
                    }
                    const min = Math.floor(rem / 60);
                    const sec = rem % 60;
                    tLabel.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                }
            } else {
                const t = m.querySelector('.rb-timer-map');
                if (t) t.remove();
            }
        });
        renderMonitor();
    }

    function renderMonitor() {
        const list = document.getElementById('monitor-list');
        const active = bossData.filter(b => b.deathTime || b.isAlive);
        active.sort((a, b) => (a.isAlive === b.isAlive) ? (a.deathTime - b.deathTime) : (a.isAlive ? -1 : 1));

        const now = Date.now();
        list.innerHTML = active.map(b => {
            let timeStr = "READY";
            if (!b.isAlive) {
                const rem = SPAWN_WINDOW - Math.floor((now - b.deathTime) / 1000);
                const m = Math.max(0, Math.floor(rem / 60));
                const s = Math.max(0, rem % 60);
                timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
            return `<div class="monitor-item" onclick="focusById('${b.id}')">
                <b>${b.name}</b>
                <span class="${b.isAlive ? 'ready-text' : ''}">${timeStr}</span>
            </div>`;
        }).join('');
    }

    function toggleEditor() {
        isEditorMode = !isEditorMode;
        const btn = document.getElementById('editor-btn');
        btn.innerText = isEditorMode ? "РЕЖИМ РЕДАКТОРА (ВКЛ)" : "РЕЖИМ РЕДАКТОРА (ВЫКЛ)";
        btn.classList.toggle('active');
        viewport.style.cursor = isEditorMode ? 'crosshair' : 'grab';
    }

    function focusById(id) {
        const boss = bossData.find(b => b.id === id);
        if (boss) focus(boss);
    }

    function focus(boss) {
        const m = document.getElementById('rb-' + boss.id);
        if (!m) return;
        const t = parseInt(m.style.top);
        const l = parseInt(m.style.left);
        scale = 0.8;
        posX = (window.innerWidth / 2) - (l * scale);
        posY = (window.innerHeight / 2) - (t * scale);
        update();
    }

    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function updateGameTime() {
        const now = new Date();
        const nowSec = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        const syncReal = (22 * 3600) + (56 * 60) + 6;
        const syncGame = (17 * 60) + 36;
        let gameMin = Math.floor(syncGame + (nowSec - syncReal) / 10);
        gameMin = ((gameMin % 1440) + 1440) % 1440;
        const h = Math.floor(gameMin / 60);
        const m = gameMin % 60;
        document.getElementById('game-time').innerText = `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}`;
    }

    function resetAllFirebase() {
        if(confirm("Очистить все таймеры?")) {
            rbRef.once('value', s => {
                const d = s.val();
                for(let id in d) rbRef.child(id).update({ deathTime: null, isAlive: false });
            });
        }
    }

    // Drag & Zoom Logic
    let isDrag = false, lx, ly;
    window.onmousedown = e => { if(e.button === 0 && !draggedBoss) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onmousemove = e => {
        if (draggedBoss) {
            const rect = wrapper.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / scale);
            const y = Math.round((e.clientY - rect.top) / scale);
            const m = document.getElementById('rb-' + draggedBoss.id);
            m.style.top = y + 'px';
            m.style.left = x + 'px';
        } else if (isDrag) {
            posX += e.clientX - lx; posY += e.clientY - ly;
            lx = e.clientX; ly = e.clientY; update();
        }
    };
    window.onmouseup = () => {
        if (draggedBoss) {
            const m = document.getElementById('rb-' + draggedBoss.id);
            rbRef.child(draggedBoss.id).update({ pos: `top:${m.style.top};left:${m.style.left};` });
            m.classList.remove('dragging');
            draggedBoss = null;
        }
        isDrag = false;
    };

    viewport.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.8 : 1.2;
        const ns = Math.min(Math.max(0.05, scale * delta), 4);
        posX = e.clientX - (e.clientX - posX) * (ns / scale);
        posY = e.clientY - (e.clientY - posY) * (ns / scale);
        scale = ns;
        update();
    }, { passive: false });

    init();
</script>
</body>
</html>
