<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 RB Map - Fixed</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; will-change: transform; }

        .rb-marker { position: absolute; width: 18px; height: 18px; background: rgba(255, 255, 255, 0.4); border: 2px solid #333; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; cursor: pointer; }
        .rb-marker.is-alive { background: radial-gradient(circle, #ff4400 0%, #880000 100%) !important; border-color: #fff !important; box-shadow: 0 0 15px #ff3200; width: 22px; height: 22px; z-index: 15; }
        .rb-marker::after { content: attr(data-name); position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 1px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; border: 1px solid #444; pointer-events: none; }
        .rb-timer-map { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); background: #000; color: #00ffcc; padding: 2px 6px; border-radius: 5px; font-weight: bold; font-family: monospace; font-size: 16px; border: 1px solid #00ffcc; z-index: 100; }

        #top-sidebar { position: fixed; top: 10px; left: 300px; right: 10px; background: rgba(10, 10, 10, 0.9); border: 1px solid #333; padding: 5px; z-index: 900; border-radius: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .epic-card { background: #1a1a1a; border: 1px solid #333; padding: 3px 6px; border-radius: 4px; display: flex; flex-direction: row; align-items: center; justify-content: space-between; }
        .epic-info { display: flex; flex-direction: column; }
        .epic-name { font-size: 10px; font-weight: bold; color: #ffd700; text-transform: uppercase; }
        .epic-timer { font-family: monospace; font-size: 12px; color: #00ffcc; }
        .epic-set-btn { font-size: 9px; background: #333; color: #fff; border: 1px solid #555; padding: 2px 4px; cursor: pointer; border-radius: 3px; }

        #sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100vh; background: rgba(10, 10, 10, 0.95); border-right: 1px solid #333; padding: 15px; z-index: 1000; box-sizing: border-box; }
        #sidebar-resizer { position: absolute; right: -5px; top: 0; width: 10px; height: 100%; cursor: ew-resize; z-index: 1001; }

        #epic-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #ffd700; padding: 20px; z-index: 2000; border-radius: 12px; display: none; flex-direction: column; width: 320px; box-shadow: 0 0 30px #000; }
        .window-list { max-height: 150px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #333; padding: 5px; }
        .window-item { font-size: 11px; background: #222; margin-bottom: 3px; padding: 4px; display: flex; justify-content: space-between; }
        .del-win { color: #ff4400; cursor: pointer; font-weight: bold; }

        #game-time { font-size:32px; color:#ffd700; font-family:monospace; text-align: center; margin-bottom: 10px; }
        .btn { width:100%; padding:8px; border-radius:6px; font-weight:bold; margin-bottom:5px; cursor:pointer; border: none; }
        .btn-editor { background:#222; color:#0f0; border: 1px solid #050; }
        #monitor-list { margin-top: 15px; height: calc(100vh - 220px); overflow-y: auto; }
        .monitor-item { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 0; border-bottom: 1px solid #222; cursor: pointer; }
        .ready-text { color: #ff3300; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-sidebar"></div>

<div id="epic-modal">
    <h3 id="modal-title" style="margin:0 0 10px 0; color:#ffd700; font-size: 14px;">Schedule</h3>
    <div class="window-list" id="existing-windows"></div>
    <label style="font-size: 10px;">Старт:</label>
    <input type="datetime-local" id="epic-start" style="margin-bottom:5px; width:90%;">
    <label style="font-size: 10px;">Конец:</label>
    <input type="datetime-local" id="epic-end" style="margin-bottom:10px; width:90%;">
    <div style="display:flex; gap:5px;">
        <button class="btn" onclick="addEpicWindow()" style="background:#0066cc; color:#fff; font-size:11px;">ДОБАВИТЬ</button>
        <button class="btn" onclick="closeEpicModal()" style="background:#444; color:#fff; font-size:11px;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="sidebar">
    <div id="sidebar-resizer"></div>
    <div id="game-time">00:00</div>
    <button onclick="toggleEditor()" id="editor-btn" class="btn btn-editor">РЕДАКТОР: ВЫКЛ</button>
    <div id="monitor-list"></div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB0b73t1ztVYKqZ_Vl8LH8EF2SpaQsBMHc",
        projectId: "l2-rb-map",
        databaseURL: "https://l2-rb-map-default-rtdb.europe-west1.firebasedatabase.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const epicsList = ["queen ant", "core", "orfen", "zaken", "baium", "frintezza", "antharas", "valakas", "beleth"];
    let bossData = [];
    let epicSchedules = {};
    let currentEditingEpic = null;
    let isEditorMode = false;
    let scale = 0.2;
    let posX = 0, posY = 0;

    function init() {
        document.getElementById('map-wrapper').style.backgroundImage = `url('https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true')`;
        renderEpicUI();
        initResize();
        listenFirebase();
        setInterval(tick, 1000);
        setInterval(updateGameTime, 1000);
    }

    // --- ЭПИКИ ---
    function renderEpicUI() {
        const container = document.getElementById('top-sidebar');
        container.innerHTML = epicsList.map(name => {
            const id = name.replace(/\s+/g, '-');
            return `
                <div class="epic-card" id="epic-${id}">
                    <div class="epic-info">
                        <span class="epic-name">${name}</span>
                        <span class="epic-timer" id="timer-${id}">--:--</span>
                    </div>
                    <button class="epic-set-btn" onclick="openEpicModal('${name}')">SET</button>
                </div>
            `;
        }).join('');
    }

    function openEpicModal(name) {
        currentEditingEpic = name;
        const id = name.replace(/\s+/g, '-');
        document.getElementById('modal-title').innerText = name.toUpperCase();
        renderWindowList();
        document.getElementById('epic-modal').style.display = 'flex';
    }

    function renderWindowList() {
        const id = currentEditingEpic.replace(/\s+/g, '-');
        const raw = epicSchedules[id] || [];
        const windows = Array.isArray(raw) ? raw : Object.values(raw); // FIX: Превращаем объект в массив
        const container = document.getElementById('existing-windows');
        container.innerHTML = windows.map((w, i) => `
            <div class="window-item">
                <span>${new Date(w.start).toLocaleDateString()} ${new Date(w.start).getHours()}:${new Date(w.start).getMinutes().toString().padStart(2,'0')}</span>
                <span class="del-win" onclick="deleteWindow(${i})">✕</span>
            </div>
        `).join('') || "No dates set";
    }

    function addEpicWindow() {
        const start = new Date(document.getElementById('epic-start').value).getTime();
        const end = new Date(document.getElementById('epic-end').value).getTime();
        if (!start || !end) return;
        const id = currentEditingEpic.replace(/\s+/g, '-');
        if (!epicSchedules[id]) epicSchedules[id] = [];
        
        // Гарантируем, что это массив перед пушем
        if (!Array.isArray(epicSchedules[id])) epicSchedules[id] = Object.values(epicSchedules[id]);
        
        epicSchedules[id].push({ start, end });
        db.ref('epics/' + id).set(epicSchedules[id]);
        renderWindowList();
    }

    function deleteWindow(i) {
        const id = currentEditingEpic.replace(/\s+/g, '-');
        if (!Array.isArray(epicSchedules[id])) epicSchedules[id] = Object.values(epicSchedules[id]);
        epicSchedules[id].splice(i, 1);
        db.ref('epics/' + id).set(epicSchedules[id]);
        renderWindowList();
    }

    function closeEpicModal() { document.getElementById('epic-modal').style.display = 'none'; }

    // --- ФУНКЦИИ МОНИТОРИНГА И РЕНДЕРА ---
    function listenFirebase() {
        db.ref('bosses').on('value', snap => {
            const data = snap.val() || {};
            bossData = Object.keys(data).map(id => ({ id, ...data[id] }));
            renderMarkers();
        });
        db.ref('epics').on('value', snap => {
            epicSchedules = snap.val() || {};
        });
    }

    function renderMarkers() {
        const wrapper = document.getElementById('map-wrapper');
        bossData.forEach(boss => {
            if (!boss.pos) return; // FIX: Пропуск боссов без позиции
            let m = document.getElementById('rb-' + boss.id);
            if (!m) {
                m = document.createElement('div');
                m.id = 'rb-' + boss.id;
                m.className = 'rb-marker';
                m.setAttribute('data-name', boss.name);
                m.onclick = (e) => { e.stopPropagation(); focus(boss); };
                m.ondblclick = (e) => { e.stopPropagation(); markDead(boss.id); };
                wrapper.appendChild(m);
            }
            const p = boss.pos.split(';'); // Если тут ошибка — значит в базе pos: undefined
            if (p.length < 2) return;
            m.style.top = p[0].split(':')[1];
            m.style.left = p[1].split(':')[1];
            boss.isAlive ? m.classList.add('is-alive') : m.classList.remove('is-alive');
        });
    }

    function tick() {
        const now = Date.now();
        // Обычные РБ
        bossData.forEach(boss => {
            const m = document.getElementById('rb-' + boss.id);
            if (!m) return;
            if (boss.deathTime && !boss.isAlive) {
                const rem = 900 - Math.floor((now - boss.deathTime) / 1000);
                if (rem <= 0) {
                    db.ref('bosses/' + boss.id).update({ isAlive: true, deathTime: null });
                } else {
                    let t = m.querySelector('.rb-timer-map') || document.createElement('div');
                    t.className = 'rb-timer-map'; if (!m.contains(t)) m.appendChild(t);
                    t.innerText = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
                }
            } else {
                const t = m.querySelector('.rb-timer-map'); if (t) t.remove();
            }
        });

        // Эпики
        epicsList.forEach(name => {
            const id = name.replace(/\s+/g, '-');
            const raw = epicSchedules[id] || [];
            const windows = Array.isArray(raw) ? raw : Object.values(raw); // FIX: Чтобы filter работал
            const timerEl = document.getElementById('timer-' + id);
            
            const active = windows.filter(w => w.end > now).sort((a,b) => a.start - b.start)[0];

            if (!active) { 
                timerEl.innerText = "--:--"; 
                timerEl.style.color = "#555";
                return; 
            }
            
            if (now < active.start) {
                timerEl.innerText = formatTime(active.start - now);
                timerEl.style.color = "#00ffcc";
            } else {
                timerEl.innerText = "WINDOW";
                timerEl.style.color = "#ff4400";
            }
        });
        renderMonitor();
    }

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        return h + ":" + m.toString().padStart(2, '0');
    }

    function renderMonitor() {
        const list = document.getElementById('monitor-list');
        const now = Date.now();
        const active = bossData.filter(b => b.isAlive || (b.deathTime && (900 - Math.floor((now-b.deathTime)/1000)) > 0));
        active.sort((a,b) => (a.deathTime || 0) - (b.deathTime || 0));
        list.innerHTML = active.map(b => {
            let timeStr = "READY";
            if (b.deathTime && !b.isAlive) {
                const rem = Math.max(0, 900 - Math.floor((now - b.deathTime) / 1000));
                timeStr = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
            }
            return `<div class="monitor-item" onclick="focusById('${b.id}')">
                <span><b>${b.name}</b></span>
                <span class="${timeStr==='READY'?'ready-text':''}">${timeStr}</span>
            </div>`;
        }).join('');
    }

    function markDead(id) {
        db.ref('bosses/' + id).update({ isAlive: false, deathTime: Date.now() });
    }

    // --- УПРАВЛЕНИЕ КАРТОЙ ---
    function initResize() {
        const sidebar = document.getElementById('sidebar');
        const resizer = document.getElementById('sidebar-resizer');
        const topBar = document.getElementById('top-sidebar');
        let dragging = false;
        resizer.onmousedown = () => dragging = true;
        window.onmousemove = (e) => { if (!dragging) return; let w = Math.max(10, e.clientX); sidebar.style.width = w + 'px'; topBar.style.left = (w + 20) + 'px'; };
        window.onmouseup = () => dragging = false;
    }

    function focusById(id) { const b = bossData.find(x=>x.id===id); if(b) focus(b); }
    function focus(boss) {
        if (!boss.pos) return;
        const p = boss.pos.split(';');
        const t = parseInt(p[0].split(':')[1]); const l = parseInt(p[1].split(':')[1]);
        scale = 0.8; posX = (window.innerWidth / 2) - (l * scale); posY = (window.innerHeight / 2) - (t * scale);
        update();
    }
    function update() { document.getElementById('map-wrapper').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function updateGameTime() {
        const now = new Date();
        const sec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
        let gMin = Math.floor(1056 + (sec - 71766) / 10);
        gMin = ((gMin % 1440) + 1440) % 1440;
        document.getElementById('game-time').innerText = Math.floor(gMin/60).toString().padStart(2,'0') + ":" + (gMin%60).toString().padStart(2,'0');
    }

    function toggleEditor() {
        if (!isEditorMode) { if (prompt("Pass:") === "D36rk43mgm") isEditorMode = true; else return; }
        else isEditorMode = false;
        document.getElementById('editor-btn').innerText = isEditorMode ? "РЕДАКТОР: ОН" : "РЕДАКТОР: ВЫКЛ";
    }

    window.onwheel = e => {
        const delta = e.deltaY > 0 ? 0.8 : 1.2;
        const ns = Math.min(Math.max(0.05, scale * delta), 4);
        posX = e.clientX - (e.clientX - posX) * (ns / scale);
        posY = e.clientY - (e.clientY - posY) * (ns / scale);
        scale = ns; update();
    };
    let isDrag = false, lx, ly;
    window.onmousedown = e => { if(!e.target.closest('#sidebar') && !e.target.closest('#top-sidebar')) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onmousemove = e => { if(isDrag) { posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); } };
    window.onmouseup = () => isDrag = false;

    init();
</script>
</body>
</html>
