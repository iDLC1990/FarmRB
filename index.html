<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 RB Map - Selected Bosses</title>
    <style>
        body { margin: 0; padding: 0; background: #0b1016; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        
        #map-container {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            position: relative;
            background-color: #000;
            cursor: grab;
        }

        #map-image {
            width: 3072px; 
            height: 4608px;
            background-image: url('https://linedia.ru/img/map.jpg');
            position: relative;
        }

        .boss-marker {
            position: absolute;
            width: 26px;
            height: 26px;
            background: url('https://linedia.ru/img/flag.png') no-repeat center;
            background-size: contain;
            cursor: pointer;
            z-index: 10;
            filter: drop-shadow(0 0 2px black);
        }

        .boss-marker:hover {
            transform: scale(1.4);
            filter: drop-shadow(0 0 10px #00ff88);
        }

        .boss-marker.active {
            filter: drop-shadow(0 0 10px #ff4d4d) sepia(1) saturate(5) hue-rotate(-50deg);
        }

        #ui-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(15, 20, 30, 0.95);
            border: 1px solid #3a414d;
            border-radius: 12px;
            padding: 20px;
            z-index: 1000;
            display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .close-btn { float: right; cursor: pointer; color: #666; font-size: 20px; }
        .boss-title { font-size: 1.2rem; color: #00ff88; margin-bottom: 5px; font-weight: bold; }
        .timer-val { font-size: 3rem; text-align: center; margin: 15px 0; font-family: monospace; color: #ff4d4d; text-shadow: 0 0 10px rgba(255,77,77,0.3); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { cursor: pointer; border: none; padding: 12px; border-radius: 6px; font-weight: bold; background: #2c3444; color: white; transition: 0.2s; }
        button:hover { background: #3d475c; }
        button.start { background: #950740; grid-column: span 2; color: white; font-size: 1rem; }
        button.start:hover { background: #c3073f; }
        
        #top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        #search { padding: 12px; border-radius: 8px; border: 1px solid #3a414d; background: #161b22; color: white; width: 250px; outline: none; }
        #search:focus { border-color: #00ff88; }
    </style>
</head>
<body>

<div id="top-bar">
    <input type="text" id="search" placeholder="Поиск по списку..." oninput="searchBoss()">
</div>

<div id="ui-panel">
    <span class="close-btn" onclick="closeUI()">×</span>
    <div class="boss-title" id="ui-name">Name</div>
    <div id="ui-lvl" style="color: #888;">Lvl: --</div>
    <div class="timer-val" id="ui-timer">READY</div>
    <div class="controls">
        <button onclick="startRB(12)">12 часов</button>
        <button onclick="startRB(24)">24 часа</button>
        <button class="start" onclick="manualStart()">Указать время (мин)</button>
        <button style="grid-column: span 2; background: #1a1f29;" onclick="resetRB()">Сбросить (Жив)</button>
    </div>
</div>

<div id="map-container">
    <div id="map-image"></div>
</div>

        { name: "Varka's Chief Horus", lvl: 80, pos: "top:924px;left:1112px;" },
        { name: "Sailren", lvl: 80, pos: "top:1934px;left:1044px;" },
        { name: "Lord of Splendor Anays", lvl: 80, pos: "top:1114px;left:1456px;" },
        { name: "Andreas van Halter", lvl: 80, pos: "top:1186px;left:1488px;" },
        { name: "Plague Golem", lvl: 80, pos: "top:1224px;left:1396px;" }
    ];

    const mapImage = document.getElementById('map-image');
    let states = JSON.parse(localStorage.getItem('rb_map_v3')) || {};
    let currentId = null;

    // Создание флажков
    bosses.forEach((boss, index) => {
        const marker = document.createElement('div');
        marker.className = 'boss-marker';
        marker.id = `m-${index}`;
        marker.style = boss.pos;
        marker.title = `${boss.name} (Lvl ${boss.lvl})`;
        marker.onclick = (e) => { e.stopPropagation(); showUI(index); };
        mapImage.appendChild(marker);
    });

    function showUI(id) {
        currentId = id;
        document.getElementById('ui-panel').style.display = 'block';
        document.getElementById('ui-name').innerText = bosses[id].name;
        document.getElementById('ui-lvl').innerText = 'Level: ' + bosses[id].lvl;
        updateUI();
    }

    function closeUI() { 
        document.getElementById('ui-panel').style.display = 'none'; 
        currentId = null;
    }

    function startRB(h) {
        states[currentId] = Date.now() + (h * 3600 * 1000);
        save();
    }

    function manualStart() {
        let m = prompt("Минут до респауна:");
        if (m) { states[currentId] = Date.now() + (m * 60 * 1000); save(); }
    }

    function resetRB() {
        delete states[currentId];
        save();
    }

    function save() { localStorage.setItem('rb_map_v3', JSON.stringify(states)); }

    function updateUI() {
        if (currentId === null) return;
        const el = document.getElementById('ui-timer');
        if (!states[currentId]) {
            el.innerText = "ALIVE";
            el.style.color = "#00ff88";
            return;
        }
        const diff = states[currentId] - Date.now();
        if (diff <= 0) {
            el.innerText = "READY";
            el.style.color = "#00ff88";
        } else {
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            el.innerText = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            el.style.color = "#ff4d4d";
        }
    }

    function searchBoss() {
        const val = document.getElementById('search').value.toLowerCase();
        bosses.forEach((b, i) => {
            document.getElementById(`m-${i}`).style.display = 
                b.name.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    setInterval(() => {
        updateUI();
        bosses.forEach((_, i) => {
            const m = document.getElementById(`m-${i}`);
            if (states[i] && states[i] > Date.now()) m.classList.add('active');
            else m.classList.remove('active');
        });
    }, 1000);
</script>

</body>
</html>
