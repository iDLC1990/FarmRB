<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 FarmRB - Final Logic</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 5062px; height: 4210px; background-repeat: no-repeat; background-size: 100% 100%; }

        /* МЕТКИ */
        .rb-marker {
            position: absolute; width: 24px; height: 24px;
            background: radial-gradient(circle, #ff3300 0%, #880000 100%);
            border: 2px solid #fff; border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px rgba(255, 50, 0, 0.8);
            z-index: 10; cursor: pointer;
        }
        .rb-marker.is-dead { background: #000 !important; border-color: #666 !important; box-shadow: none !important; }
        
        .rb-marker::after {
            content: attr(data-name); position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #00ff88; padding: 2px 8px;
            border-radius: 4px; font-size: 11px; white-space: nowrap; border: 1px solid #333; pointer-events: none;
        }

        /* ТАЙМЕР */
        .rb-timer {
            position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
            background: #000; color: #00ffcc; padding: 2px 8px; border-radius: 4px;
            font-weight: bold; font-family: monospace; font-size: 14px;
            border: 1px solid #00ffcc; z-index: 110; pointer-events: none;
        }

        /* ПАНЕЛЬ */
        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 300px; bottom: 15px;
            background: rgba(15, 15, 15, 0.95); border: 1px solid #444;
            padding: 15px; z-index: 1000; border-radius: 12px;
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }
        #search { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #000; color: #0f8; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        #rb-list { flex: 1; overflow-y: auto; }
        
        .rb-item { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; margin-bottom: 5px; background: #1a1a1a; 
            border-radius: 6px; font-size: 13px; border-left: 4px solid #00ff88;
        }
        .rb-item.hidden-node { display: none !important; }
        .rb-info { flex: 1; cursor: pointer; font-weight: bold; }
        .btn-rip-action { background: #400; color: #f55; border: 1px solid #600; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="font-size: 10px; color: #666; margin-bottom: 5px;">Double Click по черной метке - Воскресить</div>
    <input type="text" id="search" placeholder="Поиск босса..." oninput="filterList()">
    <div id="rb-list"></div>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    const MAP_IMAGE = "https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true";
    let bossData = [
        { "name": "Ember", "pos": "top:1173px;left:4720px;" },
        { "name": "Hestia, Guardian Deity of the Hot Springs", "pos": "top:1152px;left:4191px;" },
        { "name": "Ketra's Chief Brakki", "pos": "top:1385px;left:4289px;" },
        { "name": "Ketra's Commander Tayr", "pos": "top:1421px;left:4298px;" },
        { "name": "Ketra's Hero Hekaton", "pos": "top:1477px;left:4316px;" },
        { "name": "Varka's Hero Shadith", "pos": "top:1750px;left:4017px;" },
        { "name": "Varka's Commander Mos", "pos": "top:1770px;left:3960px;" },
        { "name": "Varka's Chief Horus", "pos": "top:1721px;left:3923px;" },
        { "name": "Vanor Chief Kandra", "pos": "top:1565px;left:4027px;" },
        { "name": "Queen Shyeed", "pos": "top:1714px;left:3813px;" },
        { "name": "Uruka", "pos": "top:1990px;left:3002px;" },
        { "name": "Plague Golem", "pos": "top:1584px;left:4509px;" },
        { "name": "Andreas van Halter", "pos": "top:1640px;left:3222px;" },
        { "name": "Lord of Splendor Anays", "pos": "top:1402px;left:4036px;" },
        { "name": "Sealed Evil Power Sailren", "pos": "top:1956px;left:3236px;" },
        { "name": "Soul of Fire Nastron", "pos": "top:1411px;left:4266px;" },
        { "name": "Soul of Water Ashutar", "pos": "top:1765px;left:3911px;" },
        { "name": "Daimon the White-Eyed", "pos": "top:1717px;left:4660px;" },
        { "name": "Last Lesser Giant Glaki", "pos": "top:2492px;left:4526px;" },
        { "name": "Ocean Flame Ashakiel", "pos": "top:3264px;left:4100px;" },
        { "name": "Flamestone Giant", "pos": "top:2014px;left:4287px;" },
        { "name": "Palatanos of Horrific Power", "pos": "top:1906px;left:4305px;" },
        { "name": "Storm Winged Naga", "pos": "top:1894px;left:4227px;" },
        { "name": "Lesser Giant Olkuth", "pos": "top:2405px;left:4679px;" },
        { "name": "Death Lord Shax", "pos": "top:1997px;left:4512px;" },
        { "name": "Death Lord Ipos", "pos": "top:1949px;left:4379px;" },
        { "name": "Bloody Empress Decarbia", "pos": "top:2161px;left:4690px;" },
        { "name": "Krokian Padisha Sobekk", "pos": "top:3291px;left:4064px;" },
        { "name": "Fafurion's Herald Lokness", "pos": "top:3295px;left:3910px;" },
        { "name": "Eilhalder von Hellmann", "pos": "top:1729px;left:3504px;" },
        { "name": "Roaring Skylancer", "pos": "top:2527px;left:4165px;" },
        { "name": "Meanas Anor", "pos": "top:1992px;left:4402px;" },
        { "name": "Beast Lord Behemoth", "pos": "top:1870px;left:4098px;" },
        { "name": "Icicle Emperor Bumbalump", "pos": "top:1103px;left:4403px;" },
        { "name": "Water Dragon Seer Sheshark", "pos": "top:3295px;left:3959px;" },
        { "name": "Doom Blade Tanatos", "pos": "top:1953px;left:4150px;" },
        { "name": "Shilen's Messenger Cabrio", "pos": "top:2145px;left:4614px;" },
        { "name": "Palibati Queen Themis", "pos": "top:2226px;left:4712px;" },
        { "name": "Flame of Splendor Barakiel", "pos": "top:1376px;left:3793px;" },
        { "name": "Anakim's Nemesis Zakaron", "pos": "top:2750px;left:4256px;" },
        { "name": "Spirit of Andras the Betrayer", "pos": "top:1851px;left:4661px;" },
        { "name": "Kernon's Faithful Servant Kelone", "pos": "top:1838px;left:4284px;" },
        { "name": "Last Titan Utenus", "pos": "top:2579px;left:4672px;" },
        { "name": "Demons Agent Falston", "pos": "top:1460px;left:3819px;" },
        { "name": "Gorgolos", "pos": "top:2542px;left:4659px;" },
        { "name": "Ghost of the Lidia", "pos": "top:1906px;left:4528px;" },
        { "name": "Death Lord Hallate", "pos": "top:2175px;left:3959px;" },
        { "name": "Korim", "pos": "top:2259px;left:3958px;" },
        { "name": "Kernon", "pos": "top:2129px;left:4074px;" },
        { "name": "Longhorn Golkonda", "pos": "top:2216px;left:4078px;" },
        { "name": "Cherub Galaxia", "pos": "top:2261px;left:4084px;" },
        { "name": "MILENU", "pos": "top:3972px;left:3737px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const rbList = document.getElementById('rb-list');
    const viewport = document.getElementById('viewport');
    let scale = 0.2, posX = 0, posY = 0;

    function init() {
        wrapper.style.backgroundImage = `url('${MAP_IMAGE}')`;
        drawAll();
        update();
    }

    function drawAll() {
        wrapper.innerHTML = '';
        rbList.innerHTML = '';
        bossData.forEach((boss, i) => {
            const m = document.createElement('div');
            m.className = 'rb-marker';
            m.style.cssText = boss.pos;
            m.setAttribute('data-name', boss.name);
            
            // Обработка клика по метке
            m.addEventListener('click', (e) => {
                e.stopPropagation();
                if (m.classList.contains('is-dead')) {
                    startRespawnTimer(boss); // Запуск таймера если мертв
                } else {
                    focus(boss);
                }
            });

            // Воскрешение через двойной клик
            m.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (m.classList.contains('is-dead')) reviveBoss(boss);
            });

            wrapper.appendChild(m);
            boss.markerEl = m;

            const item = document.createElement('div');
            item.className = 'rb-item';
            item.innerHTML = `<div class="rb-info">${boss.name}</div><button class="btn-rip-action">RIP</button>`;
            item.querySelector('.rb-info').onclick = () => focus(boss);
            item.querySelector('.btn-rip-action').onclick = (e) => { e.stopPropagation(); killBoss(boss); };
            rbList.appendChild(item);
            boss.el = item;
        });
    }

    function killBoss(boss) {
        boss.markerEl.classList.add('is-dead');
        boss.el.classList.add('hidden-node');
        filterList();
    }

    function reviveBoss(boss) {
        boss.markerEl.classList.remove('is-dead');
        boss.el.classList.remove('hidden-node');
        if (boss.timerInterval) { clearInterval(boss.timerInterval); boss.timerInterval = null; }
        if (boss.timerDisplay) boss.timerDisplay.remove();
        filterList();
    }

    function startRespawnTimer(boss) {
        if (boss.timerInterval) return; 

        let timeLeft = 15 * 60;
        const timerDisplay = document.createElement('div');
        timerDisplay.className = 'rb-timer';
        boss.markerEl.appendChild(timerDisplay);
        boss.timerDisplay = timerDisplay;

        boss.timerInterval = setInterval(() => {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            
            if (timeLeft <= 0) {
                clearInterval(boss.timerInterval);
                boss.timerInterval = null;
                timerDisplay.remove();
                // Босс остается черным (мертвым) по условию
            }
            timeLeft--;
        }, 1000);
    }

    function filterList() {
        const q = document.getElementById('search').value.toLowerCase();
        bossData.forEach(b => {
            const matchesSearch = q === "" || b.name.toLowerCase().includes(q);
            const isAlive = !b.markerEl.classList.contains('is-dead');
            b.el.style.display = (matchesSearch && isAlive) ? 'flex' : 'none';
        });
    }

    function focus(boss) {
        const t = parseInt(boss.pos.match(/top:(\d+)px/)[1]);
        const l = parseInt(boss.pos.match(/left:(\d+)px/)[1]);
        scale = 0.8;
        posX = (window.innerWidth/2) - (l * scale);
        posY = (window.innerHeight/2) - (t * scale);
        update();
    }

    function update() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    // Управление камерой
    viewport.onwheel = e => { e.preventDefault(); const d = e.deltaY > 0 ? 0.8 : 1.2; const ns = Math.min(Math.max(0.05, scale * d), 4); posX = e.clientX - (e.clientX - posX) * (ns / scale); posY = e.clientY - (e.clientY - posY) * (ns / scale); scale = ns; update(); };
    let isDrag = false, lx, ly;
    viewport.onmousedown = e => { if(e.button === 0) { isDrag = true; lx = e.clientX; ly = e.clientY; } };
    window.onmousemove = e => { if (isDrag) { posX += e.clientX - lx; posY += e.clientY - ly; lx = e.clientX; ly = e.clientY; update(); } };
    window.onmouseup = () => { isDrag = false; };
    viewport.oncontextmenu = e => e.preventDefault();
    init();
</script>
</body>
</html>
