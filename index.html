<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 Map Constructor - Single Canvas</title>
    <style>
        body { margin: 0; padding: 0; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        
        #viewport {
            width: 100vw; height: 100vh;
            cursor: crosshair; overflow: hidden; position: relative;
            background: #000;
        }

        #map-wrapper {
            position: absolute;
            width: 3072px; /* Реальная ширина картинки */
            height: 4608px; /* Реальная высота картинки */
            transform-origin: 0 0;
            background: url('https://linedia.ru/img/map.jpg') no-repeat;
            background-size: 3072px 4608px;
        }

        .temp-marker {
            position: absolute; width: 20px; height: 20px;
            background: #ff0000; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #panel {
            position: fixed; top: 10px; left: 10px; width: 350px;
            background: rgba(0,0,0,0.9); border: 2px solid #00ff88;
            padding: 15px; z-index: 1000; border-radius: 8px;
        }

        textarea { 
            width: 100%; height: 200px; margin-top: 10px; 
            background: #000; color: #00ff88; border: 1px solid #333; 
            font-family: monospace; font-size: 11px;
        }

        .hint { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        b { color: #00ff88; }
    </style>
</head>
<body>

<div id="panel">
    <b>Конструктор РБ</b>
    <div class="hint">
        1. <b>Колесико</b> — Зум<br>
        2. <b>Зажать ПКМ</b> — Двигать карту<br>
        3. <b>ЛКМ</b> — Поставить метку
    </div>
    <textarea id="output" readonly placeholder="Тут будет готовый код..."></textarea>
    <button onclick="clearOutput()" style="margin-top:5px; cursor:pointer;">Очистить список</button>
</div>

<div id="viewport">
    <div id="map-wrapper" id="map"></div>
</div>

<script>
    const wrapper = document.getElementById('map-wrapper');
    const viewport = document.getElementById('viewport');
    const output = document.getElementById('output');

    let scale = 0.25; // Начальный масштаб, чтобы видеть почти всю карту
    let posX = 50;
    let posY = 50;

    // Рендер положения
    function render() {
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }
    render();

    // Логика клика (постановка метки)
    viewport.addEventListener('click', (e) => {
        if (isDragging) return; // Если просто двигали карту, не ставим метку

        // Вычисляем реальные координаты внутри картинки 3072x4608
        const rect = wrapper.getBoundingClientRect();
        const realX = Math.round((e.clientX - rect.left) / scale);
        const realY = Math.round((e.clientY - rect.top) / scale);

        // Ставим визуальную точку
        const dot = document.createElement('div');
        dot.className = 'temp-marker';
        dot.style.left = realX + 'px';
        dot.style.top = realY + 'px';
        wrapper.appendChild(dot);

        // Запрашиваем имя
        const name = prompt(`Координаты: X:${realX}, Y:${realY}\nВведите имя босса:`, "New Boss");
        if (name) {
            const line = `{ name: "${name}", pos: "top:${realY}px;left:${realX}px;" },`;
            output.value += line + "\n";
            output.scrollTop = output.scrollHeight;
        } else {
            dot.remove(); // Если отмена, удаляем точку
        }
    });

    // Зум (колесико)
    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.min(Math.max(0.05, scale * delta), 2);
        
        const mX = e.clientX;
        const mY = e.clientY;

        posX = mX - (mX - posX) * (newScale / scale);
        posY = mY - (mY - posY) * (newScale / scale);
        scale = newScale;
        render();
    };

    // Перетаскивание (ПКМ - Правая Кнопка Мыши)
    let isDragging = false;
    let lastX, lastY;

    viewport.oncontextmenu = (e) => e.preventDefault(); // Отключаем меню на ПКМ

    viewport.onmousedown = (e) => {
        if (e.button === 2 || e.button === 0 && e.ctrlKey) { // ПКМ или Ctrl+ЛКМ
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        }
    };

    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX += (e.clientX - lastX);
        posY += (e.clientY - lastY);
        lastX = e.clientX;
        lastY = e.clientY;
        render();
    };

    window.onmouseup = () => { isDragging = false; };

    function clearOutput() {
        if(confirm("Очистить весь накопленный код?")) {
            output.value = "";
            document.querySelectorAll('.temp-marker').forEach(m => m.remove());
        }
    }
</script>

</body>
</html>
