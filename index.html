<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 FarmRB - Full Map & Editor</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; background: #000; }

        #map-wrapper {
            position: absolute;
            transform-origin: 0 0;
            width: 5062px; height: 4210px; 
            background-repeat: no-repeat;
            background-size: 100% 100%;
            image-rendering: -webkit-optimize-contrast;
        }

        .rb-marker {
            position: absolute; width: 18px; height: 18px;
            background: radial-gradient(circle, #ff3300 0%, #880000 100%);
            border: 2px solid #fff; border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px rgba(255, 50, 0, 0.8);
            z-index: 10; cursor: pointer;
            transition: transform 0.1s;
        }
        
        .rb-marker.dragging { opacity: 0.7; scale: 1.8; z-index: 1000; box-shadow: 0 0 20px #fff; }
        .edit-active .rb-marker { cursor: move; }

        .rb-marker::after {
            content: attr(data-name);
            position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #00ff88; padding: 4px 10px;
            border-radius: 4px; font-size: 13px; white-space: nowrap;
            opacity: 0; transition: opacity 0.2s; pointer-events: none; border: 1px solid #00ff88;
        }
        .rb-marker:hover::after { opacity: 1; }

        #sidebar {
            position: fixed; top: 15px; left: 15px; width: 300px; bottom: 15px;
            background: rgba(15, 15, 15, 0.95); border: 1px solid #333;
            padding: 20px; z-index: 1000; border-radius: 12px;
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }

        .btn-mode {
            background: #222; color: #aaa; border: 1px solid #444; padding: 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 15px;
            transition: 0.3s;
        }
        .edit-active .btn-mode { background: #882200; color: #fff; border-color: #ff5500; }

        #search {
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444;
            background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box;
        }

        #rb-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .rb-item { 
            padding: 10px; margin-bottom: 5px; background: #1a1a1a; cursor: pointer; 
            border-radius: 5px; font-size: 13px; border-left: 3px solid #444; transition: 0.2s;
        }
        .rb-item:hover { background: #252525; border-left-color: #00ff88; color: #00ff88; }

        #rb-list::-webkit-scrollbar { width: 4px; }
        #rb-list::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        #json-output { 
            display: none; width: 100%; height: 120px; background: #000; 
            color: #00ff88; font-family: monospace; font-size: 10px; 
            border: 1px solid #333; margin-top: 10px; padding: 5px; box-sizing: border-box;
        }
        .edit-active #json-output { display: block; }
        .hint { font-size: 11px; color: #777; margin-top: 10px; display: none; }
        .edit-active .hint { display: block; }
    </style>
</head>
<body class="view-mode">

<div id="sidebar">
    <button class="btn-mode" onclick="toggleEditor()">РЕЖИМ: АТЛАС</button>
    <input type="text" id="search" placeholder="Поиск босса..." oninput="filterList()">
    <div id="rb-list"></div>
    <div class="hint">
        <b>ЛКМ на РБ:</b> Перетащить<br>
        <b>ЛКМ на карту:</b> Новый РБ<br>
        <b>ПКМ:</b> Двигать карту
    </div>
    <textarea id="json-output" readonly></textarea>
</div>

<div id="viewport">
    <div id="map-wrapper"></div>
</div>

<script>
    const MAP_IMAGE = "https://github.com/iDLC1990/FarmRB/blob/main/map.gif?raw=true";
    
    // ВЕРНУЛ ВЕСЬ СПИСОК (63 босса)
    let bossData = [
        { name: "Ember", pos: "top:1120px;left:3836px;" },
        { name: "Hestia, Guardian Deity of the Hot Springs", pos: "top:1097px;left:3472px;" },
        { name: "Ketra's Chief Brakki", pos: "top:1326px;left:3549px;" },

        { name: "Varka's Hero Shadith", pos: "top:1668px;left:3323px;" },

        { name: "Varka's Chief Horus", pos: "top:1651px;left:3249px;" },
        { name: "Vanor Chief Kandra", pos: "top:1500px;left:3335px;" },
        { name: "Queen Shyeed", pos: "top:1640px;left:3147px;" },
        { name: "Uruka", pos: "top:1914px;left:2491px;" },
        { name: "Plague Golem", pos: "top:1511px;left:3728px;" },
        { name: "Andreas van Halter", pos: "top:1568px;left:2678px;" },
        { name: "Lord of Splendor Anays", pos: "top:1339px;left:3326px;" },
        { name: "Sealed Evil Power Sailren", pos: "top:1904px;left:2638px;" },
        { name: "Soul of Fire Nastron", pos: "top:1345px;left:3529px;" },
        { name: "Soul of Water Ashutar", pos: "top:1688px;left:3244px;" },
        { name: "Daimon the White-Eyed", pos: "top:1636px;left:3857px;" },
        { name: "Last Lesser Giant Glaki", pos: "top:2379px;left:3743px;" },
        { name: "Ocean Flame Ashakiel", pos: "top:3118px;left:3390px;" },
        { name: "Flamestone Giant", pos: "top:1923px;left:3548px;" },
        { name: "Palatanos of Horrific Power", pos: "top:1810px;left:3567px;" },
        { name: "Storm Winged Naga", pos: "top:1809px;left:3495px;" },

        { name: "Death Lord Shax", pos: "top:1909px;left:3739px;" },
        { name: "Death Lord Ipos", pos: "top:1867px;left:3621px;" },

        { name: "Beast Lord Behemoth", pos: "top:1784px;left:3391px;" },
        { name: "Icicle Emperor Bumbalump", pos: "top:1056px;left:3642px;" },
        { name: "Water Dragon Seer Sheshark", pos: "top:3145px;left:3270px;" },

        { name: "Shilen's Messenger Cabrio", pos: "top:2052px;left:3821px;" },
        { name: "Palibati Queen Themis", pos: "top:2130px;left:3909px;" },
        { name: "Flame of Splendor Barakiel", pos: "top:1307px;left:3137px;" },
        { name: "Anakim's Nemesis Zakaron", pos: "top:2628px;left:3525px;" },
        { name: "Spirit of Andras the Betrayer", pos: "top:1771px;left:3857px;" },
        { name: "Kernon's Faithful Servant Kelone", pos: "top:1758px;left:3554px;" },
        { name: "Last Titan Utenus", pos: "top:2384px;left:3858px;" },
        { name: "Demons Agent Falston", pos: "top:1400px;left:3160px;" },
        { name: "Gargoyle Lord Tiphon", pos: "top:1765px;left:3734px;" },
        { name: "Rahha", pos: "top:1892px;left:3344px;" },
        { name: "Hekaton Prime", pos: "top:2420px;left:3887px;" },
        { name: "Shilen's Priest Hisilrome", pos: "top:2171px;left:3728px;" },
        { name: "Fierce Tiger King Angel", pos: "top:2595px;left:3741px;" },
        { name: "Gorgolos", pos: "top:2419px;left:3832px;" },
        { name: "Roaring Lord Kastor", pos: "top:1947px;left:3244px;" },
        { name: "Abyss Brukunt", pos: "top:2600px;left:3634px;" },
        { name: "Demon Kurikups", pos: "top:3576px;left:2826px;" },
        { name: "Ghost of the Lidia", pos: "top:1826px;left:3740px;" },
        { name: "Enmity Ghost Ramdal", pos: "top:2048px;left:3251px;" },
        { name: "Immortal Savior Mardil", pos: "top:2126px;left:3253px;" },
        { name: "Death Lord Hallate", pos: "top:2089px;left:3251px;" },
        { name: "Korim", pos: "top:2167px;left:3258px;" },
        { name: "Kernon", pos: "top:2049px;left:3378px;" },
        { name: "Fire of Wrath Shuriel", pos: "top:2100px;left:3379px;" },
        { name: "Longhorn Golkonda", pos: "top:2140px;left:3381px;" },
        { name: "Cherub Galaxia", pos: "top:2180px;left:3375px;" },
        { name: "MILENU", pos: "top:3796px;left:3097px;" }
    ];

    const wrapper = document.getElementById('map-wrapper');
    const rbList = document.getElementById('rb-list');
    const viewport = document.getElementById('viewport');
    const out = document.getElementById('json-output');

    let scale = 0.2, posX = 0, posY = 0, isEdit = false;
    let draggedMarker = null;

    function init() {
        wrapper.style.backgroundImage = `url('${MAP_IMAGE}')`;
        drawAll();
        update();
    }

    function drawAll() {
        wrapper.innerHTML = '';
        rbList.innerHTML = '';
        bossData.forEach((boss, i) => {
            const m = document.createElement('div');
            m.className = 'rb-marker';
            m.style.cssText = boss.pos;
            m.setAttribute('data-name', boss.name);
            
            m.onmousedown = (e) => {
                if (e.button !== 0) return;
                if (isEdit) {
                    e.stopPropagation();
                    draggedMarker = { index: i, element: m };
                    m.classList.add('dragging');
                }
            };

            m.onclick = (e) => {
                e.stopPropagation();
                if (!isEdit) focus(boss, m);
            };

            wrapper.appendChild(m);

            const item = document.createElement('div');
            item.className = 'rb-item';
            item.innerText = boss.name;
            item.onclick = () => focus(boss, m);
            rbList.appendChild(item);
            boss.el = item;
        });
    }

    window.onmousemove = (e) => {
        if (draggedMarker) {
            const r = wrapper.getBoundingClientRect();
            const x = Math.round((e.clientX - r.left) / scale);
            const y = Math.round((e.clientY - r.top) / scale);
            draggedMarker.element.style.left = x + 'px';
            draggedMarker.element.style.top = y + 'px';
            bossData[draggedMarker.index].pos = `top:${y}px;left:${x}px;`;
            return;
        }
        if (isDrag) {
            posX += e.clientX - lx;
            posY += e.clientY - ly;
            lx = e.clientX; ly = e.clientY;
            update();
        }
    };

    window.onmouseup = () => {
        if (draggedMarker) {
            draggedMarker.element.classList.remove('dragging');
            draggedMarker = null;
            save();
        }
        isDrag = false;
    };

    function focus(boss, m) {
        const t = parseInt(boss.pos.match(/top:(\d+)px/)[1]);
        const l = parseInt(boss.pos.match(/left:(\d+)px/)[1]);
        scale = 0.8;
        posX = (window.innerWidth/2) - (l * scale);
        posY = (window.innerHeight/2) - (t * scale);
        update();
    }

    function update() {
        wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function toggleEditor() {
        isEdit = !isEdit;
        document.body.classList.toggle('edit-active');
        document.querySelector('.btn-mode').innerText = isEdit ? 'РЕЖИМ: РЕДАКТОР' : 'РЕЖИМ: АТЛАС';
        viewport.style.cursor = isEdit ? 'crosshair' : 'grab';
        save();
    }

    viewport.onclick = (e) => {
        if(!isEdit || isDrag) return;
        const r = wrapper.getBoundingClientRect();
        const x = Math.round((e.clientX - r.left) / scale);
        const y = Math.round((e.clientY - r.top) / scale);
        const n = prompt("Имя РБ:");
        if(n) {
            bossData.push({ name: n, pos: `top:${y}px;left:${x}px;` });
            drawAll();
            save();
        }
    };

    function filterList() {
        const q = document.getElementById('search').value.toLowerCase();
        bossData.forEach(b => {
            if(b.el) b.el.style.display = b.name.toLowerCase().includes(q) ? 'block' : 'none';
        });
    }

    function save() { out.value = JSON.stringify(bossData.map(b=>({name:b.name, pos:b.pos})), null, 2); }

    viewport.onwheel = e => {
        e.preventDefault();
        const d = e.deltaY > 0 ? 0.85 : 1.15;
        const ns = Math.min(Math.max(0.05, scale * d), 4);
        posX = e.clientX - (e.clientX - posX) * (ns / scale);
        posY = e.clientY - (e.clientY - posY) * (ns / scale);
        scale = ns; update();
    };

    let isDrag = false, lx, ly;
    viewport.onmousedown = e => { 
        if(e.button === (isEdit ? 2 : 0)) { isDrag = true; lx = e.clientX; ly = e.clientY; } 
    };
    viewport.oncontextmenu = e => e.preventDefault();

    init();
</script>
</body>
</html>
