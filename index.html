<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>L2 Raid Tracker Pro</title>
    <style>
        :root { --gold: #ffd700; --bg: #121212; --panel: #1e1e1e; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        
        /* Боковая панель */
        .sidebar { width: 350px; height: 100vh; background: var(--panel); border-right: 1px solid #333; overflow-y: auto; position: fixed; z-index: 1000; }
        .search-box { padding: 15px; position: sticky; top: 0; background: var(--panel); border-bottom: 1px solid #333; }
        .search-box input { width: 90%; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }
        
        /* Карта */
        .map-wrapper { margin-left: 350px; position: relative; overflow: auto; cursor: crosshair; }
        .worldmap { position: relative; width: 2500px; height: 3500px; background: url('https://linedia.ru/img/map.jpg') no-repeat; }

        /* Метки и таймеры */
        .boss-item { padding: 10px 15px; border-bottom: 1px solid #2a2a2a; transition: 0.2s; }
        .boss-item:hover { background: #252525; }
        .boss-name { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        
        .timer-val { font-family: monospace; color: #00ff88; font-size: 16px; }
        .timer-val.dead { color: #ff4444; }
        
        .btn-kill { background: #b32d2d; border: none; color: white; padding: 4px 8px; border-radius: 3px; cursor: pointer; float: right; }
        
        /* Маркеры на карте */
        .marker { position: absolute; width: 24px; height: 24px; transform: translate(-50%, -50%); z-index: 50; }
        .marker img { width: 100%; filter: drop-shadow(0 0 5px black); }
        .marker.alive { filter: drop-shadow(0 0 8px #00ff88) hue-rotate(90deg); animation: pulse 2s infinite; }

        @keyframes pulse { 0% {transform: translate(-50%, -50%) scale(1);} 50% {transform: translate(-50%, -50%) scale(1.3);} 100% {transform: translate(-50%, -50%) scale(1);} }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск босса..." onkeyup="filterBosses()">
    </div>
    <div id="bossList"></div>
</div>

<div class="map-wrapper" id="mapWrapper">

let timers = JSON.parse(localStorage.getItem('l2_pro_timers')) || {};

function render() {
    const list = document.getElementById('bossList');
    const map = document.getElementById('map');
    list.innerHTML = '';
    
    // Очищаем только маркеры, не карту
    document.querySelectorAll('.marker').forEach(m => m.remove());

    bossData.forEach(boss => {
        const now = Date.now();
        const killTime = timers[boss.name] || 0;
        const diff = killTime - now;
        const isDead = diff > 0;

        // Рендер в список
        const item = document.createElement('div');
        item.className = 'boss-item';
        item.innerHTML = `
            <button class="btn-kill" onclick="kill('${boss.name}', ${boss.resp})">УБИТ</button>
            <span class="boss-name">${boss.name}</span>
            <span class="timer-val ${isDead ? 'dead' : ''}" id="val-${boss.name.replace(/\s/g, '')}">
                ${isDead ? format(diff) : 'ЖИВОЙ / ОКНО'}
            </span>
        `;
        list.appendChild(item);

        // Рендер на карту (если есть координаты)
        if (boss.x > 0 && boss.y > 0) {
            const marker = document.createElement('div');
            marker.className = `marker ${isDead ? '' : 'alive'}`;
            marker.style.left = boss.x + 'px';
            marker.style.top = boss.y + 'px';
            marker.innerHTML = `<img src="https://linedia.ru/img/flag.png" title="${boss.name}">`;
            marker.onclick = () => alert(boss.name + (isDead ? " будет через " + format(diff) : " ЖИВ!"));
            map.appendChild(marker);
        }
    });
}

function kill(name, hours) {
    timers[name] = Date.now() + (hours * 60 * 60 * 1000);
    localStorage.setItem('l2_pro_timers', JSON.stringify(timers));
    render();
}

function format(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${h}ч ${m}м ${s}с`;
}

// ХЕЛПЕР ДЛЯ КООРДИНАТ: Кликни на карту и посмотри в консоль (F12)
document.getElementById('map').onclick = function(e) {
    const rect = this.getBoundingClientRect();
    const x = Math.round(e.pageX + document.getElementById('mapWrapper').scrollLeft - 350);
    const y = Math.round(e.pageY + document.getElementById('mapWrapper').scrollTop);
    console.log(`Для босса: x: ${x}, y: ${y}`);
};

function filterBosses() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let items = document.getElementsByClassName('boss-item');
    for (let i = 0; i < items.length; i++) {
        items[i].style.display = items[i].innerText.toLowerCase().includes(input) ? "block" : "none";
    }
}

setInterval(render, 1000);
render();
